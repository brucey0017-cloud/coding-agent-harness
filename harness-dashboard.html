 Checked | Required Action | Open | Disposition | Blocks Release | Follow-up |\n| --- | --- | --- | --- | --- | --- | --- | --- | --- |\n| R-001 | P1 | Capability taxonomy is not canonical across plan and implementation | E-003, E-004, E-010 | Canonical names now live in code and public roadmap; `review-contract` remains an alias | no | mitigated | no | Continue template/docs sweep in Phase 1 |\n| R-002 | P1 | `init` scaffold currently risks copying configurable references as if they were project-specific standards | E-004, E-010 | `plannedInitFiles()` no longer mechanically copies all `templates/reference` files | no | mitigated | no | Phase 1 should add Configure guidance |\n| R-003 | P1 | Public user guidance still teaches the old 12-phase install flow | E-005, E-006 | SKILL and README now describe six-phase v1.0 install; old 12-phase section is historical | no | mitigated | no | Full wording polish in Phase 1 |\n| R-004 | P2 | v1.0 task contract still needs standalone strategy/roadmap files | E-001, E-012, E-013 | Added PF-002 standalone `execution_strategy.md` and `visual_roadmap.md` | no | closed | no | none |\n| R-005 | P2 | Release-critical plan material should not distract public README/docs-release | E-003 | Keep staged release plan and roadmap private; docs-release stays architecture/install/migration only | no | closed | no | none |\n| R-006 | P1 | Dashboard v2 task lifecycle commands would expand v1.0 from read-only kernel to write-capable workflow tool | E-002, E-003 | Public staged plan keeps Dashboard v2/task lifecycle in Phase 2 | no | mitigated | no | Enforce during Phase 1 review |\n| R-007 | P2 | A weak Phase 1 dashboard may disappoint users if docs overpromise it | E-002, E-003 | Public staged plan labels Phase 1 dashboard as minimal/read-only and routes final UX to Phase 2 | no | mitigated | no | Phase 1 docs |\n| R-008 | P1 | Init without locale selection would keep generating English operating docs for Chinese users | E-009, E-010, E-011 | `init --locale zh-CN|en-US` is implemented; registry stores locale; zh-CN task_plan template proves localized scaffold path | no | mitigated | no | Expand localized template coverage in Phase 1 |\n\n## Decision\n\nApproved to start Phase 1 kernel hardening after this Phase 0 pass.\n\nAll Phase 0 P1 blockers are mitigated or closed. Remaining residuals are\nPhase 1 polish/coverage work, not blockers to start kernel hardening.\n\n## Final Confidence Basis\n\nAdversarial-reviewed at strategy level. Not release-approved.\n\nConfidence after this review: high enough to start Phase 1 kernel hardening.\nNot release-approved.\n"},{"id":"doc-0037-task-plan","path":"TARGET:docs/09-PLANNING/TASKS/2026-05-19-v1-staged-release-rebaseline/task_plan.md","title":"Task Plan - v1 Staged Release Rebaseline","type":"markdown-table","content":"# Task Plan - v1 Staged Release Rebaseline\n\n- Task ID: `PF-004`\n- Status: `done`\n- Owner: coordinator\n- Date: 2026-05-19\n- Public artifact: none; release roadmap remains private operating state.\n\n## Goal\n\nSplit the current v1.0 work into staged delivery so the project can ship a\nstable document kernel first, then build Dashboard v2 and task lifecycle\ncapabilities on top of it.\n\n## Scope\n\nAllowed private writes:\n\n- `.harness-private/docs/09-PLANNING/TASKS/2026-05-19-v1-staged-release-rebaseline/`\n- `.harness-private/docs/09-PLANNING/Private-Feature-SSoT.md`\n\nAllowed public writes:\n\n- none for roadmap/staged-plan material; public docs-release stays architecture/install/migration only.\n\nOut of scope:\n\n- CLI implementation.\n- Dashboard implementation.\n- Modifying PF-002/PF-003 historical records.\n- Declaring v1.0 release-ready.\n\n## Task IA Budget\n\n| Budget | Use When | Required Structure |\n| --- | --- | --- |\n| complex | Release strategy rebaseline touching public/private plans, dashboard scope, checker/init boundaries, and follow-on capability staging | Core task files plus adversarial review |\n\n## Context Packet\n\n| ID | Type | Path | Why It Matters | Used By |\n| --- | --- | --- | --- | --- |\n| C-001 | private-plan | PRIVATE:docs/09-PLANNING/TASKS/2026-05-17-v1.0-document-kernel-release/task_plan.md | Current v1.0 release plan and acceptance gates | coordinator / reviewer |\n| C-002 | private-plan | PRIVATE:docs/09-PLANNING/TASKS/2026-05-19-dashboard-v2-visibility-layer/task_plan.md | Dashboard v2 and task lifecycle plan that should be staged after v1.0 | coordinator / reviewer |\n| C-003 | private-plan | PRIVATE:docs/09-PLANNING/TASKS/2026-05-19-v1-staged-release-rebaseline/visual_roadmap.md | Private v1.0 roadmap and dashboard contract | coordinator / reviewer |\n| C-004 | code | PUBLIC:scripts/lib/harness-core.mjs | Current capability registry, init scaffold, status, and dashboard behavior | reviewer |\n| C-005 | public-doc | PUBLIC:SKILL.md | Current 12-phase SOP drift against six-phase plan | reviewer |\n| C-006 | public-doc | PUBLIC:README.md | Public user-facing install guidance and capability registry docs | reviewer |\n\n## Execution & Visualization Files\n\n| Contract File | Required | Purpose |\n| --- | --- | --- |\n| `execution_strategy.md` | yes | Execution mode, review lenses, allowed writes, evidence depth |\n| `visual_roadmap.md` | yes | Three-stage delivery route and phase table |\n| `brief.md` | yes | Human-readable summary of the staged release decision |\n\n## Plan\n\n### Phase 0: Rebaseline and Close Drift\n\nPurpose: remove contradictions before implementation continues.\n\nOutputs:\n\n- Canonical capability taxonomy.\n- Template language strategy: define `zh-CN` and `en-US` template variants,\n  locale selection, and how language is stored in the capability/config file.\n- Six-phase `SKILL.md` and README guidance.\n- Correct Scaffold/Configure boundary.\n- Standalone PF-002 `execution_strategy.md` and `visual_roadmap.md`.\n- Release-critical public-facing concepts summarized in README/guides; roadmap and execution plans remain private.\n- Dashboard v2 and task lifecycle marked as Phase 2 capability work.\n\nAcceptance:\n\n- `node scripts/harness.mjs check --profile private-harness .harness-private`\n  has no warning for missing PF-002 strategy/roadmap.\n- Public docs no longer depend on unpublished `docs/plans/` files for release\n  critical strategy, and private roadmap material is not copied into docs-release.\n- No reviewer finding says v1.0 scope still includes Dashboard v2 task lifecycle\n  commands.\n- Locale behavior is defined before template implementation starts.\n\n### Phase 1: v1.0 Document Kernel\n\nPurpose: ship the public, installable, checkable kernel.\n\nOutputs:\n\n- Package metadata and public README.\n- Capability registry with static built-in rule groups.\n- Locale-aware scaffold: `harness init --locale zh-CN|en-US` and agent-guided\n  install prompts the user for Chinese or English when no locale is provided.\n- Chinese and English variants for user-facing templates used by scaffolded\n  task, review, ledger, SSoT, walkthrough, and reference draft files.\n- `harness check`, `harness status --json`, `harness init`, and\n  `harness add-capability`.\n- Safe adoption mode for old harness projects.\n- Minimal read-only dashboard that consumes status JSON.\n- Minimal and full examples.\n- CI and final release review.\n\nNon-goals:\n\n- Task lifecycle write commands.\n- Dashboard v2.\n- `brief.md` as mandatory task contract.\n- Control dashboard or automatic migration.\n\nAcceptance:\n\n- `npm test`\n- `npm run smoke:dashboard`\n- `node scripts/harness.mjs check --profile source-package .`\n- `node scripts/harness.mjs check --profile private-harness .harness-private`\n- `node scripts/harness.mjs check --profile target-project examples/minimal-project`\n- Init fixture verifies both `zh-CN` and `en-US` scaffold output.\n- No open P0/P1/material-P2 release finding.\n\n### Phase 2: Visibility Layer and Task Lifecycle\n\nPurpose: make the HTML surface good enough to replace opening the repo in an\neditor for routine status reading.\n\nOutputs:\n\n- `brief.md` task and module visibility contract.\n- `harness new-task`, `task-start`, `task-phase`, `task-complete`,\n  `task-block`, `task-log`, `task-list`.\n- `harness module-step`.\n- Dashboard data schema v2.\n- Dashboard v2 with Overview, Task Index, Task Detail, search, Mermaid,\n  module topology, lessons, and responsive/fallback behavior.\n- Dogfood briefs for existing active tasks.\n\nAcceptance:\n\n- Task lifecycle round-trip tests pass.\n- Ambiguous task names fail with actionable candidates.\n- Module-step updates module plan and registry consistently.\n- Dashboard renders with 100+ tasks under the agreed performance threshold.\n- Mobile and no-CDN fallback checks pass.\n- Generated dashboard contains no private path leak.\n\n## Release Decision Rules\n\n| Rule | Meaning |\n| --- | --- |\n| P0 must close first | Any private/public boundary or data loss risk blocks all phases |\n| P1 blocks Phase 1 | Any release contract, checker, init, or docs drift blocks v1.0 |\n| Dashboard UX dissatisfaction does not block Phase 1 | It routes to Phase 2 unless the minimal dashboard leaks private data or writes files |\n| Phase 2 cannot start before Phase 1 release gate | Prevents v1.0 scope expansion |\n\n## Coordinator Handoff\n\nCurrent owner: coordinator. No worker handoff is pending.\n"},{"id":"doc-0038-visual-roadmap","path":"TARGET:docs/09-PLANNING/TASKS/2026-05-19-v1-staged-release-rebaseline/visual_roadmap.md","title":"Visual Roadmap - v1 Staged Release Rebaseline","type":"legacy-visual-roadmap","content":"# Visual Roadmap - v1 Staged Release Rebaseline\n\n```mermaid\nflowchart TB\n  P0[\"Phase 0\\nStrategy Rebaseline\"] --> P1[\"Phase 1\\nv1.0 Document Kernel\"]\n  P1 --> P2[\"Phase 2\\nVisibility + Task Lifecycle\"]\n\n  subgraph P0S[\"Phase 0 outputs\"]\n    P0A[\"Canonical capability taxonomy\"]\n    P0B[\"Locale strategy\\nzh-CN + en-US\"]\n    P0C[\"6-phase SKILL + README\"]\n    P0D[\"Scaffold/Configure boundary\"]\n    P0E[\"PF-002 contract files\"]\n    P0F[\"docs-release migration\"]\n    P0G[\"Dashboard v2 moved out of v1.0\"]\n  end\n\n  subgraph P1S[\"Phase 1 outputs\"]\n    P1A[\"capability registry\"]\n    P1B[\"locale-aware init\"]\n    P1C[\"capability-aware check\"]\n    P1D[\"status JSON\"]\n    P1E[\"safe init + add-capability\"]\n    P1F[\"minimal read-only dashboard\"]\n    P1G[\"examples + CI + final review\"]\n  end\n\n  subgraph P2S[\"Phase 2 outputs\"]\n    P2A[\"brief.md contract\"]\n    P2B[\"task lifecycle CLI\"]\n    P2C[\"module-step\"]\n    P2D[\"dashboard schema v2\"]\n    P2E[\"Dashboard v2\"]\n    P2F[\"dogfood + UX smoke\"]\n  end\n\n  P0 --> P0S --> P1\n  P1 --> P1S --> P2\n  P2 --> P2S\n```\n\n| Phase ID | Depends On | State | Completion | Output | Required Evidence | Evidence Status | Blocking Risk | Owner / Handoff |\n| --- | --- | --- | --- | --- | --- | --- | --- | --- |\n| P0 | none | done | 100 | Rebaseline plan, private staged plan, locale strategy, adversarial review, initial implementation | private check, public/private boundary, no open P0/P1/material-P2 review finding | present | none | coordinator |\n| P1 | P0 | done | 100 | v1.0 document kernel release with zh-CN/en-US scaffold | `npm test`, source check, private check, locale fixtures, examples, dashboard smoke | present | historical private warnings only | coordinator |\n| P2 | P1 | done | 100 | visibility layer and task lifecycle capability | task lifecycle round-trip tests, new-project smoke, Agora migration smoke, dashboard artifact/leak checks | present | browser screenshot tool unavailable | coordinator |\n\nAllowed `State`: `planned`, `in_progress`, `review`, `blocked`, `done`, `skipped`.\nAllowed `Evidence Status`: `missing`, `partial`, `present`, `waived`.\n"},{"id":"doc-0039-brief","path":"TARGET:docs/09-PLANNING/TASKS/2026-05-20-harness-core-modularization/brief.md","title":"Brief","type":"task-brief","content":"# Brief\n\n## What\n\nRefactor the harness codebase to address two technical debt items identified in architecture review:\n1. Split `harness-core.mjs` (2776 lines) into 5-6 domain modules\n2. Split dashboard `app.js` (1281 lines) into router + components\n3. Add edge case unit tests for migration classification logic\n\n## Why\n\n`harness-core.mjs` is a god module handling 10+ responsibilities. It's approaching the point where merge conflicts become frequent and new contributors can't orient quickly. The dashboard JS has similar symptoms after the visibility layer and task detail drawer additions.\n\n## Status\n\nPlanned. Not started.\n\n## Evidence Required\n\n- `npm test` pass\n- `npm run smoke:dashboard` pass\n- `harness check --profile source-package .` pass\n- No behavior change in any CLI output (diff of `harness status --json` before/after on a target project)\n\n## Risks\n\n- Circular import between extracted modules (mitigated by keeping shared utils in barrel)\n- Dashboard concat order (mitigated by smoke test)\n\n## Next Action\n\nExecute Phase 1 (harness-core split), verify tests pass after each extraction step.\n"},{"id":"doc-0040-execution-strategy","path":"TARGET:docs/09-PLANNING/TASKS/2026-05-20-harness-core-modularization/execution_strategy.md","title":"Execution Strategy","type":"execution-strategy","content":"# Execution Strategy\n\n## Decision Table\n\n| Decision | Choice | Notes |\n| --- | --- | --- |\n| Primary executor | coordinator | Single-session refactor, no parallel workers needed |\n| Subagents | none | All changes are in well-known files within this repo |\n| Review model | self-check | Automated tests + smoke are sufficient for pure refactor |\n| Worktree strategy | same checkout | No concurrent code-writing agents |\n| Conflict control | n/a | Single executor |\n| Evidence depth | L1 | Test pass + smoke pass + source-package check |\n\n## Subagent / Worker Contract\n\nNo subagents required. Coordinator executes all phases directly.\n\n## Stop / Escalation Conditions\n\n- Any extracted module introduces a circular import that tests cannot catch.\n- Dashboard consolidation breaks locale detection for non-dashboard templates.\n- Mermaid renderer rewrite causes visual regression in task detail views beyond the fix scope.\n- Test suite or smoke fails after a phase and cannot be fixed within 30 minutes.\n"},{"id":"doc-0041-findings","path":"TARGET:docs/09-PLANNING/TASKS/2026-05-20-harness-core-modularization/findings.md","title":"Findings","type":"markdown-table","content":"# Findings\n\nNo findings yet. This file will be populated during review if issues are discovered.\n\n| Finding ID | Severity | Description | Status | Resolution |\n| --- | --- | --- | --- | --- |\n"},{"id":"doc-0042-progress","path":"TARGET:docs/09-PLANNING/TASKS/2026-05-20-harness-core-modularization/progress.md","title":"Progress","type":"task-progress","content":"# Progress\n\n## Status: planned\n\nTask created 2026-05-20 after architecture design review of two-day sprint output.\n\n## Phases\n\n- [ ] Phase 1: harness-core.mjs domain extraction (6 modules)\n- [ ] Phase 2: Dashboard app.js component split (5 files + concat)\n- [ ] Phase 3: Migration classification edge case tests (5 tests)\n"},{"id":"doc-0043-review","path":"TARGET:docs/09-PLANNING/TASKS/2026-05-20-harness-core-modularization/review.md","title":"Review","type":"task-review","content":"# Review\n\n## Review Model\n\nSelf-check with automated verification. No adversarial review required for pure refactor.\n\n## Reviewer Identity\n\nn/a — automated test suite serves as verifier.\n\n## Confidence Challenge\n\nThis is a mechanical refactor. Confidence is derived from:\n1. All existing tests pass without modification (proves no behavior change)\n2. Dashboard smoke passes (proves rendering intact)\n3. Source-package check passes (proves no boundary violation)\n\n## Evidence Checked\n\nPending — will be filled after execution.\n\n## Final Confidence Basis\n\nPending.\n"},{"id":"doc-0044-task-plan","path":"TARGET:docs/09-PLANNING/TASKS/2026-05-20-harness-core-modularization/task_plan.md","title":"Harness Core Modularization","type":"markdown-table","content":"# Harness Core Modularization\n\n**Goal:** Split `scripts/lib/harness-core.mjs` (2776 lines) into domain-focused modules, split `templates/dashboard/assets/app.js` (1281 lines) into a router + component files, and add migration classification edge case tests.\n\n**Architecture:** Pure refactor — no behavior changes, no new features. All existing tests and smoke must continue to pass after each step. The public API surface (`export` functions from harness-core) stays identical; internal modules are not exported to consumers.\n\n**Tech Stack:** Node.js ESM, static JS/CSS dashboard templates, existing test runner.\n\n---\n\n## Acceptance Criteria\n\n1. `harness-core.mjs` is replaced by a barrel file that re-exports from domain modules, each \u003c 600 lines.\n2. Dashboard templates consolidated into a single set with both zh/en i18n dictionaries and a runtime language toggle. `templates-zh-CN/dashboard/` removed.\n3. `app.js` is split into `router.mjs` + component files, concatenated at build/copy time into a single `app.js` for deployment.\n4. Migration classification logic has 5+ edge case unit tests covering boundary combinations.\n5. `npm test` passes.\n6. `npm run smoke:dashboard` passes.\n7. `node scripts/harness.mjs check --profile source-package .` passes.\n8. No behavior change in any CLI command output.\n\n## Non-Goals\n\n- Do not add new features or capabilities.\n- Do not introduce build tools (webpack, esbuild, etc.) for the dashboard.\n- Do not change the public package API.\n- Do not refactor `test-harness.mjs` (it can stay monolithic for now).\n\n---\n\n## Context Packet\n\n| ID | Type | Path | Why It Matters | Used By |\n| --- | --- | --- | --- | --- |\n| C-001 | code | PUBLIC:scripts/lib/harness-core.mjs | The 2776-line god module to split | worker |\n| C-002 | code | PUBLIC:templates/dashboard/assets/app.js | The 1281-line dashboard JS to split | worker |\n| C-003 | code | PUBLIC:scripts/test-harness.mjs | Must continue passing | worker |\n| C-004 | code | PUBLIC:scripts/smoke-dashboard.mjs | Must continue passing | worker |\n\n---\n\n## Plan\n\n### Phase 1: harness-core.mjs domain extraction\n\nSplit into these modules under `scripts/lib/`:\n\n| Module | Responsibility | Estimated Lines |\n| --- | --- | --- |\n| `capability-registry.mjs` | `capabilityDefinitions`, aliases, `readCapabilityRegistry`, `writeInitFiles`, `addCapability`, install report | ~400 |\n| `task-scanner.mjs` | `collectTasks`, `parsePhases`, `assessBriefQuality`, `inferTaskClassification`, `taskMigrationClassification`, state parsing | ~500 |\n| `migration-planner.mjs` | `migratePlan`, `migrateVerify`, action generation, cutover counters, recommended capabilities | ~500 |\n| `check-profiles.mjs` | All `check*` functions, profile definitions, warning classification | ~500 |\n| `dashboard-data.mjs` | `collectStatus`, `collectMarkdownDocuments`, dashboard JSON assembly | ~300 |\n| `harness-core.mjs` | Barrel re-export + shared utilities (path helpers, `readFileSafe`, `sanitizeText`, `normalizeTarget`) | ~400 |\n\nSteps:\n1. Extract `capability-registry.mjs` — move capability definitions and init/add logic.\n2. Extract `task-scanner.mjs` — move task collection and classification.\n3. Extract `migration-planner.mjs` — move migrate-plan and migrate-verify.\n4. Extract `check-profiles.mjs` — move all check functions.\n5. Extract `dashboard-data.mjs` — move status collection and document assembly.\n6. Convert `harness-core.mjs` to barrel + shared utilities.\n7. Run full test suite after each extraction.\n\n### Phase 2: Dashboard template consolidation and app.js split\n\n**Consolidation:** Merge `templates/dashboard/` and `templates-zh-CN/dashboard/` into a single template set. The dashboard already has an i18n mechanism (`window.HarnessI18n`) — embed both locale dictionaries in one `i18n.js` and add a runtime language toggle button. Remove `templates-zh-CN/dashboard/` entirely; the `dashboard-writer.mjs` no longer needs locale-based template selection for dashboard assets.\n\n**Component split:** After consolidation, split the single `app.js` into logical components:\n\n| File | Responsibility |\n| --- | --- |\n| `_router.js` | Hash routing, state management, bind() |\n| `_overview.js` | Overview page render |\n| `_tasks.js` | Task index, pagination, grouping, search, detail drawer |\n| `_modules.js` | Module view render |\n| `_shared.js` | `escapeHtml`, `t()`, `routeLink`, theme toggle, language toggle, markdown render |\n\nConcatenation order defined in a `build-order.txt` or inline in the smoke script. The harness `dashboard` command concatenates these into a single `app.js` in the output directory. Template directory keeps the split source files.\n\nNote: This consolidation applies ONLY to dashboard templates. Non-dashboard templates (`templates/planning/`, `templates/architecture/`, etc.) remain as full bilingual mirrors because those are consumed directly by users in their projects.\n\n### Phase 3: Mermaid renderer fix\n\nCurrent `mermaid-renderer.js` has fundamental layout problems:\n- All nodes placed on a single horizontal row (`y: 70` fixed)\n- Node width fixed at 108px regardless of text length — text overflows\n- No wrapping or multi-row layout for graphs with 5+ nodes\n\nFix approach:\n1. Measure text width (approximate: char count × font-size factor) and size nodes accordingly\n2. For graphs with > 5 nodes, use a multi-row grid layout instead of single row\n3. For `flowchart TD/TB`, use vertical layout\n4. Truncate long labels with ellipsis and show full text on hover (title attribute)\n5. Set `max-width` on the SVG container and allow horizontal scroll only when truly needed\n\n### Phase 4: Overview page redesign\n\nCurrent overview shows: progress bar + migration workbench + active task briefs + sidebar metrics.\n\nProblems:\n- \"Active Task Briefs\" section is redundant — Task Index page already shows this clearly\n- Migration workbench detail (warning list) belongs on a dedicated page, not overview\n- Overview should be a quick health check, not a second task index\n\nRedesign direction:\n- **Keep:** Progress bar, readiness status card, key metrics (tasks, brief coverage, blockers)\n- **Remove from overview:** Active Task Briefs section (redundant with Task Index)\n- **Simplify:** Migration workbench on overview shows only summary cards (counts by category), not the full warning table. Full warning table moves to a dedicated warnings view or stays within Task Index\n- **Consider adding:** Recent activity / last 5 completed tasks as a compact list, or a \"what changed since last visit\" summary\n\n### Phase 5: Migration classification edge case tests\n\nAdd to `test-harness.mjs`:\n\n1. `state=unknown` + `visualMap=legacy-only` → should classify as `unknown-needs-human`\n2. `state=done` + `visualMap=missing` + `briefVisualStatus=not-needed` → should not require visual map\n3. `state=active` + `visualMap=canonical` + `briefSource=legacy-embedded` → should still flag brief upgrade\n4. `state=reopened` + no progress file → should infer state from task_plan fallback\n5. `state=done` + `visualMap=legacy-only` + classification `historical-no-map-needed` → should not generate migration action\n\n---\n\n## Risk\n\n| Risk | Mitigation |\n| --- | --- |\n| Circular imports between extracted modules | Shared utilities stay in barrel; domain modules import only from barrel utils |\n| Dashboard concat order breaks runtime | Smoke test catches immediately; IIFE wrapping per component prevents leaks |\n| Missed re-export breaks CLI | Test suite exercises every CLI command path |\n\n## Coordinator Handoff\n\nThis is a pure refactor task. Can be executed in a single session. No external dependencies or reviewer loop required beyond the automated checks.\n"},{"id":"doc-0045-visual-map","path":"TARGET:docs/09-PLANNING/TASKS/2026-05-20-harness-core-modularization/visual_map.md","title":"Visual Map","type":"visual-map","content":"# Visual Map\n\n```mermaid\nflowchart LR\n  PH1[\"Phase 1: Core Split\"] --> PH2[\"Phase 2: Dashboard Consolidation\"]\n  PH2 --> PH3[\"Phase 3: Mermaid Fix\"]\n  PH3 --> PH4[\"Phase 4: Overview Redesign\"]\n  PH4 --> PH5[\"Phase 5: Edge Case Tests\"]\n```\n\n| Phase ID | Depends On | State | Completion | Output | Required Evidence | Evidence Status | Blocking Risk | Owner / Handoff |\n| --- | --- | --- | --- | --- | --- | --- | --- | --- |\n| PH-01 | none | planned | 0 | 5-6 domain modules under scripts/lib/ | npm test pass, no behavior change in CLI output | missing | circular imports | coordinator |\n| PH-02 | PH-01 | planned | 0 | Single dashboard template set with i18n toggle | smoke:dashboard pass, both locales render correctly | missing | locale detection regression | coordinator |\n| PH-03 | PH-02 | planned | 0 | Fixed mermaid-renderer.js with adaptive layout | task detail Mermaid renders readable at 5-15 nodes | missing | none | coordinator |\n| PH-04 | PH-03 | planned | 0 | Simplified overview page | visual inspection, smoke pass | missing | none | coordinator |\n| PH-05 | none | planned | 0 | 5+ edge case tests in test-harness.mjs | npm test pass | missing | none | coordinator |\n"},{"id":"doc-0046-brief","path":"TARGET:docs/09-PLANNING/TASKS/2026-05-20-human-brief-visual-map-architecture-rebaseline/brief.md","title":"Brief","type":"task-brief","content":"# Brief\n\n## 一句话结论\n\n本任务要把 v1.0 的任务文档、Visual Map、Architecture / Development / Integrations 信息架构重新定稳：不新增 `12-SYSTEM-CONTEXT`，直接把任务可视文件改名为 `visual_map.md`，并把旧项目迁移定义为 canonical rewrite。\n\n## Human Read Order\n\n1. 先读本文件，确认方向和关键决策。\n2. 再读 `task_plan.md`，看完整改造计划、目录职责、迁移规则和验收条件。\n3. 再读 `visual_map.md`，看阶段关系和审查门禁。\n4. 如要看对抗审查上下文，读 `findings.md` 和 `review.md`。\n\n## Task Classification\n\nTask Classification: active\nVisual Map Status: present\nVisual Map Path: visual_map.md\n\n## Goal and Non-Goals\n\n目标：\n\n- 强化 `brief.md`，让它成为人类理解任务的主入口。\n- 将任务图表集合定名为 `visual_map.md`，避免 `roadmap` 误导 agent 只画阶段图。\n- 明确 `execution_strategy.md` 只承载 agent 执行、subagent 分工、验证和 handoff。\n- 不新增 `docs/12-SYSTEM-CONTEXT/`，而是重新定义 `02/03/04/06/11` 的职责。\n- 明确旧项目迁移是 canonical rewrite，不是长期兼容旧格式。\n\n非目标：\n\n- 本任务不发布 npm、不推 PR。\n- 本任务不扩展顶层目录数量。\n- 旧项目迁移证明必须由 subagent 执行，主代理只做协调与验收。\n\n## Current Status Judgment\n\n方案已经经过用户确认的核心方向：\n\n- `03-ARCHITECTURE/`：系统结构事实源，包括本服务和外部系统结构。\n- `04-DEVELOPMENT/`：开发上下文输入包，更细、更贴近 agent 编码时需要读的外部服务摘要、mock/stub、跨仓调试资料。\n- `06-INTEGRATIONS/`：具体接口合同和集成细节，暂时保留但不作为系统地图入口。\n- `visual_map.md`：直接作为 canonical 新文件名；`visual_roadmap.md` 只作为旧项目迁移输入。\n\n当前 public 实现已进入执行和回归阶段；剩余关键证明是 Agora 旧项目必须由 GPT-5.4 mini subagent 独立跑通 full-cutover 冒烟。\n\n用户追加的 Antigravity/Gemini Dashboard 视觉计划已并入 `task_plan.md` 的 `Dashboard UX Carryover`，作为后续独立 Dashboard slice，不与 `03/04/06` 文档 IA 改造混成同一个 worker 范围。\n\n## Key Visual Maps\n\n- `visual_map.md` / PH-01：计划定稿与用户确认。\n- `visual_map.md` / PH-02：subagent 对抗审查。\n- `visual_map.md` / PH-03：公共模板、CLI、checker、dashboard、迁移 prompt 实现。\n- `visual_map.md` / PH-06：Agora 旧项目迁移由 GPT-5.4 mini subagent 证明。\n\n本任务已 dogfood 新标准，canonical 文件为 `visual_map.md`；`visual_roadmap.md` 仅保留为历史输入。\n\n## Evidence Sources\n\n| Evidence | Path | Notes |\n| --- | --- | --- |\n| 用户外部参考 | `LOCAL_PATH_REDACTED).md` | 朋友的多仓/多应用 workspace 架构理解。 |\n| 当前目录标准 | `PUBLIC:references/docs-directory-standard.md` | 现有 `00..11` docs 树。 |\n| 当前 planning 标准 | `PUBLIC:references/planning-loop.md` | 当前三件套和 `visual_roadmap.md` 定义。 |\n| 当前模板 | `PUBLIC:templates*/planning/*` | 后续需要改成 `visual_map.md` 的模板源。 |\n| 对抗审查记录 | `PRIVATE:docs/09-PLANNING/TASKS/2026-05-20-human-brief-visual-map-architecture-rebaseline/findings.md` | 已纳入前两轮 reviewer 主要意见。 |\n| Antigravity Dashboard 半成品计划 | `LOCAL_PATH_REDACTED` | 已纳入 Dashboard UX Carryover；后续实现需补齐双语、i18n、可访问性和视觉回归。 |\n\n## Risks and Residuals\n\n- `visual_map.md` 直接改名会触碰 CLI、checker、dashboard、tests、docs-release 和迁移 prompt，后续实现必须一次性拉通。\n- `04-DEVELOPMENT/` 如果定义不严，会变成第二个文档堆；需要模板和标准约束它只做开发上下文输入包。\n- 旧项目 full cutover 如果没有机器门禁，subagent 仍可能只列问题或批量生成空模板。\n- `06-INTEGRATIONS/` 当前用户还没有完全体感，需要在计划中先定义为接口合同细节，后续靠样例让它变清楚。\n\n## Next Action\n\n用户审阅本任务目录。确认后再进入 implementation planning，并让 subagent 审查这份具体 task folder，而不是审查口头想法。\n\n## Promotion Candidates\n\n| Candidate ID | Type | Destination | Source Evidence | Decision | Owner | Target Path | Status | Blocking |\n| --- | --- | --- | --- | --- | --- | --- | --- | --- |\n| PC-001 | reference | `11-REFERENCE` | 本任务计划 | promote | coordinator | `PUBLIC:references/docs-directory-standard.md` / `PUBLIC:templates*/reference/docs-library-standard.md` | done | no |\n| PC-002 | architecture | `03-ARCHITECTURE` | 用户确认 | promote | coordinator | target-project templates for `03-ARCHITECTURE/*` | proposed | yes |\n| PC-003 | development | `04-DEVELOPMENT` | 用户确认 | promote | coordinator | target-project templates for development context pack | proposed | yes |\n| PC-004 | migration | `docs-release/guides` | migration findings | promote | coordinator | public bilingual migration docs | proposed | yes |\n"},{"id":"doc-0047-execution-strategy","path":"TARGET:docs/09-PLANNING/TASKS/2026-05-20-human-brief-visual-map-architecture-rebaseline/execution_strategy.md","title":"Execution Strategy","type":"execution-strategy","content":"# Execution Strategy\n\n## Decision Table\n\n| Decision | Choice | Notes |\n| --- | --- | --- |\n| Primary executor | coordinator | 当前阶段只落计划，不实现 public 改动。 |\n| Subagents | reviewer-only | 计划定稿后再让 subagent 审查这个 task folder。 |\n| Review model | adversarial review | 该计划会影响 v1.0 stable IA，不能 self-only。 |\n| Worktree strategy | same checkout | 只写 `.harness-private/docs/` 计划文件，不需要 worktree。 |\n| Conflict control | coordinator owns shared files | public 文件暂不改；已有 unrelated private dirty file 不处理。 |\n| Evidence depth | L1 now / L2 after implementation | 当前只需私有 harness check；实现后需要 full public gates。 |\n\n## Subagent / Worker Contract\n\n| Role | Input Packet | Write Scope | Handoff Required | Owner |\n| --- | --- | --- | --- | --- |\n| IA reviewer | C-001, C-002, this task folder | read-only | P0/P1/P2 findings | subagent |\n| migration reviewer | C-005, this task folder | read-only | P0/P1/P2 findings | subagent |\n| implementation worker | this task folder after approval | public files listed in task_plan | patch + checks | future worker |\n\n## Implementation Split After Approval\n\n后续实现应拆成不重叠写入范围：\n\n| Slice | Owner | Write Scope |\n| --- | --- | --- |\n| Standards/Templates | worker A | `references/`, `templates*/planning/`, `templates*/reference/` |\n| CLI/Checker | worker B | `scripts/lib/harness-core.mjs`, CLI tests |\n| Dashboard Data + Visual Map Rendering | worker C | `templates*/dashboard/assets/`, smoke tests |\n| Dashboard UX Carryover | worker D | `templates*/dashboard/assets/app.css`, `templates*/dashboard/assets/app.js`, `templates*/dashboard/assets/i18n.js`, matching `templates-zh-CN/**` files |\n| Migration Docs | worker E | `docs-release/guides/` bilingual mirrors |\n| Private Closeout | coordinator | `.harness-private/docs/` ledgers/review/closeout |\n\n## Stop / Escalation Conditions\n\n- 用户没有确认本计划前，不改 public 实现。\n- reviewer 发现 P0/P1 后，先修计划再实现。\n- 实现中发现 `visual_map.md` 改名会破坏不可接受的目标项目迁移，需要回到用户确认。\n- 任何改动可能发布 `.harness-private/`、root `AGENTS.md`、root `docs/` 时停止。\n- public 工作树出现与本任务无关 dirty 改动时，不覆盖、不 revert。\n\n## Handoff Format\n\n后续 worker 必须回报：\n\n- 修改文件列表。\n- 对应 slice。\n- 运行命令和结果。\n- 未完成项。\n- 是否影响 public/private boundary。\n"},{"id":"doc-0048-findings","path":"TARGET:docs/09-PLANNING/TASKS/2026-05-20-human-brief-visual-map-architecture-rebaseline/findings.md","title":"Findings","type":"markdown-table","content":"# Findings\n\n## Context\n\n本文件记录本任务形成过程中的设计发现、用户拍板和 subagent 审查输入。当前是计划阶段，不是 public 实现阶段。\n\n## Findings Table\n\n| ID | Severity | Finding | Evidence | Status |\n| --- | --- | --- | --- | --- |\n| F-001 | P1 | 不能新增 `12-SYSTEM-CONTEXT` 来解决系统上下文，否则会造成第二个 architecture 入口。 | subagent A 审查；用户提醒“不要熵增”。 | accepted |\n| F-002 | P1 | `03-ARCHITECTURE` 应承载系统结构事实，但不能承载开发时所有细节。 | 用户确认：“03 更多是系统结构上的东西”。 | accepted |\n| F-003 | P1 | `04-DEVELOPMENT` 可以利用为外部系统开发输入包，比新增目录更低熵。 | 用户确认：“04 DEVELOPMENT 完全可以利用上作为外部系统输入”。 | accepted |\n| F-004 | P1 | `visual_roadmap.md` 文件名会诱导 agent 只画阶段路线图，应直接改名为 `visual_map.md`。 | 用户明确拍板：“我要直接改名，你可以把 CLI 改了”。 | accepted |\n| F-005 | P1 | 旧项目迁移不能长期兼容旧合同，full cutover 必须 canonical rewrite。 | 用户要求“迁移的时候不是兼容，是直接重构”。 | accepted |\n| F-006 | P1 | full cutover 需要机器门禁，否则 subagent 会只列问题或批量生成空模板。 | subagent C review: `migrate-verify` baseline usable 不是 full cutover。 | accepted |\n| F-007 | P2 | `06-INTEGRATIONS` 当前体感不强，需要通过模板和样例定义为接口合同层。 | 用户反馈“06 目前没有太理解”。 | open |\n| F-008 | P2 | Antigravity/Gemini 的 Dashboard 视觉计划是可采用的半成品，但需要补齐 i18n、双语同步、可访问性、宽屏/移动视觉回归后才能实现。 | `EXTERNAL:LOCAL_PATH_REDACTED` | accepted |\n| F-009 | P1 | Dashboard UX 已有 public 半成品改动，但目前只覆盖 zh-CN asset，且存在未同步 English、CSS 变量名不匹配、inline style、completion 未 clamp、缺 aria/截图证据等缺口。 | `git diff -- templates-zh-CN/dashboard/assets/{app.css,app.js,i18n.js}` | accepted |\n\n## Design Decisions\n\n1. 不新增顶层目录。\n2. 用 `03/04/06` 分层表达系统结构、开发上下文、接口合同。\n3. `visual_map.md` 是 canonical 新文件名。\n4. `visual_roadmap.md` 只作为旧项目迁移输入。\n5. 后续实现必须双语更新 public docs。\n6. Dashboard UX carryover 作为独立 implementation slice，不混入 03/04/06 文档 IA slice。\n"},{"id":"doc-0049-progress","path":"TARGET:docs/09-PLANNING/TASKS/2026-05-20-human-brief-visual-map-architecture-rebaseline/progress.md","title":"Progress","type":"task-progress","content":"# Progress\n\n## Status\n\ndone\n\n## Updates\n\n| Date | Update | Evidence |\n| --- | --- | --- |\n| 2026-05-20 | 用户确认不新增 `12`，采用 `03/04/06` 分层，并要求落成正式 task folder。 | report:PRIVATE:brief.md:created |\n| 2026-05-20 | 补强 Template / CLI Contract，明确 `03/04/06` 模板、`visual_map.md` canonical 生成规则、checker 分层和 full cutover 门禁。 | report:PRIVATE:task_plan.md:updated |\n| 2026-05-20 | 合并 Antigravity/Gemini 半成品 Dashboard 视觉计划为 Dashboard UX Carryover slice，补齐双语、i18n、可访问性和视觉回归约束。 | evidence:EXTERNAL:LOCAL_PATH_REDACTED |\n| 2026-05-20 | 记录 public 工作树中已存在的 zh-CN Dashboard 半成品实现，并把“接管、补齐、修正”写入后续 Dashboard UX slice。 | evidence:PUBLIC:templates-zh-CN/dashboard/assets/app.css,app.js,i18n.js:dirty |\n| 2026-05-20 | Public implementation 完成：`visual_map.md` 成为 canonical，`visual_roadmap.md` 降级为 legacy rewrite input；03/04/06 模板、checker、docs-release、dashboard summary、full-cutover verifier 拉通。 | evidence:PUBLIC:scripts/lib/harness-core.mjs;PUBLIC:templates*/planning/visual_map.md;PUBLIC:references/docs-directory-standard.md |\n| 2026-05-20 | 本体门禁通过：`npm test`、`npm run smoke:dashboard`、source-package check、minimal-project check、private-harness check。 | evidence:command:local:2026-05-20 |\n| 2026-05-20 | 新项目冒烟通过：`LOCAL_PATH_REDACTED` 从零 init + new-task，生成真实任务和 `visual_map.md`，没有 `visual_roadmap.md`；target-project check pass；dashboard 打开。 | evidence:TARGET:LOCAL_PATH_REDACTED |\n| 2026-05-20 | 旧项目迁移冒烟由 GPT-5.4 mini subagent Cicero 完成：Agora 471 个任务 full cutover，normal/strict pass，`migrate-verify --full-cutover` pass。 | evidence:session:LOCAL_PATH_REDACTED |\n"},{"id":"doc-0050-review","path":"TARGET:docs/09-PLANNING/TASKS/2026-05-20-human-brief-visual-map-architecture-rebaseline/review.md","title":"Review","type":"task-review","content":"# Review\n\ntemplate_id: harness-verifier/v1\nverdict: pass\n\n## Reviewer Identity\n\n| Reviewer | Type | Scope |\n| --- | --- | --- |\n| pending-subagent-A | adversarial-review | directory IA / anti-entropy |\n| pending-subagent-B | adversarial-review | task三件套 / visual_map rename |\n| pending-subagent-C | adversarial-review | legacy migration / full cutover |\n| Cicero | GPT-5.4 mini worker | Agora legacy migration execution smoke |\n\n## Confidence Challenge\n\n最强反对意见：这套计划可能仍然过度复杂，把“系统结构、开发输入、接口合同、任务图表、promotion gate、full cutover checker”一次性塞进 v1.0，导致实现面过大。\n\n当前缓解：\n\n- 不新增顶层目录。\n- 已把 03 / 04 / 06 拆成模板、标准和 checker 规则。\n- 已完成三路对抗审查并按 P1/P2 修正 public 实现。\n- 旧项目迁移证明改由 GPT-5.4 mini subagent 执行，主代理不把自己的机械迁移当证明。\n- implementation 按 public harness、new project smoke、legacy migration smoke 分段验收。\n\n## Evidence Checked\n\n| Evidence ID | Type | Path | Summary |\n| --- | --- | --- | --- |\n| E-001 | external | `EXTERNAL:LOCAL_PATH_REDACTED).md` | 多仓 workspace 架构参考。 |\n| E-002 | private-plan | `PRIVATE:docs/09-PLANNING/TASKS/2026-05-20-human-brief-visual-map-architecture-rebaseline/task_plan.md` | 当前正式计划。 |\n| E-003 | review | `PRIVATE:docs/09-PLANNING/TASKS/2026-05-20-human-brief-visual-map-architecture-rebaseline/findings.md` | 已知设计 findings。 |\n| E-004 | verifier | `PUBLIC:scripts/test-harness.mjs` | `visual_map.md`、full-cutover、dashboard summary 字段回归。 |\n| E-005 | smoke | `LOCAL_PATH_REDACTED` | 新项目从零 init + new-task + dashboard 冒烟通过。 |\n\n## Findings\n\n| ID | Severity | Finding | Evidence Checked | Required Action | Open | Disposition | Blocks Release | Follow-up |\n| --- | --- | --- | --- | --- | --- | --- | --- | --- |\n| R-001 | P1 | Subagent review not yet run against this final task folder | E-002 | Run three reviewer lanes after user review | no | closed | no | completed |\n| R-002 | P2 | `06-INTEGRATIONS` needs examples to become intuitive | E-002 | Add template/examples during implementation | no | mitigated | no | templates and checker added |\n| R-003 | P1 | Legacy migration proof must be subagent-owned, not coordinator-owned | E-002 | Delegate Agora full-cutover smoke to GPT-5.4 mini worker | no | closed | no | Cicero passed full-cutover |\n\n## Decision\n\nPass for this task slice. Public implementation, new-project smoke, and GPT-5.4 mini legacy migration smoke all have command evidence.\n\n## Final Confidence Basis\n\nFinal confidence is based on three earlier adversarial reviews, public unit/check/dashboard gates, acpx new-project smoke, and Cicero's GPT-5.4 mini Agora migration proof: `migrate-run` completed with normal/strict pass and `migrate-verify --full-cutover` passed against `LOCAL_PATH_REDACTED`.\n"},{"id":"doc-0051-task-plan","path":"TARGET:docs/09-PLANNING/TASKS/2026-05-20-human-brief-visual-map-architecture-rebaseline/task_plan.md","title":"Human Brief / Visual Map / Architecture Rebaseline Task Plan","type":"markdown-table","content":"# Human Brief / Visual Map / Architecture Rebaseline Task Plan\n\n## 目标\n\n把 v1.0 的任务文档与知识目录标准重新定稳，形成一份可审查、可执行、低熵的完整计划。后续实现必须按这份计划改 public 模板、CLI、checker、dashboard 和迁移 prompt。\n\n核心结论：\n\n1. 不新增 `docs/12-SYSTEM-CONTEXT/`。\n2. `03-ARCHITECTURE/` 表达系统结构事实，包括本服务结构和外部系统结构。\n3. `04-DEVELOPMENT/` 表达开发上下文输入包，包括外部服务开发摘要、mock/stub、跨仓调试、运行时注意事项。\n4. `06-INTEGRATIONS/` 表达具体接口合同和集成细节。\n5. `brief.md` 是人类任务入口。\n6. `visual_map.md` 是任务图表集合的 canonical 文件名。\n7. `execution_strategy.md` 是 agent 执行合同。\n8. 旧项目迁移是 canonical rewrite，不是长期兼容旧格式。\n\n## 范围\n\n范围内：\n\n- 私有 task folder 的完整计划文档。\n- 后续 public 实现范围定义。\n- subagent 审查输入包和验收标准。\n- 新旧迁移策略边界。\n\n范围外：\n\n- 当前回合不实现 public CLI/checker/dashboard。\n- 当前回合不改 npm package 版本。\n- 当前回合不重跑 Agora / ACPX 迁移。\n- 当前回合不提交 public 代码。\n\n## Task IA Budget\n\n| Budget | Use When | Required Structure |\n| --- | --- | --- |\n| complex | 影响 public 标准、模板、CLI、dashboard、迁移 prompt，并需要 subagent 对抗审查 | 标准 task files + `findings.md` + `review.md` |\n\n不创建 `references/INDEX.md` 和 `artifacts/INDEX.md`，因为当前资料可以直接在 `brief.md` / `task_plan.md` 中稳定引用；如果后续 subagent 产出长报告，再升级为 artifacts。\n\n## Context Packet\n\n| ID | Type | Path | Why It Matters | Used By |\n| --- | --- | --- | --- | --- |\n| C-001 | external | `EXTERNAL:LOCAL_PATH_REDACTED).md` | 用户朋友的多仓、多应用、团队规则、迭代仓库、应用 worktree 架构参考。 | coordinator / reviewer |\n| C-002 | public-doc | `PUBLIC:references/docs-directory-standard.md` | 当前 docs 树和裁剪规则。 | coordinator / reviewer / worker |\n| C-003 | public-doc | `PUBLIC:references/planning-loop.md` | 当前任务三件套与 visual roadmap 标准。 | coordinator / reviewer / worker |\n| C-004 | public-code | `PUBLIC:scripts/lib/harness-core.mjs` | CLI/checker/dashboard 数据收集对 `visual_roadmap.md` 的现有依赖。 | implementation worker |\n| C-005 | public-doc | `PUBLIC:docs-release/guides/*migration*` | 迁移 prompt 和 full cutover 策略需要同步改写。 | migration worker / reviewer |\n| C-006 | private-review | `PRIVATE:docs/09-PLANNING/TASKS/2026-05-20-human-brief-visual-map-architecture-rebaseline/findings.md` | 本任务设计审查意见和用户拍板记录。 | coordinator / reviewer |\n| C-007 | external-plan | `EXTERNAL:LOCAL_PATH_REDACTED` | Antigravity/Gemini 半成品 Dashboard 视觉计划：全宽布局、任务索引统计条、任务卡片行、任务组头、双语 dashboard asset 影响面。 | dashboard worker / UX reviewer |\n\n## 当前目录职责重定义\n\n不新增 `12-SYSTEM-CONTEXT`。现有目录按以下方式承载更多信息：\n\n| 目录 | 新职责 | 放什么 | 不放什么 |\n| --- | --- | --- | --- |\n| `02-PRODUCT/` | 业务/领域认知 | 业务域、术语、用户流程、业务规则、领域对象 | 技术拓扑、接口 payload |\n| `03-ARCHITECTURE/` | 系统结构事实源 | 本服务架构、外部系统结构、服务地图、关键跨服务流、ADR | 具体 API 参数、开发 mock、任务执行日志 |\n| `04-DEVELOPMENT/` | 开发上下文输入包 | 当前仓运行、外部服务开发摘要、mock/stub、跨仓调试、代码生成、agent 编码前输入 | 系统事实源、长期接口合同 |\n| `05-TEST-QA/` | 测试和回归事实 | Regression SSoT、Cadence、测试策略 | 架构图、开发上下文 |\n| `06-INTEGRATIONS/` | 接口合同和集成细节 | API contract、event contract、webhook、SDK、第三方接入 | 整体系统地图、服务 ownership catalog |\n| `07-OPERATIONS/` | 运行和部署 | 部署、监控、告警、运行手册 | 设计期系统上下文 |\n| `08-SECURITY/` | 安全事实和策略 | 权限模型、审计、安全规则 | 一般服务地图 |\n| `09-PLANNING/` | 任务与交付计划 | task、module、Delivery SSoT、Feature SSoT | 长期架构事实 |\n| `11-REFERENCE/` | 规则和标准 | agent 读写规则、目录标准、checker 标准 | 项目事实、业务事实 |\n\n## `03-ARCHITECTURE/` 标准结构\n\n`03` 是系统结构事实源。对单仓项目，它描述本仓架构；对微服务项目，它也描述当前仓所在大系统的最小结构上下文。\n\n推荐结构：\n\n```text\ndocs/03-ARCHITECTURE/\n├── README.md\n├── Architecture-SSoT.md\n├── local-repo-context.md\n├── system-map.md\n├── service-catalog.md\n├── critical-flows.md\n├── services/\n│   └── \u003cservice-key>.md\n├── decisions/\n│   └── ADR-0001-example.md\n├── promoted-from-tasks/\n│   └── INDEX.md\n└── _archive/\n```\n\n最小创建规则：\n\n| 项目类型 | 最小文件 |\n| --- | --- |\n| 小型库 / CLI | `README.md`, `Architecture-SSoT.md` |\n| 单应用 / 单服务 | 加 `local-repo-context.md` |\n| 大系统中的一个服务 | 加 `system-map.md`, `service-catalog.md`, `critical-flows.md` |\n| 20+ 服务平台 | 加 `services/\u003cservice-key>.md`，`service-catalog.md` 只保留紧凑索引 |\n\n`service-catalog.md` 最小列：\n\n| Column | Meaning |\n| --- | --- |\n| Service / Component | 稳定服务 key |\n| Owner | 团队或维护人 |\n| Repo / Path | repo URL、本地路径、包名或 unavailable |\n| Responsibility | 它负责什么 |\n| Interfaces | API/event/queue/interface 摘要或链接 |\n| Data Owned | 数据域 |\n| Dependencies | 上下游服务 key |\n| Read Before | 触碰该服务时 agent 应读的文件 |\n| Source Evidence | docs、code、owner note、discovery command |\n| Last Verified | 日期或 unknown |\n| Stale After | 复核日期或触发条件 |\n| Confidence | high / medium / low |\n\n## `04-DEVELOPMENT/` 开发上下文输入包\n\n`04` 不是系统事实源，而是 agent 编码时的输入包层。它承载比 `03` 更细、更贴近开发动作的外部知识。\n\n推荐结构：\n\n```text\ndocs/04-DEVELOPMENT/\n├── README.md\n├── local-setup.md\n├── codebase-map.md\n├── external-context/\n│   └── \u003cservice-key>.md\n├── stubs-and-mocks.md\n├── cross-repo-debugging.md\n└── _archive/\n```\n\n分工：\n\n- `README.md`：开发上下文入口，告诉 agent 当前任务什么时候读哪些文件。\n- `local-setup.md`：当前仓启动、调试、环境变量。\n- `codebase-map.md`：当前仓代码目录、核心模块、常见入口。\n- `external-context/\u003cservice-key>.md`：看不到外部仓时，agent 需要的服务摘要、调用习惯、mock 方式、常见失败、注意事项。\n- `stubs-and-mocks.md`：如何模拟外部服务。\n- `cross-repo-debugging.md`：跨服务排障方法。\n\n`04` 与 `03/06` 的边界：\n\n```text\n03 = 它在系统里是什么\n04 = 我开发当前仓时怎么面对它\n06 = 我和它具体怎么对接\n```\n\n## `06-INTEGRATIONS/` 接口合同层\n\n`06` 暂时不扩张成系统上下文，只保留接口和集成细节。\n\n推荐结构：\n\n```text\ndocs/06-INTEGRATIONS/\n├── README.md\n├── \u003cservice>-api-contract.md\n├── \u003cevent>-contract.md\n├── \u003cwebhook>-contract.md\n├── third-party/\n│   └── \u003cvendor>.md\n└── _archive/\n```\n\n适用内容：\n\n- endpoint、payload、错误码、鉴权。\n- event schema、queue topic、webhook。\n- SDK 使用约束。\n- contract test 入口。\n- 第三方服务集成细节。\n\n不适用内容：\n\n- 全局微服务拓扑。\n- 服务 ownership catalog。\n- 开发 mock 说明。\n\n## 任务三件套重定义\n\n### `brief.md`\n\n人类任务入口。看完后，人应该能理解目标、状态、风险、证据入口、下一步。\n\n必需结构：\n\n```markdown\n# Brief\n\n## 一句话结论 / One-Sentence Outcome\n\n## Human Read Order\n\n## Task Classification\n\n## Goal and Non-Goals\n\n## Current Status Judgment\n\n## Key Visual Maps\n\n## Evidence Sources\n\n## Risks and Residuals\n\n## Next Action\n\n## Promotion Candidates\n```\n\n机器可读行：\n\n```text\nTask Classification: active | reopened | current-evidence | historical-with-diagram | historical-no-map-needed | unknown-needs-human\nVisual Map Status: present | not-needed | missing\nVisual Map Path: visual_map.md | n/a\n```\n\n### `visual_map.md`\n\ncanonical 新文件名。旧 `visual_roadmap.md` 会引导 agent 只画路线图，所以必须改名。\n\n`visual_map.md` 是任务图表集合，不要求所有图都存在。只有有助于理解的图才放进去。\n\n允许图类型：\n\n- phase：任务阶段关系。\n- architecture：模块/组件结构。\n- sequence：前后端、服务、数据库、agent 时序。\n- data-flow：数据流转。\n- state：状态机。\n- topology：服务、repo、worker、worktree 拓扑。\n- decision：方案分叉和决策树。\n\n最小结构：\n\n```markdown\n# Visual Map\n\nVisual Map Contract: v1.0\n\n## Map Index\n\n| ID | Type | Purpose | Required For Understanding | Source Evidence | Promotion Candidate |\n| --- | --- | --- | --- | --- | --- |\n\n## Phase Map\n\n## Supporting Maps\n```\n\n规则：\n\n- 活跃、重开、当前证据、历史但图表有价值的任务需要 `visual_map.md`。\n- 已关闭且不需要图的历史任务不强制创建空文件，但 `brief.md` 必须写 `Visual Map Status: not-needed` 和原因。\n- `visual_roadmap.md` 只作为旧迁移输入，不算 full cutover canonical 证据。\n\n### `execution_strategy.md`\n\nagent 执行合同，不承担人类解释任务。\n\n必须表达：\n\n- 主执行者。\n- 是否使用 subagent。\n- 串行 / 并行模式。\n- worker 输入包。\n- worker 写入范围。\n- shared-file coordinator 规则。\n- handoff 格式。\n- 验证深度。\n- stop / escalation condition。\n\n## Template / CLI Contract\n\n本次 rebaseline 不是只改文档说法；后续 public 实现必须让模板、CLI、checker、dashboard 一起执行同一套规范。\n\n### 模板产出规则\n\n后续模板必须让 agent 生成结构化文件，而不是一股脑把外部知识塞进任意目录。\n\n| Target | Required Templates | Contract |\n| --- | --- | --- |\n| `03-ARCHITECTURE/` | `README.md`, `Architecture-SSoT.md`, `local-repo-context.md`, `system-map.md`, `service-catalog.md`, `critical-flows.md`, `services/\u003cservice-key>.md` | 每个结构事实要有 source evidence、last verified、confidence；大系统信息先进入 catalog/index，不直接堆长文。 |\n| `04-DEVELOPMENT/` | `README.md`, `local-setup.md`, `codebase-map.md`, `external-context/\u003cservice-key>.md`, `stubs-and-mocks.md`, `cross-repo-debugging.md` | 只承载 agent 开发当前仓需要的输入包；每个外部服务摘要必须写“开发时需要知道什么”和“不能假设什么”。 |\n| `06-INTEGRATIONS/` | `README.md`, `\u003cservice>-api-contract.md`, `\u003cevent>-contract.md`, `\u003cwebhook>-contract.md`, `third-party/\u003cvendor>.md` | 只承载接口合同、payload、错误码、鉴权、事件、SDK 和 contract test 入口。 |\n| `09-PLANNING/TASKS/\u003ctask>/` | `brief.md`, `task_plan.md`, `execution_strategy.md`, `visual_map.md`, `findings.md`, `progress.md`, `review.md` | `brief.md` 给人读，`visual_map.md` 给图表，`execution_strategy.md` 给执行者，`task_plan.md` 给 scope 和验收。 |\n\n模板必须中英双语同步更新，且不能只改 English 或只改 zh-CN。\n\n### CLI 生成规则\n\n后续 CLI 行为必须改成 canonical `visual_map.md`：\n\n| Command / Flow | Required Change |\n| --- | --- |\n| `harness init` / bootstrap file generation | 新项目模板目录生成 `visual_map.md`，不再生成 `visual_roadmap.md`。 |\n| `harness new-task` | 创建 `brief.md`, `task_plan.md`, `execution_strategy.md`, `visual_map.md`, `findings.md`, `progress.md`, `review.md`。 |\n| `harness new-task --module` | module task 也使用 `visual_map.md`；模块级模板同步改名。 |\n| `harness task-phase` | 更新 `visual_map.md` 的 phase map row；如果只存在 `visual_roadmap.md`，给出 legacy rewrite 提示而不是静默写旧文件。 |\n| `harness task-list` / dashboard data | 暴露 `visualMapSource: canonical | legacy | missing | not-needed`，让 dashboard 可以分组显示。 |\n| `harness check --profile target-project` | 普通 profile 对 active/current 任务要求 canonical `visual_map.md` 或明确 not-needed；legacy-only 只算 warning。 |\n| `harness check --profile source-package` | 继续拦截 `.harness-private/`、root `AGENTS.md`、root `docs/**`，并检查 public templates 不再引用旧 canonical 文件名。 |\n| `harness migrate-plan` | 把旧 `visual_roadmap.md` 识别为 rewrite input，输出 `visual_map.md` canonical action。 |\n| `harness migrate-run` | 不覆盖旧 evidence；生成/改写 canonical `visual_map.md` 并在 progress 记录 source。 |\n| `harness migrate-verify --full-cutover` | legacy-only visual source、unknown classification、weak brief、blocking promotion 都必须失败。 |\n\n### Checker 规范\n\n后续 checker 必须区分“可以迁移使用”和“完整 1.0 cutover”：\n\n| Level | Meaning | Acceptance |\n| --- | --- | --- |\n| baseline adoption | 项目可以先接入 harness，dashboard 能打开 | 允许 legacy residual，有明确 warnings/actions。 |\n| readable cutover | 人能通过 dashboard / brief 理解所有任务 | 每个任务有 useful `brief.md`，历史任务可 `Visual Map Status: not-needed`。 |\n| full canonical cutover | 旧格式已被重构成 v1.0 canonical | 没有 legacy-only task contract；需要 `visual_map.md` 的任务都有 canonical 文件和 source evidence。 |\n\n## Dashboard UX Carryover\n\n用户补充的 Antigravity/Gemini 半成品计划纳入本任务后续实现范围，但作为独立 Dashboard slice 执行，避免把 UI polish 和文档 IA 混成一个不可审查的大改。\n\n### 当前半成品状态\n\npublic 工作树已经存在一部分未提交 Dashboard 改动。后续 worker 必须接管这些改动继续做完，而不是忽略、覆盖或从零重写。\n\n已存在改动：\n\n| File | Current Partial State | Must Fix Before Completion |\n| --- | --- | --- |\n| `templates-zh-CN/dashboard/assets/app.css` | 已改 `visibility-shell` 全宽；已增加 `task-stats-bar`、`task-row-card`、group progress、mobile fallback。 | 同步到 English CSS；确认 12px radius 是否沿用当前 dashboard 既有风格；检查 mobile overflow；去掉不必要的 `backdrop-filter`。 |\n| `templates-zh-CN/dashboard/assets/app.js` | 已增加 `stateToColor()`、`taskStatsBar()`；已改 `taskGroup()` 和 `taskRow()`。 | 同步到 English JS；修复 `--color-fail` / `--color-pass` 这类当前 CSS 中不存在的变量；去掉 inline style；completion clamp 到 `0..100`；brief 图标补 `aria-label` 或 title。 |\n| `templates-zh-CN/dashboard/assets/i18n.js` | 已增加 `statTotal` / `statInProgress` / `statReview` / `statBlocked` / `statDone` / `statOverall`。 | 同步到 English i18n；确认 key 命名与现有 `state_*` / `column*` 体系一致。 |\n\n已知缺口：\n\n- English dashboard asset 仍未同步。\n- 自动测试尚未覆盖 stats bar / card row / i18n keys。\n- 还没有 Agora dashboard 视觉截图证据。\n- 这部分 public dirty file 不属于当前 plan-only 私有文档修改，后续实现前要先确认是否继续接管这些未提交改动。\n\n### 目标\n\n修复当前 dashboard 宽屏和任务索引页的可用性问题：\n\n1. `visibility-shell` 不应被窄 `max-width` 限死；宽屏上要利用可用空间。\n2. `#/tasks` 任务索引页不能像孤立表格；应与总览页、模块页保持同一视觉语言。\n3. 任务索引需要更强的信息密度：总数、状态分布、整体完成率、组内分页、单任务状态/brief/进度都应一眼可扫。\n\n### 采用的实现方向\n\n| Area | Decision | Notes |\n| --- | --- | --- |\n| 全局容器 | 采用全宽流式布局 | `.visibility-shell` 改为 `width: 100%` + responsive horizontal padding；默认采用原计划的方案 A，不做超宽双列任务 grid。 |\n| 任务统计条 | 采用 | 在 search/filter 上方显示 total / in-progress / blocked / done / overall completion。 |\n| 任务行 | 采用 card-like row | 仍保持单列列表和分页，不改信息架构；增加左侧状态色条、状态胶囊、微型进度条、brief readiness 图标。 |\n| 任务组头 | 采用 | 组头显示组名、范围、分页、组内平均完成率；保留分页，不回退为无限长列表。 |\n| 双语 | 必须同步 | 所有 label 走 `i18n.js`，不能硬编码中文或英文。 |\n| 视觉风格 | 复用现有 dashboard 变量 | 使用当前 obsidian / amber / gold 变量；不要引入新主题系统。 |\n\n### 需要修正原半成品计划的点\n\n| Issue | Fix |\n| --- | --- |\n| 原计划示例里有硬编码中文，如“总计”“进行中” | 改为 `t(\"taskTotal\")`、`t(\"taskInProgress\")` 等 i18n keys。 |\n| 原计划只说明“两个语言版本”，但没有明确双语一致性 gate | `templates/dashboard/assets/*` 与 `templates-zh-CN/dashboard/assets/*` 必须同改，并由 smoke/test 覆盖。 |\n| 原计划使用 `✓ / ○` 字符表达 brief 状态 | 可以使用文字隐藏 label + 符号视觉，但必须有 `aria-label` 或 title；dashboard 静态 HTML 要可访问。 |\n| 原计划没有处理 task completion 缺省值 | 实现时使用 `Number(task.completion) || 0` 并 clamp 到 `0..100`。 |\n| 原计划没有定义状态颜色映射 | 添加 `stateToColorVar(state)`，只返回 CSS variable，不拼 arbitrary style。 |\n| 原计划没有明确视觉回归视口 | 至少验证 1440, 1920, 2560 desktop；另测 390/430 mobile，确认任务行不溢出。 |\n\n### Dashboard Slice Files\n\n| File | Required Change |\n| --- | --- |\n| `templates/dashboard/assets/app.css` | 全宽 shell、task stats bar、task row card、group head、mobile fallback。 |\n| `templates-zh-CN/dashboard/assets/app.css` | 与 English CSS 同步。 |\n| `templates/dashboard/assets/app.js` | `taskStatsBar()`, `taskRow()`, `taskGroup()`，i18n label，不硬编码中文。 |\n| `templates-zh-CN/dashboard/assets/app.js` | 与 English JS 同步。 |\n| `templates/dashboard/assets/i18n.js` | 新增 task stats / completion / brief icon labels。 |\n| `templates-zh-CN/dashboard/assets/i18n.js` | 新增对应中文键。 |\n| `scripts/test-harness.mjs` | smoke 断言 stats bar / upgraded task row / i18n keys 存在。 |\n\n### Dashboard UX Verification\n\n后续 Dashboard slice 完成后，除标准命令外，还必须做视觉验证：\n\n```bash\nnpm run smoke:dashboard\nnpm test\nnode scripts/harness.mjs dashboard --locale zh-CN LOCAL_PATH_REDACTED --out LOCAL_PATH_REDACTED\nnode scripts/harness.mjs dashboard --locale en-US examples/minimal-project --out LOCAL_PATH_REDACTED\n```\n\nBrowser / Playwright 检查：\n\n- 打开 Agora dashboard 的 `#/tasks`。\n- 截图 1440x900、1920x1080、2560x1440。\n- 截图移动宽度 390x844 或 430x932。\n- 确认 shell 不再窄居中、任务索引视觉和总览页一致、分页仍可用、无文字重叠、无横向溢出。\n\n## Architecture Promotion Gate\n\n任务内知识只有经过 promotion 才变成项目长期事实。\n\n流程：\n\n```text\ntask brief / visual_map / findings\n  -> Promotion Candidates\n  -> review or closeout decision\n  -> promoted to 02-PRODUCT, 03-ARCHITECTURE, 04-DEVELOPMENT, 06-INTEGRATIONS, or 11-REFERENCE\n  -> corresponding README / SSoT / index updated\n  -> task brief keeps source backlink\n```\n\npromotion 表：\n\n| Candidate ID | Type | Destination | Source Evidence | Decision | Owner | Target Path | Status | Blocking |\n| --- | --- | --- | --- | --- | --- | --- | --- | --- |\n| PC-001 | product / architecture / development / integration / reference | `02` / `03` / `04` / `06` / `11` | path | promote / defer / reject / n/a | owner | path | promoted / deferred / rejected / n/a | yes / no |\n\n目的地规则：\n\n| 内容 | 目的地 |\n| --- | --- |\n| 业务规则、领域术语、用户流程 | `02-PRODUCT/` |\n| 系统结构、服务职责、跨服务流、ADR | `03-ARCHITECTURE/` |\n| 开发上下文、外部服务摘要、mock/stub、跨仓调试 | `04-DEVELOPMENT/` |\n| API/event/webhook/SDK/第三方合同 | `06-INTEGRATIONS/` |\n| agent 规则、流程、checker 标准 | `11-REFERENCE/` |\n\n## 旧项目迁移策略\n\n旧项目迁移不是兼容，而是重构。\n\n允许：\n\n- 读取旧 `visual_roadmap.md` 作为输入证据。\n- 读取旧 `task_plan.md` 中嵌入的 Mermaid/roadmap。\n- 保留旧文件作为 legacy evidence。\n\n不允许在 full cutover 中：\n\n- 因为旧 `visual_roadmap.md` 存在就认为完成。\n- 用 task_plan 内嵌 roadmap 当 canonical visual contract。\n- 给所有历史任务机械生成空 visual map。\n- 把 unknown 任务默认为 not-needed。\n\n任务迁移分类：\n\n| Classification | Meaning | Required final state |\n| --- | --- | --- |\n| `active` | 当前执行中 | useful `brief.md`, `visual_map.md`, `execution_strategy.md` |\n| `reopened` | 历史任务被重开 | useful `brief.md`, `visual_map.md`, `execution_strategy.md` |\n| `current-evidence` | 历史任务仍是当前 release/regression 证据 | useful `brief.md`, `visual_map.md` if structure matters, `execution_strategy.md` if work remains |\n| `historical-with-diagram` | 已关闭但图表有长期理解价值 | useful `brief.md`, `visual_map.md` |\n| `historical-no-map-needed` | 已关闭且无需图表 | useful `brief.md`, not-needed reason |\n| `unknown-needs-human` | 证据不足 | 阻塞 full cutover |\n\n## Full Cutover Checker Contract\n\n后续实现必须新增 full-cutover 级别验证。普通 `migrate-verify` 只能证明 session usable；full cutover 需要更硬的门禁。\n\n建议命令：\n\n```bash\nharness migrate-verify --full-cutover LOCAL_PATH_REDACTED\n```\n\n必须暴露字段：\n\n| Field | Meaning |\n| --- | --- |\n| `task.classification` | 六类迁移分类 |\n| `task.briefQuality` | pass / fail + issue types |\n| `task.visualMapStatus` | present / not-needed / missing / legacy-only |\n| `task.visualMapSource` | canonical / legacy / none |\n| `task.legacyVisualRoadmapPresent` | true / false |\n| `task.promotionStatus` | clear / deferred / blocking / none |\n| `summary.fullCutoverEligible` | 所有门禁通过才 true |\n| `summary.weakBriefCount` | weak brief 数量 |\n| `summary.legacyVisualOnlyCount` | 只依赖旧 visual_roadmap 的任务数 |\n| `summary.unknownClassificationCount` | unknown 任务数 |\n| `summary.blockingPromotionCount` | 未解决 promotion 阻塞数 |\n\nfull cutover 失败条件：\n\n- `migrate-plan` 不是 `declared-capability`。\n- warnings/actions/residuals 非零。\n- recommended capabilities 非空。\n- normal 或 strict check 失败。\n- 任一任务缺 useful `brief.md`。\n- 任一任务为 `unknown-needs-human`。\n- active/reopened/current-evidence/historical-with-diagram 缺 canonical `visual_map.md`。\n- `visual_map.md` 缺 `Visual Map Contract: v1.0`。\n- 任务只有 legacy visual source 却被算作覆盖。\n- visual map 没有 source evidence 或 map reason。\n- historical task 无证据却声称 active。\n- blocking promotion candidate 未解决。\n- dashboard data 缺 task plan / execution strategy / progress / review source path。\n\n## 后续实现范围\n\n公共文件后续要改：\n\n- `references/planning-loop.md`\n- `references/docs-directory-standard.md`\n- `templates/reference/docs-library-standard.md`\n- `templates-zh-CN/reference/docs-library-standard.md`\n- `templates/planning/brief.md`\n- `templates-zh-CN/planning/brief.md`\n- `templates/planning/visual_map.md`\n- `templates-zh-CN/planning/visual_map.md`\n- `templates/planning/execution_strategy.md`\n- `templates-zh-CN/planning/execution_strategy.md`\n- `templates/planning/task_plan.md`\n- `templates-zh-CN/planning/task_plan.md`\n- module planning templates\n- dashboard assets / i18n，包括 C-007 的全宽布局和任务索引视觉重构\n- `scripts/lib/harness-core.mjs`\n- `scripts/test-harness.mjs`\n- `docs-release/guides/*` 双语迁移文档\n\n## 验证要求\n\n后续 implementation 完成后至少跑：\n\n```bash\nnpm test\nnpm run smoke:dashboard\nnode scripts/harness.mjs check --profile source-package .\nnode scripts/harness.mjs check --profile target-project examples/minimal-project\nnode scripts/harness.mjs check --profile private-harness .harness-private\n```\n\n还要新增/更新回归：\n\n1. 新项目初始化生成 `visual_map.md`，不生成 `visual_roadmap.md`。\n2. `task-phase` 更新 `visual_map.md`。\n3. dashboard 读取 `visual_map.md`。\n4. 旧项目迁移识别 `visual_roadmap.md` 为 rewrite input。\n5. full-cutover verify 不接受 legacy visual source。\n6. 03/04/06 模板路径和 routing 可被 dashboard/status 识别。\n7. dashboard 任务索引页在宽屏和移动端都不溢出，stats bar / card row / pagination 均可见。\n\n## 审查问题\n\n请 reviewer 重点审查：\n\n1. 不新增 `12` 是否真的防熵增。\n2. `03/04/06` 分工是否清晰 enough，不会互相抢职责。\n3. `visual_map.md` 直接改名是否值得一次性改 CLI/checker/dashboard。\n4. full cutover checker contract 是否足够阻止旧格式残留。\n5. `04-DEVELOPMENT/external-context` 是否是承载外部系统输入的合适位置。\n6. 计划是否过度复杂，是否可以删减。\n7. C-007 的 Dashboard UX 改造是否应该和 `visual_map.md` 改名同轮执行，还是拆到 implementation 后半段，避免互相干扰。\n"},{"id":"doc-0052-visual-map","path":"TARGET:docs/09-PLANNING/TASKS/2026-05-20-human-brief-visual-map-architecture-rebaseline/visual_map.md","title":"Visual Map","type":"visual-map","content":"# Visual Map\n\nVisual Map Contract: v1.0\n\nThis is the canonical v1 visual map for the task. The previous `visual_roadmap.md`\nfile remains historical input only.\n\n## Map Index\n\n| Map ID | Type | Purpose | Source Evidence | Last Verified | Confidence |\n| --- | --- | --- | --- | --- | --- |\n| VM-01 | phase-flow | Show the implementation and smoke-test path for PF-007 | task_plan.md / progress.md / review.md | 2026-05-20 | medium |\n\n## Phase Flow\n\n```mermaid\nflowchart LR\n  PH01[\"PH-01 Plan\"] --> PH02[\"PH-02 Adversarial Review\"]\n  PH02 --> PH03[\"PH-03 Public Implementation\"]\n  PH03 --> PH04[\"PH-04 Harness Gates\"]\n  PH04 --> PH05[\"PH-05 New Project Smoke\"]\n  PH05 --> PH06[\"PH-06 Legacy Migration Subagent Smoke\"]\n  PH06 --> PH07[\"PH-07 Closeout\"]\n```\n\n| Phase ID | Depends On | State | Completion | Output | Required Evidence | Evidence Status | Blocking Risk | Owner / Handoff |\n| --- | --- | --- | ---: | --- | --- | --- | --- | --- |\n| PH-01 | none | done | 100 | Formal task folder and implementation plan | task_plan.md | present | none | coordinator |\n| PH-02 | PH-01 | done | 100 | Three adversarial review reports | review.md / subagent reports | present | none | reviewers |\n| PH-03 | PH-02 | done | 100 | Public templates, CLI, checker, dashboard, migration docs | public diff | present | none | coordinator |\n| PH-04 | PH-03 | done | 100 | Unit, dashboard, source, minimal, private gates pass | command output | present | none | coordinator |\n| PH-05 | PH-04 | done | 100 | acpx new-project smoke with real task and dashboard | acpx status/dashboard | present | none | coordinator |\n| PH-06 | PH-05 | in_progress | 60 | Agora legacy migration proven by GPT-5.4 mini subagent | subagent report + migrate-verify --full-cutover | partial | must be subagent-owned | Cicero |\n| PH-07 | PH-06 | planned | 0 | private closeout and final report | progress.md / Harness-Ledger.md | missing | depends on PH-06 | coordinator |\n\nAllowed `State`: `planned`, `in_progress`, `review`, `blocked`, `done`, `skipped`.\nAllowed `Evidence Status`: `missing`, `partial`, `present`, `waived`.\n"},{"id":"doc-0053-visual-roadmap","path":"TARGET:docs/09-PLANNING/TASKS/2026-05-20-human-brief-visual-map-architecture-rebaseline/visual_roadmap.md","title":"Visual Roadmap","type":"legacy-visual-roadmap","content":"# Visual Roadmap\n\n本文件使用当前私有 harness 的旧文件名；本任务计划的目标之一是把 public canonical 文件改成 `visual_map.md`。\n\n```mermaid\nflowchart LR\n  PH01[\"PH-01 计划落地\"] --> PH02[\"PH-02 对抗审查\"]\n  PH02 --> PH03[\"PH-03 计划修正\"]\n  PH03 --> PH04[\"PH-04 Public 实现\"]\n  PH04 --> PH05[\"PH-05 旧项目迁移回归\"]\n  PH05 --> PH06[\"PH-06 1.0 收口\"]\n```\n\n| Phase ID | Depends On | State | Completion | Output | Required Evidence | Evidence Status | Blocking Risk | Owner / Handoff |\n| --- | --- | --- | ---: | --- | --- | --- | --- | --- |\n| PH-01 | none | in_progress | 70 | 正式 task folder 和完整计划 | task files | partial | 用户需要再看一遍 | coordinator |\n| PH-02 | PH-01 | planned | 0 | 三路 subagent 对抗审查 | review findings | missing | 审查对象不完整会失真 | coordinator + reviewers |\n| PH-03 | PH-02 | planned | 0 | 修正后的最终计划 | updated task_plan/review | missing | P1 未解决不能实现 | coordinator |\n| PH-04 | PH-03 | planned | 0 | public 模板/CLI/checker/dashboard/docs 改动 | diff + tests | missing | visual_map 改名范围大 | future workers |\n| PH-05 | PH-04 | planned | 0 | 新项目和旧项目迁移回归 | commands + dashboard | missing | full-cutover gate 不够硬 | coordinator + workers |\n| PH-06 | PH-05 | planned | 0 | private closeout + public commit/PR 更新 | Harness Ledger / Closeout | missing | closeout 漏掉 lessons/promotion | coordinator |\n\nAllowed `State`: `planned`, `in_progress`, `review`, `blocked`, `done`, `skipped`.\nAllowed `Evidence Status`: `missing`, `partial`, `present`, `waived`.\n\n"},{"id":"doc-0054-brief","path":"TARGET:docs/09-PLANNING/TASKS/2026-05-20-migration-rails-and-verify/brief.md","title":"Brief - Migration Rails and Verify","type":"task-brief","content":"# Brief - Migration Rails and Verify\n\n## Goal\n\nMake v1.0 legacy migration executable by a normal agent through CLI rails, not just readable documentation.\n\n## Trigger\n\nA GPT-5.4-Mini worker was asked to read the Harness and migrate `LOCAL_PATH_REDACTED` without extra detailed guidance. It created and staged many files, but failed the actual migration contract:\n\n- no `.harness-capabilities.json`;\n- no `safe-adoption` capability run;\n- no generated dashboard HTML;\n- no valid dashboard path in the final report;\n- no strict cutover or strict-deferred report;\n- direct staging of target changes without user request;\n- normal legacy-compat check was mistaken for completion.\n\n## Product Problem\n\nThe current Harness exposes references, templates, and partial commands. It does not force the migration sequence or prevent false completion. Ordinary agents can still hand-write plausible docs instead of following the v1.0 migration contract.\n\n## Required Outcome\n\nAdd a guided migration execution path:\n\n- `migrate-run`: one command that performs baseline, dry-run, safe-adoption, migration plan, dashboard generation, normal check, strict check, and report creation.\n- `migrate-verify`: a hard gate that rejects fake completion.\n- migration session artifacts: machine-readable `session.json` and human-readable `report.md`.\n- locale decision: mixed Chinese/English legacy projects must explicitly choose `zh-CN` or `en-US` for new v1 artifacts.\n- dashboard path validation: final report must contain a real generated `index.html`.\n- target staging guard: migration commands must not stage files.\n\n## Human Acceptance\n\nA fresh GPT-5.4-Mini worker should be able to run the public migration command on Agora and produce a verifiable result without being handed the detailed internal plan.\n"},{"id":"doc-0055-progress","path":"TARGET:docs/09-PLANNING/TASKS/2026-05-20-migration-rails-and-verify/progress.md","title":"Progress - Migration Rails and Verify","type":"task-progress","content":"# Progress - Migration Rails and Verify\n\n## Current Status\n\ndone\n\n## Log\n\n| Time | Status | Note |\n| --- | --- | --- |\n| 2026-05-20 | planned | Created after GPT-5.4-Mini legacy migration trial failed to produce registry, safe-adoption, dashboard, or valid strict-deferred verification. |\n| 2026-05-20 | planned-update | Added locale decision requirement for mixed Chinese/English legacy projects. New v1 artifacts must use selected `zh-CN` or `en-US`; historical mixed-language files are preserved as residuals. |\n| 2026-05-20 | implementation | Added `migrate-run` / `migrate-verify`, migration session artifacts, mixed-language locale guard, dirty target guard, dashboard HTML verification, and regression coverage. |\n| 2026-05-20 | verification | `npm test` passed after adding migration rail regressions and updating localized dashboard assertion. |\n| 2026-05-20 | review-fix | Three adversarial review lanes found stale/forged session gaps. Fixed verify to reject plan-only completion, rerun strict, require git audit metadata, require generated dashboard bundle, and align public docs with installed `harness` command. |\n| 2026-05-20 | mini-smoke | GPT-5.4-Mini migrated `LOCAL_PATH_REDACTED` via public workflow. Coordinator re-verified `migrate-verify` pass with strict deferred. Dashboard: `LOCAL_PATH_REDACTED`. |\n| 2026-05-20 | new-project-smoke | Initialized `LOCAL_PATH_REDACTED` with `core,dashboard`; target check passed and dashboard generated at `LOCAL_PATH_REDACTED`. |\n| 2026-05-20 | full-subagent-smoke | Multiple GPT-5.4-Mini workers independently completed the old Agora migration: task contracts, review/capability registry, legacy governance, 444 missing briefs, and quality repair for three weak briefs. Coordinator verification shows declared-capability mode, 471 tasks, 0 warnings, 0 task actions, 0 review gaps, 0 residuals, normal pass, strict pass, and `migrate-verify` pass. Final dashboard: `LOCAL_PATH_REDACTED`; HTTP smoke: `http://127.0.0.1:55983/#/tasks`. |\n| 2026-05-20 | data-contract-fix | Added `status.summary.briefCoverage` and per-task `briefPath` to the public status/dashboard schema after adversarial review found the old `briefSource`-only contract easy for subagents to misread. Public commit: `1258e38`. |\n\n## Pending Work\n\n- Decide whether to keep, commit, or clean local dogfood artifacts in Agora/acpx test targets after user review.\n\n## Test Gate\n\nInitial gate:\n\n- `npm test` — pass, 2026-05-20.\n- `npm run smoke:dashboard`\n- `node scripts/harness.mjs check --profile source-package .`\n- `node scripts/harness.mjs check --profile target-project examples/minimal-project`\n- `node scripts/harness.mjs check --profile private-harness .harness-private`\n\nAll listed gates passed on 2026-05-20. Private harness check still reports expected warning backlog for newly created private task plans.\n\nFinal old-project proof, 2026-05-20:\n\n- `node scripts/harness.mjs migrate-plan LOCAL_PATH_REDACTED --json --limit 1000` — `mode=declared-capability`, `warnings=0`, `taskActions=0`, `reviewSchemaGaps=0`, `legacyResiduals=0`, `recommendedCapabilities=[]`.\n- `node scripts/harness.mjs check --profile target-project LOCAL_PATH_REDACTED` — pass.\n- `node scripts/harness.mjs check --profile target-project --strict LOCAL_PATH_REDACTED` — pass.\n- `node scripts/harness.mjs migrate-verify LOCAL_PATH_REDACTED` — pass.\n- Dashboard data: `summary.briefCoverage.ready=471`, `missing=0`, `total=471`; task index page shows `471 / 471`.\n- Final adversarial re-review: dashboard data contract PASS; three repaired brief samples PASS.\n"},{"id":"doc-0056-review","path":"TARGET:docs/09-PLANNING/TASKS/2026-05-20-migration-rails-and-verify/review.md","title":"Review - Migration Rails and Verify","type":"task-review","content":"# Review - Migration Rails and Verify\n\n## Review Status\n\npending\n\n## Reviewer A - CLI / Session Schema\n\nFocus:\n\n- `migrate-run` cannot skip baseline, dry-run, registry, dashboard, or checks.\n- `migrate-verify` detects fake completion.\n- Session JSON is stable enough for follow-up agents.\n\nStatus: pending\n\n## Reviewer B - Ordinary Agent Usability\n\nFocus:\n\n- A normal agent can discover and run the right command without internal private context.\n- Public prompt is short, mandatory, and not easy to skim past.\n- Final report expectations are unambiguous.\n\nStatus: pending\n\n## Reviewer C - Target Safety\n\nFocus:\n\n- Migration does not stage, commit, push, or overwrite unrelated target files.\n- Dirty target behavior is explicit.\n- Historical tasks are not mechanically rewritten.\n\nStatus: pending\n\n## Findings\n\nNo findings yet.\n\n"},{"id":"doc-0057-task-plan","path":"TARGET:docs/09-PLANNING/TASKS/2026-05-20-migration-rails-and-verify/task_plan.md","title":"Migration Rails and Verify Implementation Plan","type":"markdown-table","content":"# Migration Rails and Verify Implementation Plan\n\n> **For Claude:** REQUIRED SUB-SKILL: Use superpowers:executing-plans to implement this plan task-by-task.\n\n**Goal:** Turn v1.0 legacy migration from documentation guidance into a CLI-driven, verifiable workflow that ordinary agents cannot falsely complete.\n\n**Architecture:** Add a migration session layer in the existing Node.js CLI. The layer orchestrates current primitives (`status`, `add-capability`, `migrate-plan`, `dashboard`, `check`) and writes deterministic session artifacts. Keep dashboard static and keep target-project mutation limited to explicit safe-adoption/template writes. Verification should inspect session artifacts and target state rather than trusting an agent report.\n\n**Tech Stack:** Node.js ESM CLI, existing `scripts/lib/harness-core.mjs`, static dashboard writer, JSON session artifact, Markdown report, public docs-release guides, focused tests in `scripts/test-harness.mjs`.\n\n---\n\n## Acceptance Criteria\n\n1. A single documented command exists for old-project migration:\n   `node scripts/harness.mjs migrate-run --locale zh-CN --out-dir /tmp/\u003cdashboard> \u003ctarget>`.\n2. `migrate-run` refuses to proceed when target git status has unclear dirty changes unless `--allow-dirty` is passed and recorded.\n3. `migrate-run` always records baseline `status --json` and `migrate-plan --json` before writing target files.\n4. `migrate-run` requires a locale decision for new v1 artifacts when the target is mixed Chinese/English.\n5. `migrate-run` performs `add-capability safe-adoption --dry-run` first and records expected creates/skips.\n6. `migrate-run` applies at least `core`, `safe-adoption`, and `dashboard` capabilities unless explicitly `--plan-only`.\n7. `migrate-run` generates a dashboard directory and report with a real `index.html` path.\n8. `migrate-run` runs normal target-project check and strict target-project check; strict failure becomes `strictDeferred`, never `complete`.\n9. `migrate-verify \u003csession.json>` fails if registry, locale decision, dashboard path, checks, or strict-deferred residual fields are missing.\n10. Final public prompt tells ordinary agents: run `migrate-run`, then `migrate-verify`; do not manually create files first; do not stage unless asked.\n11. Regression covers a legacy fixture where false completion would previously pass as a narrative report but now fails `migrate-verify`.\n\n## Non-Goals\n\n- Do not auto-rewrite all historical task folders.\n- Do not make strict check pass for Agora by mass editing 400+ tasks.\n- Do not add a dashboard backend or writable UI.\n- Do not commit target project changes during migration.\n- Do not require a high-end model to understand internal private planning docs.\n\n## Task 1: Define Migration Session Schema\n\n**Files:**\n- Create or modify: `scripts/lib/harness-core.mjs`\n- Test: `scripts/test-harness.mjs`\n- Docs: `docs-release/guides/migration-playbook.md`\n\n**Session fields:**\n\n```json\n{\n  \"operation\": \"migrate-run\",\n  \"schemaVersion\": 1,\n  \"target\": \"/abs/path\",\n  \"locale\": \"zh-CN\",\n  \"localeDecision\": {\n    \"selected\": \"zh-CN\",\n    \"source\": \"explicit-user-choice\",\n    \"mixedLanguageDetected\": true,\n    \"reason\": \"user-facing project docs should be Chinese-first\"\n  },\n  \"startedAt\": \"...\",\n  \"finishedAt\": \"...\",\n  \"git\": {\n    \"dirty\": true,\n    \"allowDirty\": false,\n    \"statusShort\": []\n  },\n  \"baseline\": {\n    \"statusPath\": \".../baseline-status.json\",\n    \"migratePlanPath\": \".../baseline-migrate-plan.json\",\n    \"taskCount\": 0,\n    \"warningCount\": 0\n  },\n  \"dryRun\": {\n    \"safeAdoption\": {},\n    \"dashboard\": {}\n  },\n  \"appliedCapabilities\": [\"core\", \"safe-adoption\", \"dashboard\"],\n  \"dashboard\": {\n    \"outDir\": \"LOCAL_PATH_REDACTED\",\n    \"indexPath\": \"LOCAL_PATH_REDACTED\",\n    \"exists\": true\n  },\n  \"checks\": {\n    \"normal\": { \"status\": \"pass\", \"warnings\": 0 },\n    \"strict\": { \"status\": \"fail\", \"failureCount\": 0 }\n  },\n  \"strictDeferred\": {\n    \"deferred\": true,\n    \"reason\": \"historical residuals remain\",\n    \"owner\": \"migration-coordinator\",\n    \"trigger\": \"before declaring strict cutover complete\",\n    \"nextAction\": \"work warning queue by priority\"\n  },\n  \"result\": \"adopted-with-strict-deferred\"\n}\n```\n\n**Implementation notes:**\n\n- Include absolute local paths in session JSON only for local runs; generated public dashboard data still uses sanitized paths.\n- Keep session artifacts under a caller-selected `--session-dir`, defaulting to `LOCAL_PATH_REDACTED\u003cproject>-\u003ctimestamp>`.\n- Do not write session artifacts into target `docs/` unless `--write-target-report` is explicitly requested.\n\n## Task 2: Implement `migrate-run`\n\n**Files:**\n- Modify: `scripts/harness.mjs`\n- Modify: `scripts/lib/harness-core.mjs`\n\n**Command shape:**\n\n```bash\nnode scripts/harness.mjs migrate-run \\\n  --locale zh-CN \\\n  --out-dir LOCAL_PATH_REDACTED \\\n  --session-dir LOCAL_PATH_REDACTED \\\n  /path/to/project\n```\n\n**Required behavior:**\n\n1. Inspect target git status.\n2. If dirty and `--allow-dirty` is absent, exit non-zero with instructions.\n3. Detect whether target docs are mixed Chinese/English.\n4. Require `--locale zh-CN|en-US` for mixed-language targets unless `--assume-locale` is explicitly passed.\n5. Record `localeDecision` in session JSON and report.\n6. Write baseline `status.json`.\n7. Write baseline `migrate-plan.json`.\n8. Run `add-capability safe-adoption --dry-run`.\n9. Run `add-capability dashboard --dry-run`.\n10. If not `--plan-only`, apply `safe-adoption` and `dashboard`.\n11. Generate dashboard directory.\n12. Run normal check.\n13. Run strict check.\n14. Write `session.json` and `report.md`.\n15. Print concise JSON summary with `dashboard.indexPath`, `sessionPath`, and `result`.\n\n**Guardrails:**\n\n- Never call `git add`.\n- Never call `git commit`.\n- Never overwrite existing target files except through existing safe-adoption skip/merge rules.\n- If dashboard `index.html` does not exist, result is `failed`.\n- Do not mix template locales in newly created v1 artifacts; all new v1 files from one run use the selected locale.\n\n## Task 2b: Locale Decision and Mixed-Language Migration\n\n**Files:**\n- Modify: `scripts/lib/harness-core.mjs`\n- Modify: `scripts/harness.mjs`\n- Test: `scripts/test-harness.mjs`\n- Docs: `docs-release/guides/migration-playbook.md`\n\n**Problem:**\n\nLegacy projects may contain mixed Chinese and English harness docs. v1.0 has separate localized templates. Migration must not accidentally create a half-Chinese half-English new harness.\n\n**Required behavior:**\n\n1. Scan target entry files and docs for Han characters and English-first headings.\n2. Produce `localeProbe`:\n\n```json\n{\n  \"suggested\": \"zh-CN\",\n  \"confidence\": \"medium\",\n  \"signals\": {\n    \"hanFiles\": 12,\n    \"englishHeadingFiles\": 20,\n    \"entrypointLanguage\": \"zh-CN\"\n  }\n}\n```\n\n3. If mixed signals are detected and `--locale` is missing, stop with:\n\n```text\nMixed Chinese/English harness detected. Choose --locale zh-CN or --locale en-US for new v1 artifacts.\nExisting historical files will be preserved in their original language.\n```\n\n4. Record selected locale in `.harness-capabilities.json`.\n5. Use selected localized templates for all new v1 files.\n6. Preserve historical files without translating them.\n7. Report residual language mix separately from migration failure:\n   - `historical-mixed-language-residual`;\n   - not a blocker unless the user requests language normalization.\n\n**Non-goal:**\n\nDo not translate old docs during safe-adoption. Translation is a separate content migration task.\n\n## Task 3: Implement `migrate-verify`\n\n**Files:**\n- Modify: `scripts/harness.mjs`\n- Modify: `scripts/lib/harness-core.mjs`\n- Test: `scripts/test-harness.mjs`\n\n**Command shape:**\n\n```bash\nnode scripts/harness.mjs migrate-verify LOCAL_PATH_REDACTED\n```\n\n**Failure conditions:**\n\n- missing or unreadable `session.json`;\n- target path missing;\n- `.harness-capabilities.json` missing after non-plan run;\n- `safe-adoption` or `dashboard` missing from capability registry;\n- selected locale missing or inconsistent with registry;\n- dashboard `index.html` missing;\n- normal check missing or failed;\n- strict check failed but `strictDeferred` is missing owner/trigger/nextAction;\n- report claims `complete` while strict failed;\n- dashboard path points to Markdown rather than `.html`;\n- session indicates files were staged by the migration command.\n\n**Output:**\n\n- JSON when `--json` is passed.\n- Human text otherwise.\n- Clear distinction:\n  - `complete`\n  - `adopted-with-strict-deferred`\n  - `failed`\n\n## Task 4: Make Warning Queue Actionable for CLI\n\n**Files:**\n- Modify: `scripts/lib/harness-core.mjs`\n- Test: `scripts/test-harness.mjs`\n\n**Required additions:**\n\n- `migrate-plan --json` should expose full warning queue rows with:\n  - `id`\n  - `category`\n  - `type`\n  - `scope`\n  - `priority`\n  - `phase`\n  - `fixability`\n  - `status`\n  - `confidence`\n  - `affected`\n  - `affectedPaths`\n  - `requiredAction`\n  - `detail`\n  - `suggestedCommand` when safe.\n- Do not only expose aggregate `warningGroups`.\n- Preserve backward-compatible existing fields.\n\n## Task 5: Public Prompt Hardening\n\n**Files:**\n- Modify: `docs-release/guides/legacy-migration-agent-prompt.md`\n- Modify: `docs-release/guides/migration-playbook.md`\n- Modify: `docs-release/guides/agent-installation.md` if needed\n\n**New top-level rules:**\n\n```text\nYou must run migrate-run first.\nYou may not manually create migration files before migrate-run.\nYou may not claim completion unless migrate-verify passes.\nYou may not stage, commit, or push target changes unless explicitly asked.\nIf strict fails, report strict deferred, not complete.\nThe dashboard path must be an existing HTML file.\n```\n\n**Public docs should show:**\n\n- new happy path;\n- plan-only dry run;\n- mixed-language locale selection;\n- dirty target handling;\n- strict deferred interpretation;\n- final report template.\n\n## Task 6: Dashboard and Report Contract\n\n**Files:**\n- Modify: `scripts/lib/dashboard-writer.mjs` only if needed\n- Modify: `scripts/lib/harness-core.mjs`\n- Test: `scripts/test-harness.mjs`\n\n**Report must include:**\n\n- target path;\n- capability registry state;\n- dashboard directory and `index.html`;\n- normal check result;\n- strict check result;\n- warning queue summary by priority/type/phase;\n- task count and active task actions;\n- residual count;\n- clear next commands.\n\n**Report must not include:**\n\n- claim of strict completion when strict failed;\n- Markdown file as dashboard path;\n- unsupported validation names such as `all_required_files_present` unless they are only supplemental.\n\n## Task 7: Regression Fixtures\n\n**Files:**\n- Modify: `scripts/test-harness.mjs`\n\n**Test cases:**\n\n1. Legacy project with no registry:\n   - `migrate-run --plan-only` writes baseline and dry-run artifacts but no registry.\n   - `migrate-verify` reports plan-only, not complete.\n2. Legacy project full run:\n   - registry includes `core`, `safe-adoption`, `dashboard`;\n   - dashboard `index.html` exists;\n   - normal check passes or warns;\n   - strict failure creates valid `strictDeferred`.\n3. False report fixture:\n   - a fake session with dashboard path `docs/Harness-Ledger.md` fails.\n4. Staging guard:\n   - `migrate-run` does not stage target changes.\n5. Dirty target guard:\n   - untracked unrelated file cause

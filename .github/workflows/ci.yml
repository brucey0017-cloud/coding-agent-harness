name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  root:
    name: Root package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install root dependencies
        run: npm install

      - name: Check committed whitespace
        if: github.event_name == 'pull_request'
        run: git diff --check "origin/${{ github.base_ref }}"...HEAD

      - name: Check committed whitespace
        if: github.event_name != 'pull_request'
        run: git diff --check HEAD^..HEAD

      - name: Run root tests
        run: npm test

      - name: Check source package boundary
        run: node scripts/harness.mjs check --profile source-package .

      - name: Check minimal target project
        run: node scripts/harness.mjs check --profile target-project examples/minimal-project

      - name: Generate example dashboard
        run: node scripts/harness.mjs dashboard --out tmp/example-dashboard.html examples/minimal-project

      - name: Smoke test dashboard
        run: npm run smoke:dashboard

      - name: Dry-run npm package
        run: npm run pack:dry-run

  gui:
    name: GUI submodule
    runs-on: ubuntu-latest
    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: harness-gui/package-lock.json

      - name: Install GUI dependencies
        working-directory: harness-gui
        run: npm ci

      - name: Typecheck GUI
        working-directory: harness-gui
        run: npm run typecheck

      - name: Test GUI
        working-directory: harness-gui
        run: npm test

      - name: Build GUI
        working-directory: harness-gui
        run: npm run build

  harness:
    name: harness
    runs-on: ubuntu-latest
    needs:
      - root
      - gui
    steps:
      - name: Confirm required checks passed
        run: echo "Root package and GUI submodule checks passed."

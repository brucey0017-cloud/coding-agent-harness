s refusal unless `--allow-dirty`.\n6. Mixed-language target:\n   - missing `--locale` fails with a clear choice prompt;\n   - `--locale zh-CN` creates Chinese v1 templates and preserves old English docs;\n   - `--locale en-US` creates English v1 templates and preserves old Chinese docs;\n   - session records `historical-mixed-language-residual`.\n\n## Task 8: Re-run Mini-Agent Validation\n\n**Files:**\n- Private review file for result:\n  `docs/09-PLANNING/TASKS/2026-05-20-migration-rails-and-verify/review.md`\n\n**Procedure:**\n\n1. Clean target test artifacts.\n2. Spawn a GPT-5.4-Mini worker.\n3. Give only:\n   - source Harness path;\n   - target old project path;\n   - request to migrate to v1.0.\n4. Do not provide private plan details.\n5. Evaluate:\n   - did it run `migrate-run`?\n   - did `migrate-verify` pass?\n   - did it return real dashboard path?\n   - did it avoid staging?\n\n## Verification Commands\n\nRun after implementation:\n\n```bash\nnpm test\nnpm run smoke:dashboard\nnode scripts/harness.mjs check --profile source-package .\nnode scripts/harness.mjs check --profile private-harness .harness-private\nnode scripts/harness.mjs check --profile target-project examples/minimal-project\nnode scripts/harness.mjs migrate-run --locale zh-CN --out-dir LOCAL_PATH_REDACTED LOCAL_PATH_REDACTED\nnode scripts/harness.mjs migrate-verify LOCAL_PATH_REDACTED\n```\n\n## Review Requirement\n\nBefore claiming ready:\n\n- Reviewer A: CLI/session schema and false-completion prevention.\n- Reviewer B: ordinary-agent usability and prompt clarity.\n- Reviewer C: target safety, dirty worktree behavior, and no staging/commit side effects.\n"},{"id":"doc-0058-brief","path":"TARGET:docs/09-PLANNING/TASKS/2026-05-20-migration-workbench-hardening/brief.md","title":"Brief - Migration Workbench Hardening","type":"task-brief","content":"# Brief - Migration Workbench Hardening\n\n## Goal\n\nMake the harness itself usable for large legacy migrations before running another acpx/Agora regression pass.\n\n## User Problem\n\nThe current dashboard proves that legacy tasks can be discovered, but it is not yet a migration workbench. On a project with hundreds of historical tasks, a raw task graph, unpaged task index, and undifferentiated warning cards force the human and agents back into manual inspection.\n\n## Required Outcome\n\n- Large legacy projects render an aggregate migration runway instead of an unreadable task-level flow.\n- Task index supports practical paging and classification, including module-oriented grouping when modules are missing or inferred.\n- Adoption warnings become a triage queue with categories, priorities, fixability, affected paths, and next actions.\n- The migration playbook and agent prompt explain how to move from baseline adoption to staged cleanup and strict cutover.\n- Three adversarial reviewers challenge the implementation before test execution begins.\n\n## Stop Condition\n\nDo not run the public/private smoke or target-project regression commands until the implementation and review fixes are ready. Tell the user first and wait for their review.\n\n"},{"id":"doc-0059-progress","path":"TARGET:docs/09-PLANNING/TASKS/2026-05-20-migration-workbench-hardening/progress.md","title":"Progress - Migration Workbench Hardening","type":"task-progress","content":"# Progress - Migration Workbench Hardening\n\n## Current Status\n\ndone\n\n## Log\n\n| Time | Status | Note |\n| --- | --- | --- |\n| 2026-05-20 | planned | Task opened after user rejected the previous dashboard as not matching the required large-migration workbench. |\n| 2026-05-20 | in_progress | Plan written. Implementation may proceed, but regression/smoke tests must wait for user notification. |\n| 2026-05-20 | implemented | Product-layer changes applied: warning schema enrichment, inferred task classification, aggregate runway, warning queue, task group pagination, module/search support, public migration guidance, and pending regression assertions. |\n| 2026-05-20 | review-fixed | Three adversarial review streams completed. Blocking findings from UX and migration-model reviewers were addressed. Data/boundary reviewer had no blocking finding. |\n| 2026-05-20 | verified | Large-project dashboard smoke passed after subagent migration of Agora: aggregate runway shows 471 tasks, warning queue is 0, brief coverage is 471/471, task index opens with search/filter/group controls, and final dashboard is served at `http://127.0.0.1:55983/#/tasks`. |\n\n## Pending Verification\n\n- User review of final old-project dashboard and migrated target artifacts.\n\n## Test Gate\n\nCompleted gates:\n\n- `npm test` — pass.\n- `npm run smoke:dashboard` — pass.\n- `node scripts/harness.mjs check --profile source-package .` — pass.\n- `node scripts/harness.mjs check --profile private-harness .harness-private` — pass with known private warning backlog.\n- `node scripts/harness.mjs check --profile target-project examples/minimal-project` — pass.\n- Old Agora final dashboard smoke: `http://127.0.0.1:55983/#/tasks` shows `471 / 471` and `Brief coverage 471/471`.\n"},{"id":"doc-0060-review","path":"TARGET:docs/09-PLANNING/TASKS/2026-05-20-migration-workbench-hardening/review.md","title":"Review - Migration Workbench Hardening","type":"task-review","content":"# Review - Migration Workbench Hardening\n\n## Review Requirement\n\nComplete three adversarial review rounds before running regression tests.\n\n## Reviewer A - Data / Boundary\n\nStatus: complete\n\nFocus:\n- Backward compatibility of dashboard bundle schema.\n- No public leakage of private harness files.\n- Source-package boundary remains enforceable.\n\nFinding summary:\n\n- No blocking finding.\n- Non-blocking: new adoption warning fields need focused regression assertions; `affectedPaths` should include capability/root entry files; maintainer-only private-harness gate should be labeled as such.\n\nFixes:\n\n- Added regression assertions for dashboard app features, inferred task classification, and adoption warning fields.\n- Expanded `affectedPaths` matching to `.harness-capabilities.json`, `AGENTS.md`, and `CLAUDE.md`.\n- Marked `private-harness .harness-private` as maintainer-only in public installation guidance.\n\n## Reviewer B - UX / Large Legacy Project\n\nStatus: complete\n\nFocus:\n- 400+ tasks remain navigable.\n- No unreadable task-level topology.\n- Warning workbench supports staged cleanup.\n\nBlocking findings:\n\n- Per-group pagination could still render every group at once.\n- Module view ignored `inferredModule`.\n- Search ignored inferred classification fields.\n- Warning workbench omitted missing brief queue rows and did not show id/status/confidence or priority sorting.\n- Aggregate runway had no drilldown entry points.\n\nFixes:\n\n- Added global group pagination plus per-group pagination.\n- Treated `module || inferredModule` as the dashboard module key.\n- Added inferred module/source/bucket fields to search.\n- Built a sorted warning queue with synthetic missing brief rows and id/status/confidence display.\n- Added aggregate runway breakdown links and module-card row limits.\n\n## Reviewer C - Migration Operating Model\n\nStatus: complete\n\nFocus:\n- Legacy single-thread history can be classified gradually.\n- Agent prompt is actionable for downstream migration agents.\n- Strict cutover is separated from first adoption.\n\nBlocking findings:\n\n- Baseline adoption lacked dry-run and dirty-state gates before writing files.\n- Warning field contract omitted status/confidence/affected/requiredAction/detail.\n- Strict cutover complete was mixed with user-accepted residuals.\n- Module classification lacked executable output rules.\n\nFixes:\n\n- Added baseline snapshot, dirty-state explanation, and dry-run install gates.\n- Documented full warning queue field contract.\n- Split strict complete from strict deferred.\n- Added module classification decision rules and required summary.\n\n## Findings\n\nAll blocking review findings addressed in code or public migration docs. Regression evidence remains intentionally pending until the user confirms the test window.\n"},{"id":"doc-0061-task-plan","path":"TARGET:docs/09-PLANNING/TASKS/2026-05-20-migration-workbench-hardening/task_plan.md","title":"Migration Workbench Hardening Implementation Plan","type":"markdown-table","content":"# Migration Workbench Hardening Implementation Plan\n\n> **For Claude:** REQUIRED SUB-SKILL: Use superpowers:executing-plans to implement this plan task-by-task.\n\n**Goal:** Turn the dashboard and migration outputs into a usable large-project migration workbench before testing acpx and Agora again.\n\n**Architecture:** Keep the harness static and source-package safe. Enrich migration/adoption data in `scripts/lib/harness-core.mjs`, then render that data in the existing dashboard templates without adding a server, database, or control-plane writes. Public guidance goes to `docs-release/`; task planning and review evidence stays in `.harness-private/docs/`.\n\n**Tech Stack:** Node.js ESM CLI, static dashboard templates in plain JavaScript/CSS, generated dashboard bundle JSON, Markdown public/private docs.\n\n---\n\n## Acceptance Criteria\n\n1. Projects with many graph nodes use an aggregate migration runway rather than a tiny 470-node Mermaid chain.\n2. Task index supports paging per group and useful grouping by migration bucket, module, month, and state.\n3. Legacy tasks with no explicit module get a stable inferred module/classification for grouping and search.\n4. Adoption warnings include structured fields: type, scope, priority, phase, fixability, status, confidence, affected, required action.\n5. Dashboard shows a warning workbench with filter, paging, priority, fixability, path/action, and totals.\n6. Public migration docs explain baseline adoption, warning cleanup, staged module classification, and strict cutover.\n7. English and Chinese dashboard templates stay aligned.\n8. Three adversarial reviews are completed before any regression/smoke testing begins.\n\n## Non-Goals\n\n- Do not auto-rewrite hundreds of legacy task files in target projects.\n- Do not introduce a writable dashboard backend.\n- Do not commit `.harness-private/`, root `AGENTS.md`, root `CLAUDE.md`, or root `docs/` to the public repo.\n- Do not run target regression tests before notifying the user.\n\n## Task 1: Enrich Migration Warning Data\n\n**Files:**\n- Modify: `scripts/lib/harness-core.mjs`\n- Test later: `scripts/test-harness.mjs`\n\n**Steps:**\n1. Add a warning classifier that maps raw check text into stable warning `type` values such as `missing-brief`, `missing-review-evidence`, `plan-contract-missing`, `legacy-reference-gap`, `review-finding`, `capability-adoption`, and `schema-drift`.\n2. Add derived fields: `scope`, `priority`, `phase`, `fixability`, `status`, and `confidence`.\n3. Preserve existing fields so current checks and dashboards remain backward compatible.\n4. Add aggregate summary buckets for dashboard rendering.\n\n## Task 2: Add Task Classification Helpers\n\n**Files:**\n- Modify: `scripts/lib/harness-core.mjs`\n- Modify: `templates/dashboard/assets/app.js`\n- Modify: `templates-zh-CN/dashboard/assets/app.js`\n\n**Steps:**\n1. Prefer explicit `task.module` when present.\n2. For legacy tasks, infer a stable display module from module path, task id prefix, title keywords, or fallback `legacy-unclassified`.\n3. Expose the inferred classification in dashboard search/grouping without mutating legacy task docs.\n\n## Task 3: Replace Large Graph Rendering with Migration Runway\n\n**Files:**\n- Modify: `templates/dashboard/assets/app.js`\n- Modify: `templates-zh-CN/dashboard/assets/app.js`\n- Modify: `templates/dashboard/assets/app.css`\n- Modify: `templates-zh-CN/dashboard/assets/app.css`\n\n**Steps:**\n1. Detect large task graphs by node count, task count, or missing useful edges.\n2. Render an aggregate migration flow: Baseline Snapshot -> Warning Triage -> Active Task Contracts -> Module Classification -> Strict Cutover.\n3. Show counts on each stage instead of task-level node chains.\n4. Keep normal Mermaid rendering for small projects with meaningful topology.\n\n## Task 4: Build Warning Workbench\n\n**Files:**\n- Modify: `templates/dashboard/assets/app.js`\n- Modify: `templates-zh-CN/dashboard/assets/app.js`\n- Modify: `templates/dashboard/assets/app.css`\n- Modify: `templates-zh-CN/dashboard/assets/app.css`\n- Modify: `templates/dashboard/assets/i18n.js`\n- Modify: `templates-zh-CN/dashboard/assets/i18n.js`\n\n**Steps:**\n1. Replace summary-only migration cards with filterable warning queue.\n2. Add category/type filters and page controls.\n3. Render priority, status, fixability, affected path count, next action, and suggested phase.\n4. Keep the overview concise and avoid nested-card visual clutter.\n\n## Task 5: Add Task Index Paging and Group Modes\n\n**Files:**\n- Modify: `templates/dashboard/assets/app.js`\n- Modify: `templates-zh-CN/dashboard/assets/app.js`\n- Modify: `templates/dashboard/assets/app.css`\n- Modify: `templates-zh-CN/dashboard/assets/app.css`\n- Modify: `templates/dashboard/assets/i18n.js`\n- Modify: `templates-zh-CN/dashboard/assets/i18n.js`\n\n**Steps:**\n1. Add task group mode state: migration bucket, module, month, state.\n2. Add per-group page state with a conservative page size.\n3. Add previous/next controls and visible range labels.\n4. Reset page state when search/filter/grouping changes.\n\n## Task 6: Update Public Migration Guidance\n\n**Files:**\n- Modify: `docs-release/guides/migration-playbook.md`\n- Modify: `docs-release/guides/legacy-migration-agent-prompt.md`\n\n**Steps:**\n1. Explain the baseline-first migration strategy.\n2. Document warning categories and expected cleanup order.\n3. Explain how a legacy single-thread harness becomes module-classified without pretending all history was originally modular.\n4. Tell downstream agents to keep strict cutover separate from first adoption.\n\n## Task 7: Three-Way Adversarial Review\n\n**Files:**\n- Modify: `docs/09-PLANNING/TASKS/2026-05-20-migration-workbench-hardening/review.md`\n\n**Reviewers:**\n- Reviewer A: data/schema compatibility and source-package boundary.\n- Reviewer B: UX usefulness for 400+ task legacy projects.\n- Reviewer C: migration operating model and downstream agent prompt quality.\n\n**Steps:**\n1. Ask each reviewer to find blocking gaps, not to rubber-stamp.\n2. Record findings and fix material issues.\n3. If a finding requires target-project regression evidence, mark it as pending test instead of claiming completion.\n\n## Task 8: Pause Before Testing\n\n**Files:**\n- Modify: `progress.md`\n\n**Steps:**\n1. Record implementation and review status.\n2. Do not run `npm test`, dashboard smoke, source-package, private-harness, minimal-project, acpx, or Agora checks yet.\n3. Tell the user the code is ready for test review and list the exact commands planned.\n\n"},{"id":"doc-0062-execution-strategy","path":"TARGET:docs/09-PLANNING/TASKS/2026-05-20-task-index-ux-redesign/execution_strategy.md","title":"Execution Strategy - Task Index UX Redesign","type":"execution-strategy","content":"# Execution Strategy - Task Index UX Redesign\n\n## Execution Mode\n\n- **Primary Driver**: Antigravity (this agent) will directly edit the template source files. No subagents are needed for the coding task.\n\n## Conflict Control\n\n- Ensure that any modifications made to `app.js` and `app.css` do not break any existing functionality of the Overview or Modules page.\n- Make sure that we keep both languages strictly synchronized.\n\n## Evidence Depth & Validation\n\n- **Automated Verification**:\n  - `npm run smoke:dashboard`: Checks that assets are correctly bundled and schema validation passes.\n  - `npm test`: Runs the full testing harness including the Han script check, ensuring no Chinese characters exist in the English templates directory.\n- **Manual Verification**:\n  - Deploy to `LOCAL_PATH_REDACTED` to test a heavy workspace (471 tasks).\n  - Use Playwright browser automation to visually verify the visual output in both light and dark modes, across multiple viewport resolutions.\n"},{"id":"doc-0063-task-plan","path":"TARGET:docs/09-PLANNING/TASKS/2026-05-20-task-index-ux-redesign/task_plan.md","title":"Task Plan - Task Index UX Redesign","type":"markdown-table","content":"# Task Plan - Task Index UX Redesign\n\n## Goal\n\nRedesign the dashboard Task Index page (`#/tasks`) UX to resolve the user's visual confusion and eliminate horizontal stretching of cards on wide viewports. Implement a beautiful, cohesive, dual-column layout (Left: Task Groups with multi-column card grids; Right: sticky controls & stats panels) matching the cockpit theme.\n\n## Scope\n\n- Allowed Write Areas:\n  - `templates-zh-CN/dashboard/assets/app.css`\n  - `templates-zh-CN/dashboard/assets/app.js`\n  - `templates/dashboard/assets/app.css`\n  - `templates/dashboard/assets/app.js`\n- Out of Scope:\n  - Modifying the core harness engine or changing schema constraints.\n\n## Task IA Budget\n\n- Budget: **Simple** (Standard five task files in this subdirectory).\n\n## Context Packet\n\n| ID | Type | Path | Why It Matters | Used By |\n| --- | --- | --- | --- | --- |\n| C-001 | public-code | PUBLIC:templates-zh-CN/dashboard/assets/app.js | Reference for the current task list layout | worker |\n| C-002 | public-code | PUBLIC:templates-zh-CN/dashboard/assets/app.css | Reference for the current css variables & page layout | worker |\n\n## Execution & Visualization Files\n\n| Contract File | Required | Purpose |\n| --- | --- | --- |\n| `execution_strategy.md` | yes | Execution mode, subagent use, conflict control, evidence depth |\n| `visual_map.md` | yes | Mermaid route, phase table, completion, evidence status |\n\n## Plan\n\n1. **Establish context**: Review current task list rendering functions and stylesheet layout.\n2. **Draft CSS**: Implement structural column rules (`.tasks-grid`, `.task-card-grid`, `.sidebar-card`) in `app.css` for both languages.\n3. **Draft JS**: Refactor task indexing, rendering of grid cards, toolbar side-panel, stats panel, and legend side-panel in `app.js` for both languages. Keep English JS ASCII-only.\n4. **Verify evidence**: Run smoke tests and the test suite (`npm run smoke:dashboard`, `npm test`). Deploy to Agora and verify.\n5. **Record Walkthrough & Closeout**: Document success evidence and update global tables.\n"},{"id":"doc-0064-visual-map","path":"TARGET:docs/09-PLANNING/TASKS/2026-05-20-task-index-ux-redesign/visual_map.md","title":"Visual Map - Task Index UX Redesign","type":"visual-map","content":"# Visual Map - Task Index UX Redesign\n\nVisual Map Contract: v1.0\n\nThis is the canonical v1 visual map for the task.\n\n## Map Index\n\n| Map ID | Type | Purpose | Source Evidence | Last Verified | Confidence |\n| --- | --- | --- | --- | --- | --- |\n| VM-01 | phase-flow | Show the implementation and smoke-test path for task-index-ux-redesign | task_plan.md / progress.md / review.md | 2026-05-20 | high |\n\n## Phase Flow\n\n```mermaid\ngraph TD\n  Start[Establish Context] --> DraftCSS[Draft CSS columns & cards]\n  DraftCSS --> DraftJS[Refactor JS taskIndex & taskCard]\n  DraftJS --> Verify[Automated Tests & Agora Smoke]\n  Verify --> Closeout[Update Ledger & Walkthrough]\n```\n\n| Phase ID | Depends On | State | Completion | Output | Required Evidence | Evidence Status | Blocking Risk | Owner / Handoff |\n| --- | --- | --- | ---: | --- | --- | --- | --- | --- |\n| P-001 | none | done | 100 | Context and files reviewed | task_plan.md | present | none | coordinator |\n| P-002 | P-001 | in_progress | 50 | CSS column rules and task card styles written | templates-zh-CN/dashboard/assets/app.css | present | none | coordinator |\n| P-003 | P-002 | planned | 0 | JS task page layout and toolbar refactored | templates-zh-CN/dashboard/assets/app.js | missing | none | coordinator |\n| P-004 | P-003 | planned | 0 | Tests green and verified on Agor   <script>window.HarnessMarkdown = {
  render(markdown = "", mode = "rendered") {
    if (mode === "source") return `<pre><code>${escapeHtml(markdown)}</code></pre>`;
    return renderBlocks(markdown);
  },
};

function renderBlocks(markdown) {
  const lines = String(markdown || "").split(/\r?\n/);
  const blocks = [];
  let index = 0;
  while (index < lines.length) {
    const line = lines[index];
    if (!line.trim()) {
      index += 1;
      continue;
    }
    if (line.startsWith("```")) {
      const lang = line.slice(3).trim();
      const code = [];
      index += 1;
      while (index < lines.length && !lines[index].startsWith("```")) {
        code.push(lines[index]);
        index += 1;
      }
      index += 1;
      blocks.push(lang === "mermaid" ? window.HarnessMermaid.render(code.join("\n")) : `<pre><code>${escapeHtml(code.join("\n"))}</code></pre>`);
      continue;
    }
    if (/^#{1,3}\s+/.test(line)) {
      const level = line.match(/^#+/)[0].length;
      blocks.push(`<h${level}>${inline(line.replace(/^#{1,3}\s+/, ""))}</h${level}>`);
      index += 1;
      continue;
    }
    if (isTableStart(lines, index)) {
      const table = [];
      while (index < lines.length && lines[index].trim().startsWith("|")) {
        table.push(lines[index]);
        index += 1;
      }
      blocks.push(renderTable(table));
      continue;
    }
    if (/^[-*]\s+/.test(line)) {
      const items = [];
      while (index < lines.length && /^[-*]\s+/.test(lines[index])) {
        items.push(`<li>${inline(lines[index].replace(/^[-*]\s+/, ""))}</li>`);
        index += 1;
      }
      blocks.push(`<ul>${items.join("")}</ul>`);
      continue;
    }
    const paragraph = [];
    while (index < lines.length && lines[index].trim() && !/^#{1,3}\s+/.test(lines[index]) && !lines[index].startsWith("```") && !isTableStart(lines, index)) {
      paragraph.push(lines[index]);
      index += 1;
    }
    blocks.push(`<p>${inline(paragraph.join(" "))}</p>`);
  }
  return blocks.join("");
}

function isTableStart(lines, index) {
  return lines[index]?.trim().startsWith("|") && /^(\s*\|?\s*:?-{3,}:?\s*)+\|?\s*$/.test(lines[index + 1] || "");
}

function renderTable(lines) {
  const rows = lines.map(splitMarkdownRow);
  const header = rows[0] || [];
  const body = rows.slice(2).filter((row) => row.length === header.length);
  return `<div class="rendered-table-wrap"><table class="rendered-table">
    <thead><tr>${header.map((cell) => `<th>${inline(cell)}</th>`).join("")}</tr></thead>
    <tbody>${body.map((row) => `<tr>${row.map((cell) => `<td>${inline(cell)}</td>`).join("")}</tr>`).join("")}</tbody>
  </table></div>`;
}

function splitMarkdownRow(line) {
  let text = String(line || "").trim();
  if (text.startsWith("|")) text = text.slice(1);
  if (text.endsWith("|") && !text.endsWith("\\|")) text = text.slice(0, -1);
  const cells = [];
  let current = "";
  let inCode = false;
  for (let index = 0; index < text.length; index += 1) {
    const char = text[index];
    if (char === "\\" && text[index + 1] === "|") {
      current += "|";
      index += 1;
      continue;
    }
    if (char === "`") inCode = !inCode;
    if (char === "|" && !inCode) {
      cells.push(current.trim());
      current = "";
      continue;
    }
    current += char;
  }
  cells.push(current.trim());

  <script>window.HarnessMermaid = {
  render(code = "") {

    if (!parsed) {
      return `<figure class="mermaid-fallback">
        <figcaption>Mermaid source</figcaption>
        <pre>${escapeMermaid(code)}</pre>
      </figure>`;
    }
    return renderSvg(parsed);
  },
};

function parseFlowchart(code) {
  const lines = String(code || "").split(/\r?\n/).map((line) => line.trim()).filter(Boolean);
  if (!/^flowchart\s+(LR|TB|TD|RL|BT)/i.test(lines[0] || "")) return null;
  const nodes = new Map();
  const edges = [];
  for (const line of lines.slice(1)) {
    const edgeMatch = line.match(/^([A-Za-z0-9_-]+)(?:\["([^"]+)"\])?\s*-+>\s*([A-Za-z0-9_-]+)(?:\["([^"]+)"\])?/);
    if (!edgeMatch) continue;
    const [, from, fromLabel, to, toLabel] = edgeMatch;
    nodes.set(from, fromLabel || from);
    nodes.set(to, toLabel || to);
    edges.push([from, to]);
  }
  if (nodes.size === 0) return null;
  return { nodes: [...nodes.entries()], edges };
}

function renderSvg({ nodes, edges }) {
  const width = Math.max(360, nodes.length * 150);
  const height = 150;
  const positions = new Map(nodes.map(([id], index) => [id, { x: 70 + index * 140, y: 70 }]));
  const nodeSvg = nodes.map(([id, label]) => {
    const pos = positions.get(id);
    return `<g class="mermaid-node">
      <rect x="${pos.x - 54}" y="${pos.y - 24}" width="108" height="48" rx="8"></rect>
      <text x="${pos.x}" y="${pos.y + 4}" text-anchor="middle">${escapeMermaid(label).replaceAll("\\n", " ")}</text>
    </g>`;
  }).join("");
  const edgeSvg = edges.map(([from, to]) => {
    const a = positions.get(from);
    const b = positions.get(to);
    if (!a || !b) return "";
    return `<path class="mermaid-edge" d="M ${a.x + 54} ${a.y} L ${b.x - 62} ${b.y}"></path><path class="mermaid-arrow" d="M ${b.x - 62} ${b.y} l -7 -5 v 10 z"></path>`;
  }).join("");
  return `<figure class="mermaid-rendered">
    <figcaption>Mermaid</figcaption>
    <svg viewBox="0 0 ${width} ${height}" role="img" aria-label="Mermaid flowchart">${edgeSvg}${nodeSvg}</svg>
  </figure>`;
}

function escapeMermaid(value) {
  return String(value ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;");
}

function projectMermaid() {
  if (usesAggregateFlow()) return migrationAggregateMermaid();
  const graph = bundle.graph || { nodes: [], edges: [] };
  const preferredTypes = graph.nodes?.some((node) => node.type === "module") ? ["module", "step"] : ["task", "phase"];
  const nodes = (graph.nodes || [])
    .filter((node) => preferredTypes.includes(node.type))
    .filter((node) => node.type !== "phase" || ["in_progress", "review", "blocked", "done"].includes(node.state))
    .slice(0, 28);
  if (nodes.length < 2) return mermaidFromBriefs();
  const nodeIds = new Set(nodes.map((node) => node.id));
  const lines = ["flowchart LR"];
  let edgeCount = 0;
  for (const edge of graph.edges || []) {
    if (!nodeIds.has(edge.from) || !nodeIds.has(edge.to)) continue;
    lines.push(`  ${mermaidId(edge.from)}["${mermaidLabel(edge.from)}"] --> ${mermaidId(edge.to)}["${mermaidLabel(edge.to)}"]`);
    edgeCount += 1;
    if (edgeCount >= 34) break;
  }
  if (edgeCount === 0) {
    for (let index = 1; index < nodes.length; index += 1) {
      lines.push(`  ${mermaidId(nodes[index - 1].id)}["${mermaidLabel(nodes[index - 1].id)}"] --> ${mermaidId(nodes[index].id)}["${mermaidLabel(nodes[index].id)}"]`);

  }
  return lines.join("\n");
}

  const completion = clampCompletion(task.completion);

  const mapReady = !!taskDocument(task, "visual_map.md");

  const mapLabel = mapReady ? t("mapReady") : t("mapMissing");

  return `<a class="task-row-card" href="#/tasks/${encodeURIComponent(task.id)}" data-open-drawer="${escapeAttr(task.id)}" style="--row-accent: var(${stateToColorVar(task.state)})">

    <div class="row-main">
      <strong>${escapeHtml(task.title)}</strong>
      <span class="row-meta">${escapeHtml(task.id)} · ${escapeHtml(taskModuleKey(task))}</span>

    <div class="row-status">${tag(task.state)}</div>
    <div class="row-progress">
      <div class="mini-progress-track"><div class="mini-progress-fill" style="width:${completion}%"></div></div>
      <span class="row-pct">${completion}%</span>

    <div class="row-brief ${briefReady ? "ready" : "missing"}" title="${escapeAttr(briefLabel)}" aria-label="${escapeAttr(briefLabel)}">

      <span class="badge map ${mapReady ? "ready" : "missing"}">
        <svg style="width:10px;height:10px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg>
        ${mapReady ? t("badgeMap") : t("badgeMapMissing")}
      </span>
    </div>
  </a>`;
}

function taskIndex() {
  const tasks = filteredTasks();
  const groups = taskGroups(tasks);
  const orderedGroups = orderedTaskGroups(groups);
  const groupPageCount = Math.max(1, Math.ceil(orderedGroups.length / taskGroupsPerPage));
  const groupPage = Math.min(Math.max(1, Number(state.taskGroupPage) || 1), groupPageCount);
  const visibleGroups = orderedGroups.slice((groupPage - 1) * taskGroupsPerPage, groupPage * taskGroupsPerPage);

  return `<div class="tasks-grid">
    <div class="tasks-main stack">
      ${taskStatsBar()}
      ${visibleGroups.map(([group, groupTasks]) => taskGroup(group, groupTasks)).join("")}
      <section class="group-pager">
        <span>${t("showingGroups")} ${visibleGroups.length ? (groupPage - 1) * taskGroupsPerPage + 1 : 0}-${Math.min(groupPage * taskGroupsPerPage, orderedGroups.length)} / ${orderedGroups.length}</span>
        ${pager("task-groups", groupPage, groupPageCount)}
      </section>
    </div>
    <aside class="tasks-sidebar stack">
      ${taskToolbarCard(tasks.length)}
      ${taskStatsCard()}
      ${taskLegendCard()}
    </aside>
  </div>`;
}

function taskGroup(group, tasks) {
  const pageCount = Math.max(1, Math.ceil(tasks.length / taskPageSize));
  const page = Math.min(Math.max(1, Number(state.taskPageByGroup[group]) || 1), pageCount);
  const start = (page - 1) * taskPageSize;
  const visibleTasks = tasks.slice(start, start + taskPageSize);
  const avgCompletion = tasks.length ? clampCompletion(tasks.reduce((sum, task) => sum + clampCompletion(task.completion), 0) / tasks.length) : 0;

  const isGrid = state.taskLayout === "grid";
  const layoutClass = isGrid ? "task-card-grid" : "task-list";
  const itemRenderer = isGrid ? taskCard : taskRow;
  const listHeader = isGrid ? "" : `<div class="task-list-header">
    <div class="col-main">${t("columnTask")}</div>
    <div class="col-status">${t("columnState")}</div>
    <div class="col-progress">${t("columnCompletion")}</div>
    <div class="col-brief">${t("columnBrief")}</div>
    <div class="col-map">${t("badgeMap")}</div>
  </div>`;

  return `<section class="task-group">
      <div class="section-head">
        <div>
          <h2>${taskGroupLabel(group)}</h2>
          <p class="subtle">${t("showing")} ${Math.min(start + 1, tasks.length)}-${Math.min(start + visibleTasks.length, tasks.length)} / ${tasks.length}</p>
        </div>
        <div class="group-actions">
          <div class="group-progress" aria-label="${escapeAttr(t("groupCompletion"))}">
            <div class="group-progress-track"><div class="group-progress-fill" style="width:${avgCompletion}%"></div></div>
            <span>${avgCompletion}%</span>
          </div>
          ${pager("task", page, pageCount, group)}
        </div>
      </div>
      <div class="${layoutClass}">
        ${listHeader}
        ${visibleTasks.map(itemRenderer).join("")}
      </div>
    </section>`;
}

function taskCard(task) {
  const completion = clampCompletion(task.completion);
  const stateColor = stateToColorVar(task.state);
  const briefReady = task.briefSource === "standalone" || !!taskDocument(task, "brief.md");
  const mapReady = !!taskDocument(task, "visual_map.md");
  const briefLabel = briefReady ? t("briefReady") : t("briefMissing");
  const mapLabel = mapReady ? t("mapReady") : t("mapMissing");

  return `<a class="task-card" href="#/tasks/${encodeURIComponent(task.id)}" data-open-drawer="${escapeAttr(task.id)}" style="--row-accent: var(${stateColor})">
    <div class="card-header">
      <span class="card-id">${escapeHtml(task.id)}</span>
      ${tag(task.state)}
    </div>
    <h4 class="card-title" title="${escapeAttr(task.title)}">${escapeHtml(task.title)}</h4>
    <div class="card-meta">
      <span class="meta-module" title="${escapeAttr(taskModuleKey(task))}">
        <svg style="width:12px;height:12px;vertical-align:middle;margin-right:2px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        ${escapeHtml(taskModuleKey(task))}
      </span>
    </div>
    <div class="card-progress">
      <div class="card-progress-track"><div class="card-progress-fill" style="width:${completion}%"></div></div>
      <span class="progress-pct">${completion}%</span>
    </div>
    <div class="card-badges">
      <span class="badge brief ${briefReady ? "ready" : "missing"}" title="${escapeAttr(briefLabel)}">
        <svg style="width:10px;height:10px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg>
        ${briefReady ? t("badgeBrief") : t("badgeBriefMissing")}
      </span>
      <span class="badge map ${mapReady ? "ready" : "missing"}" title="${escapeAttr(mapLabel)}">
        <svg style="width:10px;height:10px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg>
        ${mapReady ? t("badgeMap") : t("badgeMapMissing")}
      </span>
    </div>
  </a>`;
}

function orderedTaskGroups(groups) {
  const rank = (group) => {
    if (group.startsWith("module:")) return 2;
    if (group.startsWith("state:")) return 2;
    if (group.startsWith("month:")) return 2;
    if (group === "active") return 0;
    if (group === "brief-ready") return 1;
    if (group.startsWith("legacy:")) return 2;
    if (group === "unknown") return 3;
    return 4;
  };
  return Object.entries(groups).sort(([left], [right]) => rank(left) - rank(right) || left.localeCompare(right));
}

function taskGroups(tasks) {
  if (state.taskGroupMode === "module") {
    return groupBy(tasks, (task) => `module:${taskModuleKey(task)}`);
  }
  if (state.taskGroupMode === "month") {
    return groupBy(tasks, (task) => {
      const match = task.shortId?.match(/^(\d{4}-\d{2})/);
      return match ? `month:${match[1]}` : "month:unknown";
    });
  }
  if (state.taskGroupMode === "state") {
    return groupBy(tasks, (task) => `state:${task.state || "unknown"}`);
  }
  return groupBy(tasks, (task) => {
    if (["in_progress", "review", "blocked", "planned", "not_started"].includes(task.state)) return "active";
    if (task.briefSource === "standalone") return "brief-ready";
    const match = task.shortId?.match(/^(\d{4}-\d{2})/);
    return match ? `legacy:${match[1]}` : task.state || "unknown";
  });
}

function taskGroupLabel(group) {
  if (group === "active") return t("activeCurrent");
  if (group === "brief-ready") return t("briefReadyGroup");
  if (group.startsWith("legacy:")) return `${t("legacyMonth")} ${group.slice("legacy:".length)}`;
  if (group.startsWith("module:")) return `${t("inferredModule")} \u00b7 ${group.slice("module:".length)}`;
  if (group.startsWith("month:")) return `${t("legacyMonth")} ${group.slice("month:".length)}`;
  if (group.startsWith("state:")) return `${t("columnState")} \u00b7 ${label(group.slice("state:".length))}`;
  return label(group);
}

function filteredTasks() {
  const query = state.query.trim().toLowerCase();
  return (bundle.status?.tasks || []).filter((task) => {
    const stateMatch = state.taskState === "all" || task.state === state.taskState;
    if (!stateMatch) return false;
    if (!query) return true;
    return [task.id, task.shortId, task.title, task.module, task.inferredModule, task.classificationSource, task.classificationBucket, task.state].some((value) => String(value || "").toLowerCase().includes(query));
  });
}

function taskModuleKey(task) {
  return task.module || task.inferredModule || "legacy-unclassified";
}

function taskDetail(route) {
  const taskId = route.id;
  const task = (bundle.status?.tasks || []).find((item) => item.id === taskId);
  if (!task) return `<main>${emptyState(t("taskNotFound"))}</main>`;
  return `<main class="task-detail">
    <nav class="crumbs"><a href="#/tasks">${t("taskIndex")}</a><span>/</span><span>${escapeHtml(task.id)}</span></nav>
    <section class="detail-hero">
      <div>

        <h2>${escapeHtml(task.title)}</h2>
        <p>${escapeHtml(task.path)}</p>
      </div>
      <div class="detail-score">${task.completion}%</div>

    ${phaseTimeline(task)}
    <section class="detail-grid">
      <article class="detail-main">
        ${taskDocSection(task, "brief.md", t("brief"), true)}
        ${!taskDocument(task, "brief.md") ? taskDocSection(task, "task_plan.md", t("taskPlan"), false) : ""}
        ${taskDocSection(task, "execution_strategy.md", t("strategy"), false)}
        ${taskDocSection(task, "visual_map.md", t("visualMap"), false)}

      </article>
      <aside class="detail-side">

function phaseTimeline(task) {

    <h2>${t("phaseTimeline")}</h2>
    ${(task.phases || []).map((phase) => `<div class="phase-step ${phase.state}">
      <strong>${escapeHtml(phase.id)}</strong>
      <span>${phase.completion}%</span>
      <p>${escapeHtml(phase.output || phase.blockingRisk || phase.state)}</p>

    </div>`).join("") || emptyState(t("noPhaseData"))}

}

function taskDocSection(task, fileName, title, required) {
  const doc = taskDocument(task, fileName);
  if (!doc && !required) return "";
  return `<section class="doc-section">
    <div class="section-head"><h2>${escapeHtml(title)}</h2>${doc ? `<button data-render-toggle>${state.renderMode === "rendered" ? t("source") : t("rendered")}</button>` : ""}</div>
    <div class="markdown">${doc ? window.HarnessMarkdown.render(doc.content, state.renderMode) : generatedBrief(task)}</div>
  </section>`;
}

function documentTabs(task) {
  const docs = taskDocTabs
    .map(([tab, file]) => [tab, taskDocument(task, file)])
    .filter(([, doc]) => doc);
  return `<section class="side-panel">
    <h3>${t("sourceDocuments")}</h3>
    ${docs.map(([tab, doc]) => `<a href="#/tasks/${encodeURIComponent(task.id)}/docs/${encodeURIComponent(tab)}" title="${escapeAttr(doc.path)}">${escapeHtml(t(tab))}</a>`).join("") || `<p>${t("noDocuments")}</p>`}

}

function selectedSourceDocument(task, tab) {
  if (!tab) return "";
  const match = taskDocTabs.find(([key]) => key === tab);
  if (!match) return "";
  const doc = taskDocument(task, match[1]);
  if (!doc) return "";
  return `<section class="doc-section selected-source">
    <div class="section-head"><h2>${t("selectedSource")} · ${t(match[0])}</h2><button data-render-toggle>${state.renderMode === "rendered" ? t("source") : t("rendered")}</button></div>
    <div class="markdown">${window.HarnessMarkdown.render(doc.content, state.renderMode)}</div>
  </section>`;
}

function openFindings(task) {
  const risks = task.risks || [];
  return `<section class="side-panel">
    <h3>${t("openFindings")}</h3>
    ${risks.map((risk) => `<div class="finding ${risk.open || risk.blocksRelease ? "open" : ""}"><strong>${escapeHtml(risk.severity)}</strong><span>${escapeHtml(risk.summary)}</span></div>`).join("") || `<p>${t("noOpenFindings")}</p>`}

function evidenceList(task) {

function modulesView(moduleId = "") {
  const graph = bundle.graph || { nodes: [], edges: [] };
  const explicitModules = (graph.nodes || []).filter((node) => node.type === "module");
  const moduleMap = new Map(explicitModules.map((module) => [module.id.replace(/^module:/, ""), module]));
  for (const task of bundle.status?.tasks || []) {
    const key = taskModuleKey(task);
    if (!moduleMap.has(key)) moduleMap.set(key, { id: `module:${key}`, type: "module", label: key, state: task.classificationSource || "inferred" });
  }
  const modules = [...moduleMap.values()];
  return `<main class="stack">
    <section class="module-grid">
      ${modules.map((module) => moduleCard(module)).join("") || emptyState(t("noModules"))}
    </section>
  </main>`;
}

function moduleTaskRow(task) {
  const dotClass = /fail|blocked|open/i.test(task.state) ? "state-fail" : /warn|advice|planned|missing|unknown/i.test(task.state) ? "state-warn" : "state-pass";
  return `<a class="module-task-row" href="#/tasks/${encodeURIComponent(task.id)}" data-open-drawer="${escapeAttr(task.id)}">
    <div class="module-task-left">
      <i class="module-task-dot ${dotClass}" title="${escapeAttr(task.state)}"></i>
      <span class="module-task-title">${escapeHtml(task.title)}</span>
    </div>
    <span class="module-task-pct">${task.completion}%</span>
  </a>`;
}

function moduleCard(module) {
  const moduleKey = module.id.replace(/^module:/, "");
  const tasks = (bundle.status?.tasks || []).filter((task) => taskModuleKey(task) === moduleKey);

  // Inline Pagination
  state.modulePages = state.modulePages || {};
  const currentPage = state.modulePages[moduleKey] || 1;
  const pageCount = Math.ceil(tasks.length / 8) || 1;
  const visibleTasks = tasks.slice((currentPage - 1) * 8, currentPage * 8);

  const brief = findDocument(`TARGET:docs/09-PLANNING/MODULES/${moduleKey}/brief.md`);

  let pagerHtml = "";
  if (tasks.length > 8) {
    pagerHtml = `<div class="module-pager">
      <button ${currentPage <= 1 ? "disabled" : ""} onclick="window.setModulePage('${escapeAttr(moduleKey)}', ${currentPage - 1})">${t("prevPage")}</button>
      <span>${currentPage} / ${pageCount}</span>
      <button ${currentPage >= pageCount ? "disabled" : ""} onclick="window.setModulePage('${escapeAttr(moduleKey)}', ${currentPage + 1})">${t("nextPage")}</button>
    </div>`;
  }

  return `<article class="module-card">
    <div class="card-head"><h2>${escapeHtml(module.label || moduleKey)}</h2>${tag(module.state || "unknown")}</div>
    <div class="markdown">${brief ? window.HarnessMarkdown.render(brief.content, "rendered") : `<p>${t("moduleBriefMissing")}</p>`}</div>

    <div class="module-task-list">
      ${visibleTasks.map(moduleTaskRow).join("") || `<p>${t("noModuleTasks")}</p>`}

}

function migrationPanel() {
  const advice = warningQueue();
  const missingBriefs = advice.filter((warning) => warning.type === "missing-brief").length;
  if (advice.length === 0 && missingBriefs === 0) return "";
  const groups = groupBy(advice, (item) => item.category || "Advice");
  const filters = ["all", ...Object.keys(groups).sort(), ...new Set(advice.map((item) => item.type).filter(Boolean)), "active-task-contracts", "strict-cutover"];
  const filtered = state.warningFilter === "all" ? advice : advice.filter((item) => (item.category || "Advice") === state.warningFilter || item.phase === state.warningFilter || item.type === state.warningFilter);
  const pageCount = Math.max(1, Math.ceil(filtered.length / warningPageSize));
  const page = Math.min(Math.max(1, Number(state.warningPage) || 1), pageCount);
  const visible = filtered.slice((page - 1) * warningPageSize, page * warningPageSize);
  return `<section class="migration-panel">
    <div class="section-head">
      <div>
        <p class="eyebrow">${t("migration")}</p>
        <h2>${t("migrationWorkbench")}</h2>
      </div>
      <span>${advice.length} ${t("advice")} · ${missingBriefs} ${t("briefMissing")}</span>
    </div>
    <div class="migration-grid">
      ${Object.entries(groups).slice(0, 6).map(([category, items]) => `<button data-warning-filter="${escapeAttr(category)}" class="${state.warningFilter === category ? "active" : ""}"><strong>${escapeHtml(category)}</strong><p>${items.length} ${t("items")}</p></button>`).join("")}
      ${missingBriefs > 0 ? `<div><strong>${t("visibilityLayer")}</strong><p>${missingBriefs} ${t("missingBriefs")}</p></div>` : ""}
    </div>
    <div class="warning-workbench">
      <div class="warning-toolbar">
        <select data-warning-filter-select aria-label="${t("warningFilter")}">
          ${filters.map((filter) => `<option value="${escapeAttr(filter)}" ${state.warningFilter === filter ? "selected" : ""}>${filter === "all" ? t("allWarnings") : escapeHtml(filter)}</option>`).join("")}
        </select>
        <span>${t("showing")} ${visible.length ? (page - 1) * warningPageSize + 1 : 0}-${Math.min(page * warningPageSize, filtered.length)} / ${filtered.length}</span>
        ${pager("warning", page, pageCount)}
      </div>
      <div class="warning-list">
        ${visible.map(warningRow).join("") || emptyState(t("noWarnings"))}
      </div>
    </div>
  </section>`;
}

function warningRow(warning) {
  const affected = warning.affectedPaths?.length ? warning.affectedPaths.join(", ") : warning.affected;
  return `<article class="warning-row">
    <div>
      <strong>${escapeHtml(warning.id)} · ${escapeHtml(warning.title)}</strong>
      <p>${escapeHtml(affected || "project")}</p>
    </div>
    <span>${tag(warning.priority || warning.severity)}</span>
    <span>${escapeHtml(warning.status || "open")}</span>
    <span>${escapeHtml(warning.fixability || "manual")}</span>
    <span>${escapeHtml(warning.phase || "triage")}</span>
    <p>${escapeHtml(warning.requiredAction || warning.detail || "")} · ${t("confidence")}: ${escapeHtml(warning.confidence || "medium")}</p>
  </article>`;
}

function warningQueue() {
  const adoptionWarnings = (bundle.adoption?.warnings || []).map((warning) => ({ ...warning }));
  const existingBriefPaths = new Set(adoptionWarnings.filter((warning) => warning.type === "missing-brief").map((warning) => warning.affected));
  const briefWarnings = (bundle.status?.tasks || [])
    .filter((task) => task.briefSource !== "standalone")
    .filter((task) => !existingBriefPaths.has(task.path))
    .map((task, index) => ({
      id: `VB-${String(index + 1).padStart(3, "0")}`,
      category: "Visibility Layer",
      type: "missing-brief",
      scope: "task",
      priority: ["in_progress", "review", "blocked", "planned", "not_started"].includes(task.state) ? "P2" : "P3",
      phase: "active-task-contracts",
      fixability: "guided",
      status: "open",
      confidence: task.state === "unknown" ? "medium" : "high",
      severity: "advice",
      title: t("visibilityBriefMissing"),
      affected: task.path,
      affectedPaths: [task.path],
      requiredAction: t("addVisibilityBrief"),
      detail: `${task.id} ${task.title}`,
    }));
  return [...adoptionWarnings, ...briefWarnings].sort(warningSort);
}

function warningSort(left, right) {
  const priorityRank = { P0: 0, P1: 1, P2: 2, P3: 3 };
  const fixRank = { template: 0, guided: 1, "human-evidence": 2, decision: 3, manual: 4 };
  return (priorityRank[left.priority] ?? 9) - (priorityRank[right.priority] ?? 9)
    || (fixRank[left.fixability] ?? 9) - (fixRank[right.fixability] ?? 9)
    || String(left.phase || "").localeCompare(String(right.phase || ""))
    || String(left.id || "").localeCompare(String(right.id || ""));
}

function pager(kind, page, pageCount, group = "") {
  if (pageCount <= 1) return `<span class="pager muted">${page}/${pageCount}</span>`;
  const groupAttr = group ? ` data-page-group="${escapeAttr(group)}"` : "";
  return `<div class="pager">
    <button data-page-kind="${kind}" data-page="${page - 1}"${groupAttr} ${page <= 1 ? "disabled" : ""}>${t("prevPage")}</button>
    <span>${page}/${pageCount}</span>
    <button data-page-kind="${kind}" data-page="${page + 1}"${groupAttr} ${page >= pageCount ? "disabled" : ""}>${t("nextPage")}</button>
  </div>`;
}

function lessonPanel() {

function healthPanel() {

  return `<section class="health-panel">
    <div><h2>${t("releaseHealth")}</h2><p>${escapeHtml(bundle.status?.mode || "unknown")} · schema ${escapeHtml(bundle.status?.schemaVersion || "n/a")}</p></div>
    <div class="health-lists">
      <details ${details.failures?.length ? "open" : ""}><summary>${t("failures")} (${details.failures?.length || 0})</summary>${list(details.failures)}</details>

function taskDocument(task, fileName) {
  return findDocument(`${task.path}/${fileName}`);
}

function findDocument(pathSuffix) {
  return (bundle.documents?.documents || []).find((doc) => doc.path.endsWith(pathSuffix) || doc.path === pathSuffix);
}

function mermaidLabel(id) {
  const node = (bundle.graph?.nodes || []).find((item) => item.id === id);
  return String(node?.label || id).replaceAll('"', "'").slice(0, 48);
}

function mermaidId(value) {
  return `N_${String(value).replace(/[^A-Za-z0-9_]/g, "_")}`;
}

function progressBar(value) {
  const score = Math.max(0, Math.min(100, Number(value) || 0));
  return `<div class="progress" aria-label="${score}%"><i style="width:${score}%"></i></div>`;
}

function tag(value) {
  const raw = String(value || "unknown");
  const klass = /fail|blocked|open/i.test(raw) ? "fail" : /warn|advice|planned|missing|unknown/i.test(raw) ? "warn" : /pass|done|present|verified|review|in_progress/i.test(raw) ? "pass" : "";
  return `<span class="tag ${klass}">${escapeHtml(label(raw))}</span>`;
}

function label(value) {
  return t(`state_${value}`) || String(value || "unknown").replaceAll("_", " ");
}

function list(items = []) {
  return `<ul>${items.map((item) => `<li>${escapeHtml(item)}</li>`).join("") || `<li>${t("none")}</li>`}</ul>`;
}

function emptyState(text) {
  return `<div class="empty">${escapeHtml(text)}</div>`;
}

function projectName() {
  return bundle.status?.project?.name || "Harness";
}

function themeLabel() {
  return state.theme === "dark" ? t("light") : state.theme === "light" ? t("system") : t("dark");
}

function groupBy(items, fn) {
  return items.reduce((acc, item) => {
    const key = fn(item);
    acc[key] ||= [];
    acc[key].push(item);
    return acc;
  }, {});
}

window.setModulePage = function(moduleKey, page) {
  state.modulePages = state.modulePages || {};
  state.modulePages[moduleKey] = page;
  app();
};

function bind() {
  document.querySelectorAll("[data-search]").forEach((input) => input.addEventListener("input", () => {
    state.query = input.value;
    state.taskPageByGroup = {};
    state.taskGroupPage = 1;
    app();
  }));
  document.querySelectorAll("[data-state-filter]").forEach((select) => select.addEventListener("change", () => {
    state.taskState = select.value;
    state.taskPageByGroup = {};
    state.taskGroupPage = 1;
    app();
  }));
  document.querySelectorAll("[data-group-mode]").forEach((select) => select.addEventListener("change", () => {
    state.taskGroupMode = select.value;
    state.taskPageByGroup = {};
    state.taskGroupPage = 1;
    app();
  }));
  document.querySelectorAll("[data-layout]").forEach((btn) => btn.addEventListener("click", () => {
    state.taskLayout = btn.dataset.layout;
    localStorage.setItem("harness.taskLayout", state.taskLayout);
    app();
  }));
  document.querySelectorAll("[data-render-toggle]").forEach((button) => button.addEventListener("click", () => {
    state.renderMode = state.renderMode === "rendered" ? "source" : "rendered";
    app();
  }));
  document.querySelectorAll("[data-warning-filter]").forEach((button) => button.addEventListener("click", () => {
    state.warningFilter = button.dataset.warningFilter || "all";
    state.warningPage = 1;
    app();
  }));
  document.querySelectorAll("[data-warning-filter-select]").forEach((select) => select.addEventListener("change", () => {
    state.warningFilter = select.value;
    state.warningPage = 1;
    app();
  }));
  document.querySelectorAll("[data-page-kind]").forEach((button) => button.addEventListener("click", () => {
    const page = Math.max(1, Number(button.dataset.page) || 1);
    if (button.dataset.pageKind === "warning") state.warningPage = page;
    if (button.dataset.pageKind === "task-groups") state.taskGroupPage = page;
    if (button.dataset.pageKind === "task") state.taskPageByGroup[button.dataset.pageGroup || ""] = page;
    app();
  }));
  document.querySelectorAll("[data-runway-phase]").forEach((link) => link.addEventListener("click", () => {
    const phase = link.dataset.runwayPhase || "all";
    if (phase === "module-classification") state.taskGroupMode = "module";
    if (["triage", "active-task-contracts", "strict-cutover"].includes(phase)) state.warningFilter = phase === "triage" ? "all" : phase;
    state.warningPage = 1;
    state.taskGroupPage = 1;
    if (link.getAttribute("href") === "#/") app();
  }));
  document.querySelectorAll("[data-theme-toggle]").forEach((button) => button.addEventListener("click", () => {
    state.theme = state.theme === "dark" ? "light" : state.theme === "light" ? "system" : "dark";
    localStorage.setItem("harness.theme", state.theme);
    app();
  }));
  document.querySelectorAll("[data-open-drawer]").forEach((el) => el.addEventListener("click", (e) => {
    e.preventDefault();
    const taskId = el.dataset.openDrawer;
    openDrawer(taskId);
  }));
  document.querySelectorAll("[data-open-lesson-drawer]").forEach((el) => el.addEventListener("click", (e) => {
    e.preventDefault();
    const lessonId = el.dataset.openLessonDrawer;
    openLessonDrawer(lessonId);
  }));
  const overlay = document.getElementById("drawer-overlay");
  if (overlay) overlay.addEventListener("click", closeDrawer);
}

function renderDrawerContent(taskId) {
  const task = (bundle.status?.tasks || []).find((item) => item.id === taskId);
  if (!task) return `<div class="empty">${t("taskNotFound")}</div>`;

  const header = `
    <div class="task-drawer-header">
      <div>
        <h2>${escapeHtml(task.title)}</h2>
        <p style="font-family: var(--font-mono); font-size: 11px; margin: 4px 0 0; color: var(--muted);">${escapeHtml(task.id)}</p>
      </div>
      <button class="btn-close" data-close-drawer>×</button>
    </div>
  `;

  const timeline = phaseTimeline(task);
  const brief = taskDocSection(task, "brief.md", t("brief"), true);
  const plan = taskDocument(task, "brief.md") ? "" : taskDocSection(task, "task_plan.md", t("taskPlan"), false);
  const strategy = taskDocSection(task, "execution_strategy.md", t("strategy"), false);
  const visualMap = taskDocSection(task, "visual_map.md", t("visualMap"), false);
  const legacyRoadmap = taskDocSection(task, "visual_roadmap.md", t("legacyRoadmap"), false);
  const findings = openFindings(task);
  const evidence = evidenceList(task);

  const body = `
    <div class="task-drawer-body stack">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: var(--paper-2); padding: 12px 16px; border-radius: 8px;">
        <div style="font-size: 24px; font-weight: 800; color: var(--accent);">${task.completion}%</div>
        <a href="#/tasks/${encodeURIComponent(task.id)}" class="btn-drawer-trigger" style="text-decoration: none;">${t("fullView")}</a>
      </div>
      ${timeline}
      ${brief}
      ${plan}
      ${strategy}
      ${visualMap}
      ${legacyRoadmap}
      ${findings}
      ${evidence}
    </div>
  `;

  return header + body;
}

function openDrawer(taskId) {
  const drawer = document.getElementById("task-drawer");
  const overlay = document.getElementById("drawer-overlay");
  if (!drawer || !overlay) return;
  drawer.innerHTML = renderDrawerContent(taskId);
  drawer.classList.add("active");
  overlay.classList.add("active");

  drawer.querySelector("[data-close-drawer]").addEventListener("click", closeDrawer);
  drawer.querySelectorAll("[data-render-toggle]").forEach((button) => button.addEventListener("click", () => {
    state.renderMode = state.renderMode === "rendered" ? "source" : "rendered";
    openDrawer(taskId);
  }));
}

function renderLessonDrawerContent(lessonId) {
  const lessonTable = (bundle.tables?.tables || []).find((table) => table.kind === "lessons-ssot");
  const row = (lessonTable?.rows || []).find((r) => {
    const cells = r.cells || {};
    const id = cells.ID || cells.Lesson || cells["Lesson ID"] || cells["ID"] || "";
    return id === lessonId;
  });

  if (!row) {
    return `<div class="task-drawer-header">
      <h2>${escapeHtml(lessonId)}</h2>
      <button class="btn-close" data-close-drawer>×</button>
    </div>
    <div class="task-drawer-body">
      <div class="empty">${t("lessonNotFound")}</div>
    </div>`;
  }

  const cells = row.cells || {};
  const summary = cells.Summary || cells["\u6458\u8981"] || cells.Pattern || cells.Status || "";
  const docPath = cells["\u8be6\u60c5\u6587\u6863"] || cells.Document || cells.document || "";

  let doc = null;
  if (docPath) {
    doc = findDocument(docPath);
  }
  if (!doc) {
    doc = (bundle.documents?.documents || []).find((d) => d.path.includes(lessonId) || d.path.endsWith(`${lessonId}.md`));
  }

  const header = `
    <div class="task-drawer-header">
      <div>
        <h2>${escapeHtml(lessonId)}</h2>
        <p style="font-size: 12px; margin: 4px 0 0; color: var(--muted); font-weight: 600;">${escapeHtml(summary)}</p>
      </div>
      <button class="btn-close" data-close-drawer>×</button>
    </div>
  `;

  let markdownBody = "";
  if (doc && doc.content) {
    markdownBody = `<div class="markdown">${window.HarnessMarkdown.render(doc.content, "rendered")}</div>`;
  } else {
    const rowsHtml = Object.entries(cells)
      .map(([key, val]) => `<tr><th>${escapeHtml(key)}</th><td>${escapeHtml(val)}</td></tr>`)
      .join("");
    markdownBody = `
      <div style="margin-bottom: 20px; background: var(--paper-2); padding: 16px; border-radius: 8px; border: 1px dashed var(--line);">
        <p style="margin: 0; font-size: 13px; color: var(--muted);">${t("lessonDocMissing")}</p>
      </div>
      <table class="rendered-table" style="width: 100%;">
        <tbody>${rowsHtml}</tbody>
      </table>
    `;
  }

  const body = `
    <div class="task-drawer-body stack">
      ${markdownBody}
    </div>
  `;

  return header + body;
}

function openLessonDrawer(lessonId) {
  const drawer = document.getElementById("task-drawer");
  const overlay = document.getElementById("drawer-overlay");
  if (!drawer || !overlay) return;
  drawer.innerHTML = renderLessonDrawerContent(lessonId);
  drawer.classList.add("active");
  overlay.classList.add("active");

  drawer.querySelector("[data-close-drawer]").addEventListener("click", closeDrawer);
}

function closeDrawer() {
  const drawer = document.getElementById("task-drawer");
  const overlay = document.getElementById("drawer-overlay");
  if (drawer) drawer.classList.remove("active");
  if (overlay) overlay.classList.remove("active");
}

function ledgerPanel() {
  const ledgerTable = (bundle.tables?.tables || []).find((table) => table.kind === "harness-ledger");
  const rows = ledgerTable?.rows || [];

  let closedCount = 0;
  let openCount = 0;
  let blockedCount = 0;

  let lessonsReviewed = 0;
  let lessonsTotal = 0;

  let evidenceAudited = 0;
  let evidenceTotal = 0;

  for (const row of rows) {
    const cells = row.cells || {};
    const status = String(cells.Status || cells["\u72b6\u6001"] || "").toLowerCase();
    if (status.includes("close") || status.includes("done") || status.includes("\u7ed3") || status.includes("\u5b8c")) {
      closedCount++;
    } else if (status.includes("block") || status.includes("\u963b")) {
      blockedCount++;
    } else {
      openCount++;
    }

    const lesson = String(cells.Lessons || cells["\u7ecf\u9a8c"] || cells["\u7ecf\u9a8c\u5ba1\u67e5"] || cells["Lesson"] || "");
    if (lesson) {
      lessonsTotal++;
      if (lesson.toLowerCase().includes("pass") || lesson.includes("\u901a\u8fc7") || lesson.includes("\u5c31\u7eea") || lesson.toLowerCase().includes("checked") || lesson.toLowerCase().includes("done")) {
        lessonsReviewed++;
      }
    }

    const evidence = String(cells.Evidence || cells["\u8bc1\u636e"] || cells["\u9a8c\u8bc1\u8bc1\u636e"] || cells["Evidence Checked"] || "");
    if (evidence) {
      evidenceTotal++;
      if (evidence.toLowerCase().includes("pass") || evidence.includes("\u901a\u8fc7") || evidence.toLowerCase().includes("present") || evidence.toLowerCase().includes("verified") || evidence.toLowerCase().includes("done")) {
        evidenceAudited++;
      }
    }
  }

  const total = closedCount + openCount + blockedCount || 1;
  const closedPct = Math.round((closedCount / total) * 100);
  const openPct = Math.round((openCount / total) * 100);
  const blockedPct = total - closedPct - openPct;

  const lessonsPct = lessonsTotal ? Math.round((lessonsReviewed / lessonsTotal) * 100) : 0;
  const evidencePct = evidenceTotal ? Math.round((evidenceAudited / evidenceTotal) * 100) : 0;

  if (rows.length === 0) return "";

  return `<section class="ledger-panel">
    <h2>${t("ssotLedger")}</h2>
    <div class="ledger-split-bar" title="${t("tagClosed")}: ${closedCount}, ${t("tagOpen")}: ${openCount}, ${t("tagBlocked")}: ${blockedCount}">
      <div class="ledger-split-segment closed" style="width: ${closedPct}%"></div>
      <div class="ledger-split-segment open" style="width: ${openPct}%"></div>
      <div class="ledger-split-segment blocked" style="width: ${Math.max(0, blockedPct)}%"></div>
    </div>
    <div class="ledger-split-legend">
      <span class="ledger-split-legend-item"><i class="ledger-split-legend-dot closed"></i>${t("tagClosed")} (${closedCount})</span>
      <span class="ledger-split-legend-item"><i class="ledger-split-legend-dot open"></i>${t("tagOpen")} (${openCount})</span>
      <span class="ledger-split-legend-item"><i class="ledger-split-legend-dot blocked"></i>${t("tagBlocked")} (${blockedCount})</span>
    </div>
    <div class="ledger-gauge-row">
      <div class="ledger-gauge-card">
        <span>${t("lessonsCheckRate")}</span>
        <strong>${lessonsPct}%</strong>
      </div>
      <div class="ledger-gauge-card">
        <span>${t("evidenceAuditRate")}</span>
        <strong>${evidencePct}%</strong>
      </div>
    </div>
  </section>`;
}

function escapeHtml(value) {
  return String(value ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;");
}

function escapeAttr(value) {
  return escapeHtml(value).replaceAll("'", "&#39;");
}

window.addEventListener("hashchange", app);
app();
</script>
</body>
</html>

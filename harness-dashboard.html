itigated | no | review template |\n| R-021 | P1 | Public CI depended on private `.harness-private` state | implementation reviewer-C | Move private check out of public CI path and guard local test | no | mitigated | no | CI/test |\n| R-022 | P1 | Dashboard did not render evidence, handoffs, and recent activity | implementation reviewer-A | Render evidence meter/chips, handoff strip, and recent activity panel | no | mitigated | no | dashboard |\n| R-023 | P1 | Legacy status/check policy was inconsistent for Mingjing docs | implementation reviewer-B | Treat legacy drift as adoption warning by default and fail only with strict mode | no | mitigated | no | safe adoption |\n| R-024 | P1 | Review/verifier schema enforcement was incomplete | implementation reviewer-C | Require review sections, evidence rows, verifier `template_id`, and verdict in strict declared targets | no | mitigated | no | review/verifier gate |\n| R-025 | P1 | Capability registry allowed declared capabilities without scaffold artifacts | implementation reviewer-C | Validate declared artifacts and make `add-capability` scaffold missing core files | no | mitigated | no | capability registry |\n| R-026 | P2 | Evidence meter overstated completeness when some phases were missing evidence | implementation reviewer-A | Compute evidence meter from phase `evidenceStatus` values | no | mitigated | no | dashboard |\n\n## Decision\n\nPlan accepted for implementation sequencing with capability packs architecture.\nNot a release approval.\n\nAll known P0/P1/P2 strategy findings are now either closed, deferred out of v1.0\nwith a named version boundary, or mitigated by an explicit implementation\nconstraint.\n\n## Final Confidence Basis\n\nCurrent confidence is plan-level and adversarial-reviewed, not release approval.\nThe plan is acceptable only because release-blocking implementation promises are\nnow explicit gates: status JSON nested schema, review schema checker,\nchecker profiles, safe-adoption fixtures, verifier contract fixtures, and\ndashboard rendering smoke must all pass before V10 release closeout.\n\nImplementation confidence after 2026-05-18 review loop: adversarial-reviewed.\nThree independent implementation review rounds were completed. Round 3 returned\nno remaining P0/P1/P2 in dashboard/status, legacy adoption, or release-gate\nareas.\n\n## Release Gate\n\nNo release candidate may be claimed while any P0/P1/material-P2 finding has\n`Open=yes` or `Blocks Release=yes`. Accepted residuals need follow-up routing.\n"},{"id":"doc-0016-task-plan","path":"TARGET:docs/09-PLANNING/TASKS/2026-05-17-v1.0-document-kernel-release/task_plan.md","title":"Task Plan - v1.0 Document Kernel Release","type":"markdown-table","content":"# Task Plan - v1.0 Document Kernel Release\n\n- Task ID: `PF-002`\n- Status: `planned`\n- Owner: coordinator\n- Date: 2026-05-17 (revised 2026-05-18)\n- Public artifact: `PUBLIC:docs-release/release/v1.0-document-kernel-plan.md`\n- Source notes: `PUBLIC:docs/plans/2026-05-17-v1.0-to-v2-roadmap-cn.md`, `PUBLIC:docs/plans/2026-05-18-v1.0-optional-capability-packs-cn.md`\n\n## Goal\n\nShip v1.0 as a modular Document Kernel with optional capability packs:\n\n- Core: installable, auditable, verifiable document governance kernel\n- Optional packs: module-parallel, subagent-worker, adversarial-review, long-running-task\n\nv1.0 must not introduce automatic global table writes, dashboard controls, or\nautomated verifier runtime. Installation distinguishes Scaffold (CLI mechanical)\nfrom Configure (Agent conversational customization).\n\n## Scope\n\nAllowed public writes:\n\n- `package.json`\n- `README.md`\n- `CHANGELOG.md`\n- `SKILL.md`\n- `scripts/`\n- `references/`\n- `templates/`\n- `examples/`\n- `.github/`\n- `docs-release/`\n\nAllowed private writes:\n\n- `.harness-private/docs/09-PLANNING/Private-Feature-SSoT.md`\n- `.harness-private/docs/09-PLANNING/TASKS/2026-05-17-v1.0-document-kernel-release/`\n- `.harness-private/docs/05-TEST-QA/Regression-SSoT.md`\n- `.harness-private/docs/Harness-Ledger.md`\n- `.harness-private/docs/10-WALKTHROUGH/Closeout-SSoT.md`\n\nOut of scope for v1.0:\n\n- `coordinator-pass --apply`\n- `check --fix`\n- `add-module --apply`\n- automatic migration or `upgrade --apply`\n- control dashboard, multi-page generated site, or frontend app\n- `harnessd`\n- automatic writes to global SSoT or ledger files\n- automated verifier dispatch/runtime\n- `remove-capability` CLI command\n\n## Task IA Budget\n\n| Budget | Use When | Required Structure |\n| --- | --- | --- |\n| complex | Release task with 14 slices, L2 gates, reviewer input, public/private docs, and examples | Core five task files plus indexed references/artifacts/slices when implementation starts |\n\nOptional structures are enabled by trigger, not by default:\n\n- `references/INDEX.md` for reviewer packets, source notes, and cross-repo context.\n- `artifacts/INDEX.md` for fixtures, screenshots, command output, reports, and review transcripts.\n- `slices/\u003cslice-id>/` for per-slice `brief.md`, `evidence.md`, and `review.md` once implementation starts.\n\nInline tables are allowed up to 5 references/artifacts with no reusable reviewer\npacket. This task already has reviewer input and source notes, so\n`references/INDEX.md` and `artifacts/INDEX.md` are active. `slices/` starts when\nimplementation begins.\n\n## Context Packet\n\n| ID | Type | Path | Why It Matters | Used By |\n| --- | --- | --- | --- | --- |\n| C-001 | public-doc | PUBLIC:docs-release/release/v1.0-visual-roadmap-cn.md | Public visual roadmap and dashboard expression design | coordinator / reviewer |\n| C-002 | private-plan | PRIVATE:docs/09-PLANNING/TASKS/2026-05-17-v1.0-document-kernel-release/task_plan.md | Active execution plan | coordinator / reviewer |\n| C-003 | public-plan | PUBLIC:docs/plans/2026-05-18-v1.0-optional-capability-packs-cn.md | Capability packs source discussion | coordinator |\n| C-004 | private-template | PRIVATE:docs/09-PLANNING/TASKS/_task-template/task_plan.md | Task IA and visual roadmap template | coordinator |\n\n## Execution Strategy\n\n| Decision | Choice | Notes |\n| --- | --- | --- |\n| Primary executor | coordinator-led implementation | Coordinator owns sequencing, global tables, final release judgment. |\n| Subagents | reviewer-only by default | Use subagents only for capability registry/checker, init boundary, dashboard scope, verification contract, and final release review. |\n| Code-writing subagents | exceptional only | Must use dedicated worktree and commit-backed handoff. |\n| Review model | static checks first, predefined verifier templates for risky slices | No ad-hoc reviewer prompts count as release evidence. |\n| Evidence depth | L2 for CLI/checker/dashboard/examples, L1 for docs-only | Each slice records evidence before moving forward. |\n\nSubagent input packets must stay bounded: slice summary, selected diff, acceptance\ncriteria, evidence log, relevant rule IDs, and focused risk questions.\n\n## Visual Roadmap\n\nThis roadmap is the source that the basic HTML dashboard should render for this\nrelease task. The dashboard must not invent a separate execution model.\n\n```mermaid\nflowchart LR\n  W0[\"Wave 0\u003cbr/>Scope + Strategy\"]\n  W1[\"Wave 1\u003cbr/>CLI Kernel\"]\n  W2[\"Wave 2\u003cbr/>Content + Visuals\"]\n  W3[\"Wave 3\u003cbr/>Release Gates\"]\n\n  W0 --> W1 --> W2 --> W3\n```\n\n| Phase ID | Depends On | State | Completion | Output | Required Evidence | Evidence Status | Blocking Risk | Owner / Handoff |\n| --- | --- | --- | --- | --- | --- | --- | --- | --- |\n| W0 | none | done | 100 | Scope lock, capability packs, execution strategy, safe adoption, visual roadmap contract | private harness check; no open P0/P1/P2 strategy findings | present | none | coordinator |\n| W1 | W0 | planned | 0 | package, registry, check, status, init, add-capability | fixture tests and compatibility checks | missing | implementation not started | coordinator |\n| W2 | W1 | planned | 0 | SKILL restructure, examples, read-only dashboard | examples pass checker; dashboard read-only smoke | missing | depends on status JSON contract | coordinator |\n| W3 | W2 | planned | 0 | public docs, CI, verification contract, final review | clean CI command set; structured verification output | missing | release review pending | coordinator |\n\nCompletion is an integer `0..100`; `done=100`, `planned=0`, and `skipped`\nphases are excluded from the overall dashboard average.\n\n## Artifact Index\n\n| Artifact ID | Type | Path | Summary |\n| --- | --- | --- | --- |\n| A-001 | review | PRIVATE:docs/09-PLANNING/TASKS/2026-05-17-v1.0-document-kernel-release/review.md | Strategy review findings and dispositions |\n| A-002 | report | PUBLIC:docs-release/release/v1.0-visual-roadmap-cn.md | Public roadmap and dashboard expression contract |\n\n## Release State Machine\n\n```mermaid\nstateDiagram-v2\n  [*] --> Planned\n  Planned --> SliceActive\n  SliceActive --> SliceReview\n  SliceReview --> NextSlice\n  NextSlice --> SliceActive\n  SliceReview --> ReleaseCandidate\n  ReleaseCandidate --> FinalReview\n  FinalReview --> ReadyToTag\n  FinalReview --> Blocked\n  Blocked --> SliceActive\n```\n\n## Work Breakdown\n\n```mermaid\nflowchart TB\n  subgraph \"Wave 0: 合同收敛\"\n    S00[\"V10-00\u003cbr/>Scope Lock +\u003cbr/>Capability Packs Design\"]\n  end\n\n  subgraph \"Wave 1: CLI 内核\"\n    S01[\"V10-01\u003cbr/>Package Baseline\"]\n    S02[\"V10-02\u003cbr/>Capability Registry\u003cbr/>(.harness-capabilities.json)\"]\n    S03[\"V10-03\u003cbr/>harness check\u003cbr/>(capability-aware)\"]\n    S04[\"V10-04\u003cbr/>harness status\"]\n    S05[\"V10-05\u003cbr/>harness init\u003cbr/>(scaffold + cap select)\"]\n    S06[\"V10-06\u003cbr/>harness add-capability\"]\n  end\n\n  subgraph \"Wave 2: 内容与示例\"\n    S07[\"V10-07\u003cbr/>SKILL.md Phase 重构\"]\n    S08[\"V10-08\u003cbr/>Examples\u003cbr/>(minimal / full)\"]\n    S09[\"V10-09\u003cbr/>Basic HTML Dashboard\"]\n    S10[\"V10-10\u003cbr/>Safe Adoption\u003cbr/>(旧项目接入)\"]\n  end\n\n  subgraph \"Wave 3: 文档与发布\"\n    S11[\"V10-11\u003cbr/>Public Docs\"]\n    S12[\"V10-12\u003cbr/>CI\"]\n    S13[\"V10-13\u003cbr/>Verification Contract\"]\n    S14[\"V10-14\u003cbr/>Final Release Review\"]\n  end\n\n  S00 --> S01\n  S01 --> S02\n  S02 --> S03\n  S02 --> S04\n  S02 --> S05\n  S05 --> S06\n  S03 --> S08\n  S04 --> S09\n  S03 --> S10\n  S00 --> S07\n  S07 --> S05\n  S08 --> S12\n  S09 --> S08\n  S10 --> S11\n  S11 --> S13\n  S12 --> S13\n  S13 --> S14\n```\n\n### Slice Details\n\n| Step | Slice | Write Scope | Output | Required Evidence | Status |\n| --- | --- | --- | --- | --- | --- |\n| V10-00 | Scope lock + capability packs design | private plan + public docs-release | v1.0 scope, non-goals, capability packs architecture | private harness check + design review | in-progress |\n| V10-01 | Package baseline | `package.json`, `README.md`, `CHANGELOG.md` | publishable package shell | package metadata review | planned |\n| V10-02 | Capability registry | `scripts/lib/capabilities*` | `.harness-capabilities.json` read/write, dependency validation, capability state model | unit tests for JSON parse + dep check + state validation | planned |\n| V10-03 | harness check (capability-aware) | `scripts/lib/checker*`, `scripts/check-harness.mjs` | checker selects static rule groups per installed capability/state and validates review/task roadmap shape | old fixtures pass, new cap-aware fixtures pass, orphan artifacts warn, task-shape fixtures fail/pass as expected, review schema fixture fails/passes as expected | planned |\n| V10-04 | harness status | `scripts/lib/status*` | `harness status --json` with dashboard data contract | fixture status snapshots include project, checkState, capabilities, tasks, phases, risks, evidence, handoffs, activity | planned |\n| V10-05 | harness init (scaffold + capability select) | `scripts/lib/init*`, `templates/` | `harness init --dry-run` with `--capabilities` flag | scaffold output matches expected, no target files modified in dry-run | planned |\n| V10-06 | harness add-capability | `scripts/lib/capabilities*` | `harness add-capability \u003cname> [--dry-run]` | dependency check, scaffold-only output, .harness-capabilities.json updated with state=scaffolded | planned |\n| V10-07 | SKILL.md phase restructure | `SKILL.md` | 6-phase SOP (Diagnose → Decide → Scaffold → Configure → Verify → Deliver) | old phase content preserved, new structure matches capability packs design | planned |\n| V10-08 | Examples | `examples/minimal-project`, `examples/full-project` | minimal (core only) + full (all capabilities) | both pass checker, demonstrate scaffold vs configure split | planned |\n| V10-09 | Basic HTML dashboard | `scripts/lib/dashboard*` | single-page read-only visual status and task visual roadmaps | renders only from `harness status --json` contract, no writes, shows installed capabilities and phase completion | planned |\n| V10-10 | Safe adoption for old harness projects | `scripts/lib/status*`, docs, examples | `legacy-compat` mode and suggested `.harness-capabilities.json` | old projects continue checking without capability file; adoption suggestion is not auto-applied; orphan warnings only in declared/strict mode; legacy/declared-orphan fixtures cover both modes | planned |\n| V10-11 | Public docs | `docs-release/`, public README | architecture, concepts, capability packs guide, safe adoption guide, release boundary | private leakage scan | planned |\n| V10-12 | CI | `.github/workflows/`, package scripts | implemented checks only | clean checkout CI command list | planned |\n| V10-13 | Verification contract | `references/`, `templates/`, review schema | fillable verifier templates with fixed invariants and schema IDs | checker validates template_id, verdict, severity, evidence refs, required actions, residual routing; valid/invalid sample outputs are fixture-tested | planned |\n| V10-14 | Final release review | private review + closeout | release candidate decision | no open P0/P1/P2 findings | planned |\n\n## Dependency Order\n\n```mermaid\nflowchart TB\n  S00[\"V10-00 Scope Lock\"] --> S01[\"V10-01 Package\"]\n  S01 --> S02[\"V10-02 Cap Registry\"]\n  S02 --> S03[\"V10-03 check\"]\n  S02 --> S04[\"V10-04 status\"]\n  S02 --> S05[\"V10-05 init\"]\n  S00 --> S07[\"V10-07 SKILL.md\"]\n  S07 --> S05\n  S05 --> S06[\"V10-06 add-capability\"]\n  S03 --> S08[\"V10-08 Examples\"]\n  S04 --> S09[\"V10-09 Dashboard\"]\n  S09 --> S08\n  S03 --> S10[\"V10-10 Safe Adoption\"]\n  S08 --> S12[\"V10-12 CI\"]\n  S00 --> S11[\"V10-11 Docs\"]\n  S10 --> S11\n  S12 --> S13[\"V10-13 Verification\"]\n  S11 --> S13\n  S13 --> S14[\"V10-14 Final Review\"]\n```\n\n## Worker Rules\n\n- Workers may own one slice at a time.\n- Workers must not edit `.harness-private/docs/Harness-Ledger.md`,\n  `Private-Feature-SSoT.md`, `Closeout-SSoT.md`, or `Regression-SSoT.md`.\n- Slice workers close with `Coordinator Handoff: pending-coordinator-pass`.\n- The coordinator serializes global table updates after reviewing the worker commit.\n\n## Acceptance Criteria\n\nv1.0 can be called release-ready only when:\n\n- `scripts/check-harness.mjs` remains backward compatible.\n- `harness check` selects static built-in rule groups based on `.harness-capabilities.json`.\n- `harness check` with no `.harness-capabilities.json` falls back to file-detection logic.\n- Capability states (`scaffolded`, `configured`, `verified`) determine rule strictness.\n- Orphan capability artifacts are warned only in `declared-capability` or strict adoption mode.\n- Old harness projects can run check/status in `legacy-compat` mode without `.harness-capabilities.json` and receive a safe adoption suggestion.\n- `harness status` is read-only and emits the dashboard JSON contract.\n- `harness init --dry-run` supports `--capabilities` flag and mutates no project files.\n- `harness init` separates scaffold (mechanical) from configure (agent-guided), and does not silently change existing capability selections.\n- `harness add-capability` validates dependencies and only performs scaffold.\n- SKILL.md uses the 6-phase structure (Diagnose → Decide → Scaffold → Configure → Verify → Deliver).\n- Both example projects pass the checker (minimal with core-only, full with all capabilities).\n- The basic HTML dashboard renders status, installed capabilities, phase completion, risks, evidence, handoffs, and task Visual Roadmap diagrams, no write actions.\n- Verifier templates separate fixed invariants from task-specific fill slots and use schema-enforced template IDs.\n- CI runs only implemented commands.\n- Public docs explain capability packs and v1.0 non-goals clearly.\n- Public docs explain safe adoption for old harness projects without promising automatic migration.\n- No release-blocking P0/P1/material-P2 findings remain in `review.md`; accepted residuals have follow-up routing.\n\n## Coordinator Handoff\n\nCurrent owner: coordinator. No worker handoff is pending.\n"},{"id":"doc-0017-visual-roadmap","path":"TARGET:docs/09-PLANNING/TASKS/2026-05-17-v1.0-document-kernel-release/visual_roadmap.md","title":"Visual Roadmap - v1.0 Document Kernel Release","type":"legacy-visual-roadmap","content":"# Visual Roadmap - v1.0 Document Kernel Release\n\n```mermaid\nflowchart LR\n  W0[\"W0\\nRebaseline\\nscope + language + contracts\"] --> W1[\"W1\\nCLI Kernel\\nregistry/check/status/init\"]\n  W1 --> W2[\"W2\\nContent + Examples\\nSKILL/docs/examples/dashboard\"]\n  W2 --> W3[\"W3\\nRelease Gates\\nCI + verifier + final review\"]\n```\n\n| Phase ID | Depends On | State | Completion | Output | Required Evidence | Evidence Status | Blocking Risk | Owner / Handoff |\n| --- | --- | --- | --- | --- | --- | --- | --- | --- |\n| W0 | none | in_progress | 60 | Rebaseline, canonical capability taxonomy, locale strategy, six-phase install, dashboard v2 boundary | private harness check; PF-004 review blockers closed | partial | open PF-004 P1 findings | coordinator |\n| W1 | W0 | planned | 0 | package, capability registry, capability-aware check, status JSON, locale-aware init, add-capability | fixture tests and compatibility checks | missing | implementation must not copy fake configured references | coordinator |\n| W2 | W1 | planned | 0 | SKILL/README/docs-release alignment, examples, minimal read-only dashboard | examples pass checker; dashboard read-only smoke; locale fixtures | missing | depends on W1 status/init contracts | coordinator |\n| W3 | W2 | planned | 0 | CI, verification contract, final release review | clean CI command set; no open P0/P1/material-P2 review findings | missing | release review pending | coordinator |\n\nAllowed `State`: `planned`, `in_progress`, `review`, `blocked`, `done`, `skipped`.\nAllowed `Evidence Status`: `missing`, `partial`, `present`, `waived`.\n"},{"id":"doc-0018-execution-strategy","path":"TARGET:docs/09-PLANNING/TASKS/2026-05-18-v1.0-dashboard-static-frontend/execution_strategy.md","title":"Execution Strategy","type":"execution-strategy","content":"# Execution Strategy\n\n## Decision Table\n\n| Decision | Choice | Notes |\n| --- | --- | --- |\n| Primary executor | coordinator | Dashboard IA, data contract, CLI writer, and UX must stay coherent. |\n| Subagents | reviewer-only for planning; optional worker-worktree after D0/D1 boundaries are stable | Avoid splitting UI implementation before the data contract and shell boundaries are fixed. |\n| Review model | adversarial review | Use 3 independent reviewers: IA/readability, parser/data contract, release/smoke. |\n| Worktree strategy | same checkout for planning; dedicated worktree for any code-writing worker | Code-writing subagents must hand off commit SHA and changed paths. |\n| Conflict control | coordinator owns shared files | `scripts/harness.mjs`, `scripts/lib/harness-core.mjs`, dashboard shell assets, README, and release docs are coordinator-owned shared surfaces. |\n| Evidence depth | L2 normally; L3 for Mingjing legacy smoke and final release gate | This changes user-facing dashboard behavior and adoption safety. |\n| Implementation order | D0 -> D1 -> D2 -> D3 -> D4 -> D5 | Data contract before UI, UI shell before page polish, smoke before closeout. |\n| React boundary | no React in v1.0 | Build vanilla static modules with React-compatible boundaries for later migration. |\n\n## Subagent / Worker Contract\n\n| Role | Input Packet | Write Scope | Handoff Required | Owner |\n| --- | --- | --- | --- | --- |\n| IA/readability reviewer | C-001, C-003, screenshot/output folder after D3 | read-only | findings table, P0-P3, concrete UI fixes | coordinator |\n| parser/data reviewer | C-004, C-005, generated `data/*.json` after D0/D1 | read-only | schema findings, path-leak findings, legacy fallback findings | coordinator |\n| release/smoke reviewer | generated dashboard, test output, Mingjing smoke output after D5 | read-only | release blockers, smoke gaps, residual risks | coordinator |\n| code worker | exact slice brief only, if later enabled | dedicated worktree and assigned files only | branch, commit SHA, checks, residuals | coordinator |\n\n## Shared File Ownership\n\n| Surface | Owner | Rule |\n| --- | --- | --- |\n| `scripts/harness.mjs` | coordinator | No parallel worker edits. |\n| `scripts/lib/harness-core.mjs` | coordinator | Data contract changes are serialized. |\n| `scripts/lib/dashboard-writer.mjs` | coordinator until created | Can be delegated after public API is fixed. |\n| `templates/dashboard/**` | coordinator until D1 shell exists | UI workers only after D1 and with disjoint files. |\n| `scripts/test-harness.mjs` | coordinator | Test additions must match slice gates. |\n| `docs-release/release/**` | coordinator | Public release docs updated after implementation behavior is real. |\n\n## Verification Plan\n\n| Gate | Command / Check | Required Phase |\n| --- | --- | --- |\n| syntax | `node --check scripts/harness.mjs && node --check scripts/lib/harness-core.mjs` plus new modules | every code slice |\n| unit/smoke | `npm test` | D0-D5 |\n| source package | `node scripts/harness.mjs check --profile source-package .` | D5 |\n| example target | `node scripts/harness.mjs check --profile target-project examples/minimal-project` | D0-D5 |\n| folder output | `node scripts/harness.mjs dashboard --out-dir tmp/harness-dashboard examples/minimal-project` | D1-D5 |\n| Mingjing legacy | `node scripts/harness.mjs dashboard --out-dir tmp/mingjing-dashboard LOCAL_PATH_REDACTED` | D5 |\n| target mutation | compare target docs git status before/after Mingjing smoke | D5 |\n| browser smoke | open generated `index.html`, verify pages, drawer, i18n, theme, markdown, mermaid | D3-D5 |\n\n## Stop / Escalation Conditions\n\n- Generated dashboard would need to write target project files.\n- Data JSON exposes local absolute paths where `TARGET:` / `PUBLIC:` / `PRIVATE:` should be used.\n- Overview still reads like a raw warning dump after D3.\n- `visual_roadmap.md` or `execution_strategy.md` cannot be rendered independently.\n- Mingjing legacy smoke turns adoption warnings into hard blocker UX.\n- Any reviewer finds open P0/P1/P2 after a fix round.\n"},{"id":"doc-0019-findings","path":"TARGET:docs/09-PLANNING/TASKS/2026-05-18-v1.0-dashboard-static-frontend/findings.md","title":"Findings","type":"markdown-table","content":"# Findings\n\n## Context\n\nThis task converts the v1.0 dashboard discussion into an implementation-ready\ntask folder using standalone execution and visualization contracts.\n\n## Findings Table\n\n| ID | Severity | Finding | Evidence | Status |\n| --- | --- | --- | --- | --- |\n| F-001 | P1 | The dashboard must be built around harness tables, not raw `status --json` dumps. | PUBLIC:docs-release/release/v1.0-dashboard-static-frontend-plan-cn.md | accepted |\n| F-002 | P1 | `execution_strategy.md` and `visual_roadmap.md` must be standalone task files so the dashboard can render them directly. | PUBLIC:templates/planning/task_plan.md | accepted |\n| F-003 | P1 | Data contract must precede UI implementation or page design will drift from real table semantics. | PRIVATE:docs/09-PLANNING/TASKS/2026-05-18-v1.0-dashboard-static-frontend/execution_strategy.md | accepted |\n| F-004 | P2 | v1.0 should remain static vanilla JS unless persistent write-back or complex routing forces React later. | PUBLIC:docs-release/release/v1.0-dashboard-static-frontend-plan-cn.md | accepted |\n| F-005 | P2 | Mingjing legacy warnings are an adoption UX problem, not release blockers for read-only dashboard rendering. | TARGET:LOCAL_PATH_REDACTED | accepted |\n"},{"id":"doc-0020-progress","path":"TARGET:docs/09-PLANNING/TASKS/2026-05-18-v1.0-dashboard-static-frontend/progress.md","title":"Progress","type":"task-progress","content":"# Progress\n\n## Status\n\nreview\n\n## Updates\n\n| Date | Update | Evidence |\n| --- | --- | --- |\n| 2026-05-18 | Created standalone implementation task for v1.0 dashboard static frontend | report:PRIVATE:docs/09-PLANNING/TASKS/2026-05-18-v1.0-dashboard-static-frontend/task_plan.md:task contract created |\n| 2026-05-18 | Added independent execution strategy and visual roadmap files for dashboard implementation | report:PRIVATE:docs/09-PLANNING/TASKS/2026-05-18-v1.0-dashboard-static-frontend/visual_roadmap.md:standalone roadmap |\n| 2026-05-18 | Implemented static dashboard folder output, dashboard data bundle, localized PLM-style pages, Markdown reader, Mermaid SVG renderer, Ledger/Evidence surfaces, and safety guards | diff:PUBLIC:scripts/harness.mjs:dashboard out-dir implementation |\n| 2026-05-18 | Ran three adversarial review rounds with independent IA, data/security, and release/smoke directions; fixed all P0/P1 findings and selected P2 findings | review:PRIVATE:docs/09-PLANNING/TASKS/2026-05-18-v1.0-dashboard-static-frontend/review.md:three-round closeout |\n| 2026-05-18 | Verified with npm test, dashboard smoke, source/target checks, diff check, Mingjing no-mutation smoke, and Chrome headless DOM smoke | command:PUBLIC:scripts/test-harness.mjs:Harness v1 tests passed |\n\nEvidence values use `type:path:summary`.\nAllowed types: `command`, `diff`, `fixture`, `screenshot`, `review`, `report`.\nFor heavy evidence, reference `artifacts/INDEX.md` instead of pasting output.\n"},{"id":"doc-0021-index","path":"TARGET:docs/09-PLANNING/TASKS/2026-05-18-v1.0-dashboard-static-frontend/references/INDEX.md","title":"References Index","type":"task-references","content":"# References Index\n\n| Reference ID | Type | Path | Why It Matters | Used By |\n| --- | --- | --- | --- | --- |\n| REF-001 | release-plan | PUBLIC:docs-release/release/v1.0-dashboard-static-frontend-plan-cn.md | Public release scope, IA, output structure, acceptance criteria | all slices |\n| REF-002 | execution-strategy | PUBLIC:docs-release/release/v1.0-dashboard-static-frontend-execution-strategy-cn.md | Release-level execution rules | coordinator |\n| REF-003 | visual-roadmap | PUBLIC:docs-release/release/v1.0-dashboard-static-frontend-visual-roadmap-cn.md | Release-level phase table | coordinator / dashboard |\n| REF-004 | template | PUBLIC:templates/planning/task_plan.md | New task contract structure | D0 / D3 |\n| REF-005 | template | PUBLIC:templates/planning/execution_strategy.md | Standalone strategy template | D0 / D3 |\n| REF-006 | template | PUBLIC:templates/planning/visual_roadmap.md | Standalone roadmap template | D0 / D3 |\n| REF-007 | code | PUBLIC:scripts/lib/harness-core.mjs | Current parser/status/dashboard implementation | D0 / D1 |\n| REF-008 | fixture | PUBLIC:examples/minimal-project/docs/09-PLANNING/TASKS/demo-task/visual_roadmap.md | Standalone roadmap fixture | D0 / smoke |\n| REF-009 | legacy-target | TARGET:LOCAL_PATH_REDACTED | Old harness adoption smoke target | D5 |\n"},{"id":"doc-0022-review","path":"TARGET:docs/09-PLANNING/TASKS/2026-05-18-v1.0-dashboard-static-frontend/review.md","title":"Review","type":"task-review","content":"# Review\n\n## Reviewer Identity\n\n| Reviewer | Type | Scope |\n| --- | --- | --- |\n| coordinator | self-check | implementation closeout |\n| Descartes | adversarial-review | IA/readability |\n| Boyle | adversarial-review | data/parser/security |\n| Socrates | adversarial-review | release/smoke/PR |\n\n## Confidence Challenge\n\nThe strongest risk was that the static dashboard could become another raw data\ndump instead of a readable project-management surface. The implementation now\nhas first-class task, ledger, module, evidence, review, and adoption surfaces;\nthe remaining risk is that browser smoke is local evidence rather than a CI\nbrowser gate.\n\n## Evidence Checked\n\n| Evidence ID | Type | Path | Summary |\n| --- | --- | --- | --- |\n| E-001 | report | PRIVATE:docs/09-PLANNING/TASKS/2026-05-18-v1.0-dashboard-static-frontend/task_plan.md | implementation task plan |\n| E-002 | report | PRIVATE:docs/09-PLANNING/TASKS/2026-05-18-v1.0-dashboard-static-frontend/execution_strategy.md | execution strategy |\n| E-003 | report | PRIVATE:docs/09-PLANNING/TASKS/2026-05-18-v1.0-dashboard-static-frontend/visual_roadmap.md | visual roadmap |\n| E-004 | command | PUBLIC:scripts/test-harness.mjs | `npm test` passed |\n| E-005 | command | PUBLIC:scripts/smoke-dashboard.mjs | `npm run smoke:dashboard` passed |\n| E-006 | command | PUBLIC:scripts/harness.mjs | source-package and target-project checks passed |\n| E-007 | review | EXTERNAL:subagents/round-1 | three independent adversarial reviews found unsafe output, path leaks, IA gaps, raw rendering gaps |\n| E-008 | review | EXTERNAL:subagents/round-2 | three independent adversarial reviews found docs-child output gap, generic path redaction gap, graph dangling edges, title escaping, Ledger/Evidence IA gaps |\n| E-009 | review | EXTERNAL:subagents/round-3 | three independent adversarial reviews found no P0/P1 blockers; only non-blocking P2 residuals |\n| E-010 | fixture | PUBLIC:examples/minimal-project | example dashboard includes standalone execution strategy, visual roadmap, and Harness Ledger |\n\n## Findings\n\n| ID | Severity | Finding | Evidence Checked | Required Action | Open | Disposition | Blocks Release | Follow-up |\n| --- | --- | --- | --- | --- | --- | --- | --- | --- |\n| R-001 | P1 | Unsafe dashboard output could write inside target docs subtree. | E-007, E-008 | Reject docsRoot descendants and add regression tests. | no | closed | no | none |\n| R-002 | P1 | Generated dashboard data could leak local absolute paths. | E-007, E-008 | Add generic local path redaction and tests. | no | closed | no | none |\n| R-003 | P1 | Graph edges could point to nonexistent nodes. | E-008 | Normalize dependencies and assert graph endpoint integrity. | no | closed | no | none |\n| R-004 | P1 | Dashboard page title had an HTML injection path. | E-008 | Escape pageTitle before render and test. | no | closed | no | none |\n| R-005 | P1 | Ledger and Evidence were not first-class project-management surfaces. | E-008, E-009 | Add Ledger page/summary and Evidence rows from task/review/QA data. | no | closed | no | none |\n| R-006 | P2 | CI file smoke is not a real browser-runtime smoke. | E-009 | Keep local Chrome DOM smoke as release evidence; consider CI browser smoke after v1.0. | yes | accepted-risk | no | post-v1 |\n| R-007 | P2 | Evidence/adoption rows can still be more reader-friendly. | E-009 | Group/localize further after users validate first static dashboard. | yes | accepted-risk | no | post-v1 |\n\n## Decision\n\nImplementation is ready to push as v1.0 static dashboard PR. No P0/P1 blocker\nremains after three review rounds plus post-round delta sanity checks.\n\n## Final Confidence Basis\n\nConfidence is based on local automated tests, file smoke, source/target checks,\nMingjing no-mutation smoke, Chrome headless DOM smoke, and independent\nadversarial review from IA, data/security, and release/smoke directions.\n"},{"id":"doc-0023-task-plan","path":"TARGET:docs/09-PLANNING/TASKS/2026-05-18-v1.0-dashboard-static-frontend/task_plan.md","title":"v1.0 Dashboard Static Frontend Implementation","type":"markdown-table","content":"# v1.0 Dashboard Static Frontend Implementation\n\n## Goal\n\n把 `harness dashboard` 从单页状态输出升级为一个可离线打开、可读、可审计的静态 PLM 项目驾驶舱。\n\n## Scope\n\n- 做什么：实现 `dashboard --out-dir` 文件夹输出、核心 Markdown 表解析、文档快照、Markdown/Mermaid 阅读器、ZH/EN、light/dark、PLM B 风格页面、Mingjing legacy adoption smoke。\n- 不做什么：不做在线编辑、不做后端、不做 React TS app、不做自动迁移器、不写目标项目文件。\n\n## Task IA Budget\n\n| Budget | Use When | Required Structure |\n| --- | --- | --- |\n| complex | Dashboard touches CLI, parser, generated assets, UX, docs, smoke, and legacy adoption | Use standalone contract files, references index, and six implementation slices |\n\nEnabled optional structure:\n\n- `references/INDEX.md` because implementation requires release docs, templates, example fixtures, and Mingjing legacy target context.\n- `slices/\u003cslice-id>/` because the dashboard is a multi-slice feature with separate data, shell, reader, page, UX, and smoke responsibilities.\n\nNo `artifacts/INDEX.md` yet. Create it only after commands, screenshots, generated dashboards, or review transcripts need durable indexing.\n\n## Context Packet\n\n| ID | Type | Path | Why It Matters | Used By |\n| --- | --- | --- | --- | --- |\n| C-001 | public-doc | PUBLIC:docs-release/release/v1.0-dashboard-static-frontend-plan-cn.md | Release-level scope and page IA | coordinator / reviewer |\n| C-002 | public-doc | PUBLIC:docs-release/release/v1.0-dashboard-static-frontend-execution-strategy-cn.md | Release-level execution strategy | coordinator |\n| C-003 | public-doc | PUBLIC:docs-release/release/v1.0-dashboard-static-frontend-visual-roadmap-cn.md | Release-level phase model | coordinator / dashboard parser |\n| C-004 | public-doc | PUBLIC:templates/planning/task_plan.md | New task contract shape | coordinator / reviewer |\n| C-005 | public-doc | PUBLIC:scripts/lib/harness-core.mjs | Current status/check/dashboard implementation | implementer |\n| C-006 | public-doc | PUBLIC:examples/minimal-project/docs/09-PLANNING/TASKS/demo-task/visual_roadmap.md | Standalone roadmap fixture | implementer / smoke |\n| C-007 | target-doc | TARGET:LOCAL_PATH_REDACTED | Legacy adoption target for smoke only | coordinator / smoke |\n\nUse repo-root prefixes instead of fragile relative paths. Do not put local absolute paths into generated dashboard JSON except in private task evidence.\n\n## Execution & Visualization Files\n\n| Contract File | Required | Purpose |\n| --- | --- | --- |\n| `execution_strategy.md` | yes | How this dashboard work is executed, reviewed, and conflict-controlled |\n| `visual_roadmap.md` | yes | Computable route for dashboard implementation phases |\n\nThese files are standalone so the future dashboard can render them directly.\n\n## Page / Data Landing Matrix\n\n| Page | Primary Data | Required Views | Empty / Warning Behavior | Slice |\n| --- | --- | --- | --- | --- |\n| Overview | `status.json`, Harness Ledger rows, derived readiness | status banner, readiness, blockers, evidence completeness, next action | never dump raw warning list on first viewport | D3 |\n| Tasks | task folders, `task_plan.md`, `execution_strategy.md`, `visual_roadmap.md`, `progress.md`, `review.md` | task table, detail drawer, phase cards, evidence state, review state | missing contract files become Plan Contract Missing | D0 / D3 |\n| Modules | `Module-Registry.md`, module folders, module task folders | dependency graph, lanes, handoff queue, module strategy/roadmap tabs | missing registry becomes Adoption Advice in legacy mode | D0 / D3 |\n| Evidence | `Regression-SSoT.md`, `Cadence-Ledger.md`, reviews, progress evidence | evidence matrix, gate state, review findings | separate blockers from adoption warnings | D0 / D3 |\n| Lessons | `Lessons-SSoT.md`, lesson detail docs | lesson table, status grouping, detail drawer | no lessons is an empty state, not a warning | D0 / D3 |\n| Adoption | capability registry, legacy check, strict check, dry-run init | missing capabilities, old review schema, missing contract files, manual steps | legacy warnings do not block read-only dashboard | D0 / D3 |\n| Settings | local browser state only | ZH/EN, light/dark/system, density, render/source toggle | no project writes | D4 |\n\n## Implementation Slices\n\n| Slice | Output | Files | Exit Gate |\n| --- | --- | --- | --- |\n| D0 Data Contract | normalized status/tables/documents/graph/adoption data model | `scripts/lib/*.mjs`, fixtures, tests | example project status includes standalone roadmap source and no schema regressions |\n| D1 Static Shell | `dashboard --out-dir` folder output | `scripts/harness.mjs`, `scripts/lib/dashboard-writer.mjs`, `templates/dashboard/index.html` | generated folder opens from `index.html`; `--out` remains compatible |\n| D2 Reader / Renderers | Markdown reader + Mermaid renderer | `templates/dashboard/assets/markdown-reader.js`, `mermaid-renderer.js`, vendor assets | Markdown and Mermaid render/fallback smoke passes |\n| D3 Core Pages | Overview, Tasks, Modules, Evidence, Lessons, Adoption pages | `templates/dashboard/assets/app.js`, `app.css` | Playwright screenshot shows readable dashboard and no raw warning dump |\n| D4 UX Polish | i18n, theme, density, responsive states | `i18n.js`, `app.css`, smoke | ZH/EN and light/dark work without regeneration |\n| D5 Smoke & Review | final checks, Mingjing adoption smoke, 3-reviewer loop | `scripts/smoke-dashboard.mjs`, tests, `review.md` | no target mutation; no open P0/P1/P2 from review loop |\n\n## Detailed Plan\n\n1. Build data contract first.\n   - Extract core Markdown tables into typed rows.\n   - Parse `execution_strategy.md` and `visual_roadmap.md` from task/module folders.\n   - Keep old `task_plan.md` sections as legacy fallback only.\n   - Add document IDs and source paths for all table/document links.\n\n2. Add folder dashboard output.\n   - Add `dashboard --out-dir \u003cdir>`.\n   - Preserve `dashboard --out \u003cfile.html>` compatibility.\n   - Generate `index.html`, `assets/`, `data/status.json`, `data/tables.json`, `data/documents.json`, `data/graph.json`, and `data/adoption.json`.\n   - Ensure generation is read-only against target projects.\n\n3. Build static frontend shell.\n   - Use the selected PLM B style: dense but readable, project-management first, no decorative marketing layout.\n   - Use sidebar navigation and a right-side detail drawer.\n   - Make DashboardShell, SidebarNav, TableView, DetailDrawer, MarkdownReader, MermaidBlock as vanilla JS boundaries.\n\n4. Build Markdown and Mermaid reading.\n   - Render Markdown from `documents.json`.\n   - Render Mermaid code fences from snapshots.\n   - Provide render/source toggle and graceful Mermaid failure fallback.\n\n5. Build all core pages.\n   - Overview must summarize state and next action.\n   - Tasks must expose plan, execution strategy, visual roadmap, progress, review, findings, references, and artifacts tabs.\n   - Modules must show module registry, lanes, handoffs, and module-level strategy/roadmap where files exist.\n   - Evidence must separate release blockers, missing evidence, review findings, and adoption warnings.\n   - Lessons must show lesson SSoT and detail docs.\n   - Adoption must make old-project gaps understandable without pretending they are product blockers.\n\n6. Add UX polish.\n   - Default language: Chinese.\n   - Add English toggle.\n   - Add light/dark/system theme.\n   - Add compact/comfortable table density.\n   - Check mobile and desktop text fitting.\n\n7. Add smoke and regression.\n   - Generate dashboard for `examples/minimal-project`.\n   - Generate dashboard for `TARGET:LOCAL_PATH_REDACTED` when available.\n   - Use browser smoke to assert pages, i18n controls, theme controls, drawer tabs, and Markdown/Mermaid render containers.\n   - Assert target docs are not mutated.\n\n8. Run adversarial review and closeout.\n   - Run 3 independent reviewers: IA/readability, parser/data contract, release/smoke.\n   - Fix P0/P1/P2 findings.\n   - Repeat until no open P0/P1/P2.\n   - Update progress, review, Harness Ledger, release docs, and final evidence.\n\n## Acceptance Criteria\n\n- [ ] `dashboard --out-dir tmp/harness-dashboard \u003ctarget>` generates a folder with `index.html`, `assets/`, and `data/`.\n- [ ] `dashboard --out tmp/harness-dashboard.html \u003ctarget>` still works.\n- [ ] `data/status.json`, `tables.json`, `documents.json`, `graph.json`, and `adoption.json` are generated without local absolute paths.\n- [ ] Overview page answers project safety, progress, blockers, and next action without raw warning dump.\n- [ ] Tasks page has first-class tabs for `task_plan.md`, `execution_strategy.md`, `visual_roadmap.md`, `progress.md`, `review.md`, `findings.md`, references, and artifacts.\n- [ ] Visual roadmap Mermaid and phase table render from standalone `visual_roadmap.md`.\n- [ ] Execution strategy renders from standalone `execution_strategy.md`.\n- [ ] Module page renders module registry and module/task strategy-roadmap files when present.\n- [ ] Evidence page separates Release Blocker, Missing Evidence, Schema Drift, Adoption Advice, and Review Finding.\n- [ ] Lessons page renders Lessons SSoT and lesson detail docs.\n- [ ] Adoption page shows legacy gaps as manual adoption advice, not unexplained failures.\n- [ ] ZH/EN, light/dark/system, and table density controls work without regenerating the dashboard.\n- [ ] Markdown render/source toggle works.\n- [ ] Mermaid failure falls back to source plus readable error.\n- [ ] `npm test` passes.\n- [ ] `node scripts/harness.mjs check --profile target-project examples/minimal-project` passes.\n- [ ] Mingjing docs smoke passes in legacy-compatible mode without mutating target docs.\n- [ ] Three-reviewer loop closes all P0/P1/P2 findings before PR.\n\n## Worktree\n\n- 路径：当前 coordinator checkout `LOCAL_PATH_REDACTED`\n- 分支：`codex/subagent-worktree-handoff`\n- Worker owner：coordinator\n- Worker handoff commit required：no for reviewer-only; yes if code-writing worker is later introduced\n- Coordinator integration branch：`codex/subagent-worktree-handoff`\n- 若未开 worktree，原因：当前任务是 private harness planning + public repo implementation plan consolidation；代码实现前如启用 worker-split，再开 dedicated worktree。\n\n## 长程任务判定\n\n- 是否属于长程任务：是\n- 若是，合同文件：`long-running-task-contract.md` should be added before implementation loop begins\n- 连续执行权限：用户此前已授权实现到完成；本文件当前只落地计划\n- Stop Condition 摘要：出现数据契约不清、页面 IA 被用户否定、target mutation、或 review 出 P0/P1/P2 未关闭时停止进入下一阶段。\n\n## Review 判定\n\n- 是否需要对抗性 review：是\n- 若是，报告文件：`review.md`\n- Reviewer：3 subagent reviewers before release closeout\n- No-finding 要求：最终轮无 open P0/P1/P2；P3 必须有 owner 或 accepted-risk reason。\n\n## 关联\n\n- Feature SSoT 条目：n/a\n- 相关 Regression Gate：`npm test`; `harness check target-project examples/minimal-project`; Mingjing legacy smoke; browser dashboard smoke\n- Review Report：`review.md`\n- Harness Ledger 条目：`HL-20260518-003`\n- 前置任务：`PRIVATE:docs/09-PLANNING/TASKS/2026-05-17-v1.0-document-kernel-release/task_plan.md`\n\n## Coordinator Handoff\n\n- Global sync owner：coordinator\n- Global sync status：pending-coordinator-pass until implementation starts\n- Registry update needed：n/a\n- Harness Ledger update needed：created as `HL-20260518-003`\n- Closeout / Regression update needed：after D5\n"},{"id":"doc-0024-visual-roadmap","path":"TARGET:docs/09-PLANNING/TASKS/2026-05-18-v1.0-dashboard-static-frontend/visual_roadmap.md","title":"Visual Roadmap","type":"legacy-visual-roadmap","content":"# Visual Roadmap\n\n```mermaid\nflowchart LR\n  D0[\"D0 Data Contract\\nTables + Documents + Graph\"] --> D1[\"D1 Static Shell\\nFolder Output\"]\n  D1 --> D2[\"D2 Reader\\nMarkdown + Mermaid\"]\n  D2 --> D3[\"D3 Core Pages\\nOverview / Tasks / Modules / Evidence / Lessons / Adoption\"]\n  D3 --> D4[\"D4 UX Polish\\nI18N + Theme + Density\"]\n  D4 --> D5[\"D5 Smoke & Review\\nExamples + Mingjing + 3 Reviewers\"]\n\n  D0 -. legacy fallback .-> D5\n  D3 -. user readability .-> D5\n```\n\n| Phase ID | Depends On | State | Completion | Output | Required Evidence | Evidence Status | Blocking Risk | Owner / Handoff |\n| --- | --- | --- | --- | --- | --- | --- | --- | --- |\n| D0 | none | done | 100 | normalized data contract for tables, documents, graph, adoption, standalone contracts | parser tests; example fixture; no absolute path leak check | present | none | coordinator |\n| D1 | D0 | done | 100 | `dashboard --out-dir` static folder writer with backward-compatible `--out` | generated folder smoke; existing single-file smoke | present | none | coordinator |\n| D2 | D1 | done | 100 | Markdown reader and Mermaid renderer | Markdown fixture; Mermaid success/fallback fixture | present | none | coordinator |\n| D3 | D2 | done | 100 | Overview, Ledger, Tasks, Modules, Evidence, Lessons, Adoption pages | browser DOM smoke; drawer assertions; review findings | present | none | coordinator + IA reviewer |\n| D4 | D3 | done | 100 | ZH/EN, light/dark/system, density, responsive polish | language/theme smoke; mobile/desktop layout checks | present | none | coordinator + IA reviewer |\n| D5 | D4 | review | 95 | final smoke, Mingjing legacy adoption check, three-reviewer closeout | `npm test`; source check; target check; Mingjing no-mutation smoke; review.md | present | final PR push pending | coordinator |\n\nAllowed `State`: `planned`, `in_progress`, `review`, `blocked`, `done`, `skipped`.\nAllowed `Evidence Status`: `missing`, `partial`, `present`, `waived`.\n`Completion` is an integer `0..100`; `done=100`, `planned=0`, and `skipped`\nis excluded from dashboard averages.\n"},{"id":"doc-0025-brief","path":"TARGET:docs/09-PLANNING/TASKS/2026-05-19-dashboard-v2-visibility-layer/brief.md","title":"Dashboard v2 可见性层 — 可见性摘要","type":"task-brief","content":"# Dashboard v2 可见性层 — 可见性摘要\n\n> 状态：done · 完成度 100%\n> 最后更新：2026-05-19\n\n## 一句话目标\n\n把 Harness dashboard 从“文档目录浏览器”改成项目可见性层：用户只看 Agent 对话和一个静态 HTML，就能知道当前任务、历史迁移缺口、活跃工作和下一步。\n\n## 已实现\n\n- 三视图 dashboard：`#/` 总览、`#/tasks` 任务索引、`#/tasks/\u003cid>` 任务详情，并保留 `#/modules` 模块视图入口。\n- 任务详情 brief-first：优先显示 `brief.md`，老任务缺 brief 时显示生成提示并 fallback 渲染 `task_plan.md`。\n- 源文档路由：`#/tasks/\u003cid>/docs/\u003ctab>` 能打开 `task_plan`、`progress`、`review`、`findings` 等源文档快照。\n- 老项目大列表处理：任务按活跃/已有 brief/历史月份分组，活跃任务优先，历史组折叠显示。\n- 老 Harness 迁移：Agora 470 个历史任务不会被机械重写；`migrate-plan` 区分 `taskActions`、`reviewActions`、`legacyActions`、`legacyResiduals`。\n- CLI 生命周期补强：任务状态、阶段更新、模块步骤、zh-CN Module-Registry、幂等更新、显式非法状态检查均有测试覆盖。\n\n## 两个验收页面\n\n- 新项目 ACPX：`LOCAL_PATH_REDACTED` 和 `LOCAL_PATH_REDACTED`\n- 老项目 Agora：`LOCAL_PATH_REDACTED` 和 `LOCAL_PATH_REDACTED`\n\n## 关键回归数据\n\n| Target | Result |\n| --- | --- |\n| `LOCAL_PATH_REDACTED` | 1 个进行中任务，0 warning，normal/strict check 通过 |\n| `LOCAL_PATH_REDACTED` | 470 个历史任务，normal check 通过，strict check 预期失败 |\n| Agora migration plan | `taskActions=28`, `legacyResiduals=884`, `reviewSchemaGaps=15`, `legacyReferenceGaps=6` |\n\n## 审查结论\n\n完成三轮三代理对抗审查。前两轮提出的 dashboard 不可用、迁移误分类、zh-CN 图谱、幂等更新、显式 `unknown` 状态等问题均已修复并回归。最终两个独立目标回归代理均 APPROVE。\n"},{"id":"doc-0026-execution-strategy","path":"TARGET:docs/09-PLANNING/TASKS/2026-05-19-dashboard-v2-visibility-layer/execution_strategy.md","title":"Execution Strategy","type":"execution-strategy","content":"# Execution Strategy\n\n## Decision Table\n\n| Decision | Choice | Notes |\n| --- | --- | --- |\n| Primary executor | coordinator | Dashboard + CLI 是用户体验核心，需要统一一致性 |\n| Subagents | 不使用 | 总代码量可控，单人执行更高效 |\n| Review model | adversarial subagent + user review | 已完成一轮对抗审查（11 findings），最终验收由用户 |\n| Worktree strategy | 同一 checkout | 无并行写入冲突 |\n| Conflict control | 无冲突面 | 所有改动文件由 coordinator 独占 |\n| Evidence depth | L1 | 功能性验证：CLI round-trip + HTML 可打开 + Mermaid 渲染 |\n| Implementation order | S1 → S1b → S2 → S3 → S4 → S5 → S6 | 模板先行，lifecycle CLI，core 扩展，前端重写，补数据，测试，清理 |\n| CSS framework | Tailwind CDN + 2KB inline fallback | 用户指定 Tailwind，fallback 保证离线可读 |\n| Chart library | Mermaid CDN | 渲染 brief.md 中的流程图，fallback 显示代码块 |\n| Task ID scheme | 相对路径 | 解决同名任务歧义，如 `TASKS/2026-05-19-x` 或 `MODULES/auth/2026-05-19-x` |\n\n## Shared File Ownership\n\n| Surface | Owner | Rule |\n| --- | --- | --- |\n| `scripts/harness.mjs` | coordinator | S1b 新增命令入口 |\n| `scripts/lib/harness-core.mjs` | coordinator | S1b + S2 改动 |\n| `templates/dashboard/` | coordinator | S3 全部重写 |\n| `templates/planning/brief.md` | coordinator | S1 新增 |\n| `scripts/test-harness.mjs` | coordinator | S5 增加测试 |\n\n## Verification Plan\n\n| Gate | Command / Check | Required Phase |\n| --- | --- | --- |\n| syntax | `node --check scripts/harness.mjs && node --check scripts/lib/harness-core.mjs` | S1b+ |\n| new-task | `harness new-task test-task --dry-run` | S1b |\n| new-task-module | `harness new-task test-task --module auth --dry-run` | S1b |\n| task-lifecycle | `new-task x && task-start x && task-phase x PH-01 --state done && task-complete x` | S1b |\n| round-trip | 写入后读取状态一致（progress.md + visual_roadmap.md） | S1b |\n| module-step | `harness module-step auth AUTH-01 --state done` 更新 module_plan + Registry | S1b |\n| ambiguity | 同名任务时 CLI 报错并列出候选 | S1b |\n| unit test | `npm test` | S1b, S2, S3, S5 |\n| dashboard gen | `harness dashboard --out-dir tmp/dash-v2 .` | S3+ |\n| brief render | 打开 HTML，验证 Mermaid 图表渲染 | S3+ |\n| module topo | 有模块项目 Overview 展示模块拓扑图 | S3+ |\n| search | Task Index 搜索即时过滤 | S3+ |\n| performance | 100 任务 mock，页面加载 \u003c2s | S5 |\n| mobile | 375px viewport 布局不溢出 | S5 |\n| fallback | 断开 CDN 后页面仍可读 | S5 |\n| no leak | 生成 HTML 中 grep `.harness-private` 返回空 | S5 |\n| source check | `harness check --profile source-package .` | S6 |\n\n## Stop / Escalation Conditions\n\n- Tailwind CDN fallback 逻辑超过 50 行时，改用纯 inline CSS 方案\n- brief.md 模板设计导致 Agent 难以遵循时，简化模板\n- 100 任务性能不达标时，引入虚拟列表\n- task.id 改为相对路径后现有测试大面积失败时，先修测试再继续\n- progress.md 正则写入在边界情况下不稳定时，改用完整文件重写策略\n- Module-Registry.md 格式在不同项目间差异过大时，module-step 命令降级为 warning\n- 用户对新 dashboard UX 仍不满意时，回到讨论而非继续实现\n- dashboard-data.js schema 变更影响外部工具时，保持 v1 兼容输出选项\n"},{"id":"doc-0027-findings","path":"TARGET:docs/09-PLANNING/TASKS/2026-05-19-dashboard-v2-visibility-layer/findings.md","title":"Findings - Dashboard v2 Visibility Layer","type":"markdown-table","content":"# Findings - Dashboard v2 Visibility Layer\n\n## Findings\n\n| ID | Source | Severity | Finding | Status | Resolution |\n| --- | --- | --- | --- | --- | --- |\n| F-001 | design-review | P1 | 4 列 kanban 在任务少时空旷 | closed | 改为垂直列表 + 进度条 |\n| F-002 | design-review | P1 | 点击展开在静态文件中不自然 | closed | 活跃任务默认展开 |\n| F-003 | design-review | P2 | Activity Feed 可能为空 | closed | 条件渲染 + 空状态提示 |\n| F-004 | design-review | P1 | 颜色是唯一状态指示器 | closed | Icon + text + color 三重 |\n| F-005 | design-review | P0 | 单页无折叠会变成无限滚动 | closed | 三视图 hash 路由 + 搜索 |\n| F-006 | design-review | P1 | JSON schema 重构不必要 | closed | 保持现有结构，只增加 briefs 字段 |\n| F-007 | user-feedback | P0 | 用户需要看流程图和执行策略 | closed | brief.md 包含 Mermaid 图表 |\n| F-008 | user-feedback | P0 | 文档是给 Agent 看的，缺少给人看的 | closed | 新增 brief.md 人类可见性文档 |\n| V-001 | adversarial-review | P0 | new-task 无法在模块下创建任务 | closed | 增加 --module 参数 |\n| V-002 | adversarial-review | P0 | 任务名称全局不唯一，路径歧义 | closed | task.id 改为相对路径 + 模糊匹配 + 歧义报错 |\n| V-003 | adversarial-review | P1 | Dashboard 无模块级可见性 | closed | 增加模块拓扑图 + Module Detail 视图 |\n| V-004 | adversarial-review | P1 | CLI 不管理模块步骤状态 | closed | 增加 module-step 命令 |\n| V-005 | adversarial-review | P1 | 模块本身缺少 brief.md | closed | 模块目录也有 brief.md |\n| V-006 | adversarial-review | P1 | Overview 流程图数据源不明 | closed | 有模块→自动生成；无模块→从 brief 提取 |\n| V-007 | adversarial-review | P2 | progress.md 写入/读取格式一致性 | closed | 模板化写入 + round-trip 测试 |\n| V-008 | adversarial-review | P2 | dashboard-data.js schema 兼容性 | closed | 增加 schemaVersion 字段 |\n| V-009 | adversarial-review | P2 | 状态枚举不统一 | closed | S1 统一定义三套枚举 |\n| V-010 | adversarial-review | P2 | CDN fallback 无具体定义 | closed | 内联 2KB 最小 CSS |\n| V-011 | adversarial-review | P2 | CLI 名称匹配规则未定义 | closed | 后缀模糊匹配 + 歧义报错列出候选 |\n"},{"id":"doc-0028-progress","path":"TARGET:docs/09-PLANNING/TASKS/2026-05-19-dashboard-v2-visibility-layer/progress.md","title":"Progress - Dashboard v2 Visibility Layer","type":"task-progress","content":"# Progress - Dashboard v2 Visibility Layer\n\n## Status\n\ndone\n\n## Updates\n\n| Date | Update | Evidence |\n| --- | --- | --- |\n| 2026-05-19 | 用户指出原 dashboard 完成度与讨论目标不一致，重新定义验收：三轮三代理对抗审查 + ACPX 新项目 + Agora 470 任务老项目迁移 | conversation:USER:goal-reset |\n| 2026-05-19 | 完成 dashboard 三视图、单文件输出、source-doc 路由、老任务 task_plan fallback、任务分组折叠和活跃优先 | diff:PUBLIC:templates/dashboard + templates-zh-CN/dashboard |\n| 2026-05-19 | 完成迁移分类修复：Agora 风格阶段状态表识别活跃任务，`taskActions` 与 `legacyResiduals` 分离 | diff:PUBLIC:scripts/lib/harness-core.mjs |\n| 2026-05-19 | 完成 CLI/checker 修复：显式非法状态失败、zh-CN 图谱、task-phase/module-step 幂等、真实目标 `--out`/`--out-dir` smoke | diff:PUBLIC:scripts/test-harness.mjs + scripts/smoke-dashboard.mjs |\n| 2026-05-19 | 三轮对抗审查完成：Round 2 三个 REQUEST_CHANGES，Round 3 迁移 APPROVE，UI/CLI 剩余 P1 已修复并针对性验证 | review:PRIVATE:review.md |\n| 2026-05-19 | 新项目 ACPX 回归通过，dashboard 可打开：`LOCAL_PATH_REDACTED` 和 `LOCAL_PATH_REDACTED` | artifact:TARGET:acpx-dashboard:ready |\n| 2026-05-19 | 老项目 Agora 回归通过，470 任务 dashboard 可打开：`LOCAL_PATH_REDACTED` 和 `LOCAL_PATH_REDACTED` | artifact:TARGET:agora-dashboard:ready |\n| 2026-05-19 | 验证通过：`npm test`、dashboard smoke、source/private/minimal/acpx/agora normal checks；Agora strict 预期失败 | command:PUBLIC+TARGET:passed |\n\n## Coordinator Handoff\n\nNo pending worker handoff. The remaining public decision is whether to commit/push this corrective patch set after user review.\n"},{"id":"doc-0029-review","path":"TARGET:docs/09-PLANNING/TASKS/2026-05-19-dashboard-v2-visibility-layer/review.md","title":"Review - Dashboard v2 Visibility Layer","type":"task-review","content":"# Review - Dashboard v2 Visibility Layer\n\n## Reviewer Identity\n\n| Reviewer | Type | Scope |\n| --- | --- | --- |\n| Wegener / Plato / Ramanujan | Round 1 adversarial | Initial dashboard, migration, CLI/test blockers |\n| Ptolemy / Cicero / Meitner | Round 2 adversarial | Current diff + generated ACPX/Agora dashboard snapshots |\n| Planck / Feynman / Pascal | Round 3 adversarial | Round 2 fix verification |\n| Laplace / Huygens | Independent regression | ACPX new project and Agora legacy migration |\n| coordinator | owner | Fix integration, local gates, private closeout |\n\n## Confidence Challenge\n\nThe original implementation overclaimed dashboard completion. The corrective gate was therefore changed from “tests pass” to “two real projects have openable dashboard pages, three adversarial review rounds are completed, and independent regressions approve both target flows.”\n\nMain risk: large legacy projects can contain active work hidden in old progress formats. This was mitigated by parsing Agora-style phase status tables and separating active `taskActions` from historical `legacyResiduals`.\n\n## Evidence Checked\n\n| Evidence ID | Type | Path | Summary |\n| --- | --- | --- | --- |\n| E-001 | command | PUBLIC:`npm test` | Harness v1 tests passed after lifecycle, dashboard, migration, zh-CN graph, idempotency, invalid state coverage |\n| E-002 | command | PUBLIC:`npm run smoke:dashboard` | Static dashboard smoke passed |\n| E-003 | command | PUBLIC:`HARNESS_DASHBOARD_SMOKE_TARGETS=LOCAL_PATH_REDACTED npm run smoke:dashboard` | Real target `--out-dir` and `--out` smoke passed |\n| E-004 | command | PUBLIC:`node scripts/harness.mjs check --profile source-package .` | Source package boundary check passed with expected legacy-compat warning |\n| E-005 | command | PRIVATE:`node scripts/harness.mjs check --profile private-harness .harness-private` | Private harness check passed |\n| E-006 | command | TARGET:`node scripts/harness.mjs check --profile target-project LOCAL_PATH_REDACTED` | ACPX normal check passed; independent regression also verified strict pass |\n| E-007 | command | TARGET:`node scripts/harness.mjs check --profile target-project LOCAL_PATH_REDACTED` | Agora normal check passed with warnings |\n| E-008 | command | TARGET:`node scripts/harness.mjs check --profile target-project --strict LOCAL_PATH_REDACTED` | Strict check failed as expected before cutover |\n| E-009 | browser | TARGET:`LOCAL_PATH_REDACTED` | ACPX task index/detail/source-doc routes opened in headless Chrome |\n| E-010 | browser | TARGET:`LOCAL_PATH_REDACTED` | Agora 470-task index, active-first grouping, task_plan fallback, and 320px mobile screenshot verified |\n| E-011 | subagent | Laplace / Huygens | Independent ACPX and Agora regression both APPROVE |\n\n## Findings\n\n| ID | Severity | Finding | Evidence Checked | Required Action | Open | Disposition | Blocks Release | Follow-up |\n| --- | --- | --- | --- | --- | --- | --- | --- | --- |\n| R-001 | P1 | Legacy task detail lost `task_plan.md`, so old tasks were unreadable from HTML | Round 2 UI review | Include `task_plan.md` for all tasks and render it when brief is missing | no | closed | no | none |\n| R-002 | P1 | Source document links did not actually navigate or render selected content | Round 2 UI review | Add `#/tasks/\u003cid>/docs/\u003ctab>` route and selected source section | no | closed | no | none |\n| R-003 | P1 | 470 legacy tasks appeared as one overwhelming group | Round 2/3 UI review | Group by active/brief-ready/legacy month, collapse large groups, sort active first | no | closed | no | none |\n| R-004 | P1 | Active legacy tasks were hidden as residuals because old phase tables were not parsed | Round 2 migration review | Infer state from legacy status tables | no | closed | no | none |\n| R-005 | P1 | Active task migration commands omitted `brief.md` and emitted only one file command | Round 2 migration review | Include brief/strategy/roadmap and one command per file | no | closed | no | none |\n| R-006 | P1 | Explicit invalid or `unknown` task states were silently accepted | Round 2/3 CLI review | Split fallback `unknown` from allowed explicit task states | no | closed | no | none |\n| R-007 | P1 | zh-CN Module-Registry/module_plan updated but graph extraction was English-only | Round 2 CLI review | Support zh-CN columns in graph extraction and add tests | no | closed | no | none |\n| R-008 | P2 | task-phase/module-step retried updates reported “not found” | Round 2 CLI review | Track matched row separately from changed row; add idempotency tests | no | closed | no | none |\n| R-009 | P2 | `HARNESS_DASHBOARD_SMOKE_TARGETS` only tested `--out-dir` | Round 2 CLI review | Smoke both folder and single-file dashboard output | no | closed | no | none |\n\n## Decision\n\nAccepted for public patch review. This is no longer the earlier overclaim: the acceptance basis is real generated dashboard pages for ACPX and Agora, adversarial review closure, and independent target regression approval.\n\n## Final Confidence Basis\n\nConfidence is high for the requested scope:\n\n- ACPX proves a fresh project can be initialized, tracked, and opened from dashboard HTML.\n- Agora proves a 470-task legacy harness can be safely adopted without mechanical rewrite, with active migration work separated from historical residuals.\n- Strict Agora remains red by design until the old project intentionally performs cutover migration.\n"},{"id":"doc-0030-task-plan","path":"TARGET:docs/09-PLANNING/TASKS/2026-05-19-dashboard-v2-visibility-layer/task_plan.md","title":"Task Plan - Dashboard v2 Visibility Layer","type":"markdown-table","content":"# Task Plan - Dashboard v2 Visibility Layer\n\n- Task ID: `PF-003`\n- Status: `done`\n- Owner: coordinator\n- Date: 2026-05-19\n- Public artifact: none; dashboard roadmap remains private operating state.\n\n## Goal\n\n重写 harness dashboard 为项目可见性层：静态 HTML 快照，\n三视图 hash 路由（Overview / Task Index / Task Detail），渲染每个任务和模块的\n`brief.md` 人类可见性文档。支持无模块和有模块两种项目结构。\n\n核心命题：`Agent 对话 + HTML` = 替代 VS Code 看文档。\n\n## Scope\n\nAllowed public writes:\n\n- `scripts/harness.mjs` (新增 task lifecycle + module-step 命令)\n- `scripts/lib/harness-core.mjs`\n- `scripts/lib/dashboard-writer.mjs`\n- `templates/planning/brief.md` (新增)\n- `templates/planning/optional/references/INDEX.md` (扩展说明)\n- `templates/dashboard/` (全部重写)\n- `scripts/test-harness.mjs`\n- `scripts/smoke-dashboard.mjs`\n- none for roadmap material\n\nAllowed private writes:\n\n- `.harness-private/docs/09-PLANNING/TASKS/2026-05-19-dashboard-v2-visibility-layer/`\n- `.harness-private/docs/09-PLANNING/TASKS/*/brief.md` (为现有任务补写)\n\nOut of scope:\n\n- 不改 `harness dashboard --out-dir` 命令接口\n- 不引入构建工具、框架、npm 依赖\n- 不做后端、数据库、实时更新\n- 不做编辑功能\n- `remove-capability` / `upgrade --apply` 等破坏性命令\n\n## Task IA Budget\n\n| Budget | Use When | Required Structure |\n| --- | --- | --- |\n| complex | 涉及 CLI core、前端重写、模板新增、规范更新、冒烟测试 | Core five + brief.md dogfood |\n\n## Context Packet\n\n| ID | Type | Path | Why It Matters | Used By |\n| --- | --- | --- | --- | --- |\n| C-001 | private-plan | PRIVATE:docs/09-PLANNING/TASKS/2026-05-19-dashboard-v2-visibility-layer/task_plan.md | 设计方案和验收合同 | coordinator |\n| C-002 | public-code | PUBLIC:scripts/lib/harness-core.mjs | 现有 status/dashboard/collectTasks 逻辑 | implementer |\n| C-003 | public-template | PUBLIC:templates/dashboard/ | 现有 dashboard 前端代码 | implementer |\n| C-004 | public-template | PUBLIC:templates/planning/visual_roadmap.md | Phase table 格式参考 | implementer |\n| C-005 | public-template | PUBLIC:templates/planning/module_plan.md | 模块步骤序列格式 | implementer |\n| C-006 | private-task | PRIVATE:docs/09-PLANNING/TASKS/2026-05-18-v1.0-dashboard-static-frontend/ | v1 dashboard 实现参考 | coordinator |\n\n## Execution & Visualization Files\n\n| Contract File | Required | Purpose |\n| --- | --- | --- |\n| `execution_strategy.md` | yes | 执行模式、冲突控制、验证计划 |\n| `visual_roadmap.md` | yes | Phase table + Mermaid 流程图 |\n| `brief.md` | yes | 人类可见性摘要（dogfood 本任务的新概念） |\n\n## Plan\n\n### Slice S1: 模板 + 规范\n\n- 设计 `templates/planning/brief.md` 模板（任务级）\n- 设计模块级 `brief.md` 模板（放在 module 目录下）\n- 更新私有 task template 加入 brief.md\n- 扩展 `references/INDEX.md` 模板说明：明确可存放需求文档、设计稿、PRD 等任务输入物料\n- 定义 Agent 维护 brief.md 的行为规范\n- 统一状态枚举定义：\n  - Task state: `planned`, `in_progress`, `review`, `blocked`, `done`\n  - Phase state: `planned`, `in_progress`, `review`, `blocked`, `done`, `skipped`\n  - Module step state: `planned`, `in-progress`, `done`, `blocked`, `superseded`\n\n### Slice S1b: Task Lifecycle CLI\n\n实现完整的任务生命周期管理命令，保证 dashboard 数据可靠。\n\n**任务定位规则**（解决 V-002 路径歧义）：\n- 任务 ID 为相对路径（如 `TASKS/2026-05-19-my-task` 或 `MODULES/auth/2026-05-19-auth-fix`）\n- CLI 支持短名称模糊匹配（后缀匹配 basename）\n- 歧义时报错并列出所有候选路径，用户需指定完整路径\n- `collectTasks()` 的 task.id 改为相对路径而非 basename\n\n**任务命令**：\n\n- `harness new-task \u003cname> [--module \u003cmodule-key>] [--budget simple|complex] [--dry-run] [target]`\n  - 无 `--module`：在 `docs/09-PLANNING/TASKS/\u003cdate>-\u003cname>/` 下创建\n  - 有 `--module`：在 `docs/09-PLANNING/MODULES/\u003cmodule-key>/\u003cdate>-\u003cname>/` 下创建\n  - 包含：task_plan.md, execution_strategy.md, visual_roadmap.md, progress.md, review.md, findings.md, brief.md\n  - `--budget complex` 额外创建 `references/INDEX.md` 和 `artifacts/INDEX.md`\n- `harness task-start \u003cpath-or-name>`\n  - progress.md Status → `in_progress`\n  - 追加 Updates 表记录\n- `harness task-phase \u003cpath-or-name> \u003cphase-id> [--state done] [--completion 100] [--evidence present]`\n  - 更新 visual_roadmap.md Phase table 中对应行\n  - 自动重算整体 completion\n- `harness task-complete \u003cpath-or-name>`\n  - progress.md Status → `done`\n  - 追加 Updates 表记录\n- `harness task-block \u003cpath-or-name> [--reason \"...\"]`\n  - progress.md Status → `blocked`\n  - 追加 Updates 表记录含 reason\n- `harness task-log \u003cpath-or-name> --message \"...\" [--evidence \"command:PUBLIC:path:summary\"]`\n  - 追加 progress.md Updates 表一行（自动填日期）\n- `harness task-list [--state in_progress|planned|review|done|blocked] [--module \u003ckey>] [target]`\n  - 列出任务：路径 + 状态 + 完成度（只读）\n  - `--module` 过滤特定模块下的任务\n\n**模块步骤命令**（解决 V-004）：\n\n- `harness module-step \u003cmodule-key> \u003cstep-id> [--state done|in-progress|blocked]`\n  - 更新 module_plan.md 步骤序列表中对应行的 Status\n  - 同步更新 Module-Registry.md 的 Current Step 和 Status\n\n### Slice S2: harness-core.mjs 扩展\n\n- `collectTasks()` 改 task.id 为相对路径（解决 V-002）\n- `collectTasks()` 增加读取 brief.md 内容\n- `buildDashboardBundle()` 增加 `briefs` 字段\n- 增加 Lessons-SSoT 解析（提取最近 N 条）\n- 增加模块拓扑图生成（从 Module-Registry + module_plan 步骤依赖）\n- Overview 流程图数据源（解决 V-006）：\n  - 有模块项目：自动从 module_plan 步骤依赖生成模块拓扑 Mermaid\n  - 无模块项目：从各任务 brief.md 中提取手写 Mermaid（第一个 ```mermaid 块）\n- progress.md 写入使用模板化方式而非纯正则替换（解决 V-007）\n\n### Slice S3: Dashboard HTML 重写\n\n- 用三视图静态 dashboard 资产替代旧 8 页信息架构\n- 同时支持 `--out-dir` 文件夹快照和 `--out` 单文件快照\n- 使用本地 CSS/JS 资产，单文件输出内联资产；不引入框架或构建依赖\n- 三视图 hash 路由：Overview / Task Index / Task Detail\n- Overview 内容：\n  - 有模块项目：模块拓扑图（自动生成）+ 活跃任务 brief\n  - 无模块项目：项目级 Mermaid（从 brief 提取）+ 活跃任务 brief\n  - Alerts + Lessons + Health\n- Task Index：搜索 + 按状态分组 + 按模块过滤\n- Task Detail：brief.md 完整渲染 + phase 进度叠加 + open findings\n- Module Detail（有模块项目）：模块 brief.md + 步骤进度 + 模块下任务列表\n- Dark mode 默认，系统字体栈\n- 响应式布局\n- dashboard-data.js 增加 `schemaVersion: 2` 字段（解决 V-008）\n\n### Slice S4: 现有任务补写 brief.md\n\n- 为 `2026-05-18-v1.0-dashboard-static-frontend` 补写 brief.md\n- 为 `2026-05-17-v1.0-document-kernel-release` 补写 brief.md\n- 为本任务写 brief.md（已包含）\n\n### Slice S5: 测试 + 验收\n\n- 更新 `test-harness.mjs` 覆盖：\n  - brief 读取\n  - new-task 创建（含 --module）\n  - task-start/task-phase/task-complete round-trip 测试（解决 V-007）\n  - module-step 更新\n  - task-list 过滤\n  - 任务名称歧义报错\n- 更新 `smoke-dashboard.mjs` 覆盖新 dashboard 渲染\n- 验证 100 任务性能（生成 mock 数据）\n- 验证 Mermaid 渲染、搜索功能、响应式\n- 验证 CDN fallback（断网场景）\n\n### Slice S6: 清理 + 规范更新\n\n- 删除旧 dashboard 相关代码（i18n.js, markdown-reader.js 等）\n- 更新 SKILL.md 加入 brief.md 维护要求\n- 更新 docs-release 相关文档\n- 更新 source-package check 覆盖新文件\n\n## Acceptance Criteria\n\n1. `harness new-task my-feature` 创建完整任务目录（含 brief.md + references/）\n2. `harness new-task my-feature --module auth` 在模块下创建任务\n3. `harness task-start/task-phase/task-complete` round-trip 正确（写入后读取一致）\n4. `harness module-step auth AUTH-01 --state done` 更新 module_plan + Module-Registry\n5. 同名任务歧义时 CLI 报错并列出候选\n6. `harness dashboard --out-dir ./out .` 生成可用 HTML\n7. 打开 HTML 第一眼看到流程图 + 活跃任务 brief\n8. 有模块项目展示模块拓扑图\n9. Mermaid 图表正确渲染\n10. 搜索能在 100+ 任务中即时过滤\n11. CDN 不可用时页面仍可读（fallback CSS）\n12. 移动端可用（375px）\n13. `npm test` 通过\n14. 无 .harness-private 泄露到生成的 HTML 中\n\n## Adversarial Review Record\n\n| ID | Severity | Finding | Fix Applied |\n|----|----------|---------|-------------|\n| V-001 | P0 | new-task 无法在模块下创建任务 | 增加 --module 参数 |\n| V-002 | P0 | 任务名称全局不唯一，路径歧义 | task.id 改为相对路径 + 模糊匹配 + 歧义报错 |\n| V-003 | P1 | Dashboard 无模块级可见性 | 增加模块拓扑图 + Module Detail 视图 |\n| V-004 | P1 | CLI 不管理模块步骤状态 | 增加 module-step 命令 |\n| V-005 | P1 | 模块本身缺少 brief.md | 模块目录也有 brief.md |\n| V-006 | P1 | Overview 流程图数据源不明 | 有模块→自动生成；无模块→从 brief 提取 |\n| V-007 | P2 | progress.md 写入/读取格式一致性 | 模板化写入 + round-trip 测试 |\n| V-008 | P2 | dashboard-data.js schema 兼容性 | 增加 schemaVersion 字段 |\n| V-009 | P2 | 状态枚举不统一 | S1 统一定义 task/phase/module-step 三套枚举 |\n| V-010 | P2 | CDN fallback 无具体定义 | 内联 2KB 最小 CSS |\n| V-011 | P2 | CLI 名称匹配规则未定义 | 后缀模糊匹配 + 歧义报错列出候选 |\n"},{"id":"doc-0031-visual-roadmap","path":"TARGET:docs/09-PLANNING/TASKS/2026-05-19-dashboard-v2-visibility-layer/visual_roadmap.md","title":"Visual Roadmap","type":"legacy-visual-roadmap","content":"# Visual Roadmap\n\n```mermaid\nflowchart LR\n  S1[\"S1 Template\\nbrief.md 模板\\n状态枚举统一\"] --> S1b[\"S1b Lifecycle CLI\\nnew-task --module\\ntask-start/phase/complete\\nmodule-step\\ntask-list\"]\n  S1b --> S2[\"S2 Core\\nbrief 读取\\n模块拓扑图\\nlessons 解析\\ntask.id 改路径\"]\n  S2 --> S3[\"S3 Dashboard\\nTailwind + Mermaid\\n三视图 + Module Detail\\n搜索 + fallback CSS\"]\n  S3 --> S4[\"S4 Dogfood\\n补写 brief.md\"]\n  S4 --> S5[\"S5 Test\\nround-trip\\n性能 + 歧义\"]\n  S5 --> S6[\"S6 Cleanup\\n删旧代码 + 规范\"]\n\n  S1 -. 模板定义 .-> S4\n  S1b -. CLI 可用 .-> S4\n  S2 -. 数据可用 .-> S3\n```\n\n| Phase ID | Depends On | State | Completion | Output | Required Evidence | Evidence Status | Blocking Risk | Owner / Handoff |\n| --- | --- | --- | --- | --- | --- | --- | --- | --- |\n| S1 | none | done | 100 | brief.md 模板（任务级+模块级）+ references 扩展 + 状态枚举定义 | 模板文件存在且格式合理 | present | none | coordinator |\n| S1b | S1 | done | 100 | CLI 命令：new-task(--module)/task-start/task-phase/task-complete/task-block/task-log/task-list/module-step | new-task --module 正确 + task round-trip + module-step 更新 Registry + 歧义报错 | present | none | coordinator |\n| S2 | S1b | done | 100 | harness-core: task.id 改路径 + brief 文档收集 + 模块拓扑图数据 | `npm test` + dashboard bundle checks | present | none | coordinator |\n| S3 | S2 | done | 100 | Dashboard HTML: schema v2 + task search + brief-first detail + topology render hook + static no-leak output | dashboard artifact + smoke + leak checks | present | browser screenshot tool unavailable | coordinator |\n| S4 | S1b, S3 | done | 100 | 示例任务补写 brief.md；新任务自动生成 brief.md | brief 在 dashboard bundle 中出现 | present | none | coordinator |\n| S5 | S3, S4 | done | 100 | 测试：round-trip + 歧义报错 + 新项目 + Agora 旧项目 + 无 private 泄露 | `npm test`; `npm run smoke:dashboard`; new-project smoke; Agora smoke | present | none | coordinator |\n| S6 | S5 | done | 100 | 私有 SSoT/ledger/regression/closeout 回写；public docs-release 保持边界 | private-harness check + docs status | present | legacy self-host warnings remain historical residual | coordinator |\n\nAllowed `State`: `planned`, `in_progress`, `review`, `blocked`, `done`, `skipped`.\nAllowed `Evidence Status`: `missing`, `partial`, `present`, `waived`.\n`Completion` is an integer `0..100`; `done=100`, `planned=0`, and `skipped`\nis excluded from the overall dashboard average.\n"},{"id":"doc-0032-brief","path":"TARGET:docs/09-PLANNING/TASKS/2026-05-19-v1-staged-release-rebaseline/brief.md","title":"v1 Staged Release Rebaseline - Brief","type":"task-brief","content":"# v1 Staged Release Rebaseline - Brief\n\n> Status: planned\n> Date: 2026-05-19\n> Owner: coordinator\n\n## Why This Exists\n\nThe current v1.0 work contains useful ideas, but the release boundary is too\nwide. Capability packs, safe adoption, static dashboard, Dashboard v2,\n`brief.md`, and task lifecycle CLI are all meaningful, but they should not share\none release gate.\n\nThis task rebaselines the work into three stages:\n\n1. Phase 0 closes strategy and contract drift.\n2. Phase 1 ships the v1.0 document kernel.\n3. Phase 2 builds the visibility layer and task lifecycle commands.\n\n## Release Shape\n\n```mermaid\nflowchart LR\n  P0[\"Phase 0\\nRebaseline\\nclose drift\"] --> P1[\"Phase 1\\nv1.0 Kernel\\ninstall/check/status\"]\n  P1 --> P2[\"Phase 2\\nVisibility Layer\\ndashboard v2 + task CLI\"]\n\n  P0 --> O0[\"canonical capability names\\n6-phase SKILL\\ncontract files\\ndocs-release source\"]\n  P1 --> O1[\"capability registry\\nsafe scaffold\\ncheck/status/init/add-capability\\nminimal read-only dashboard\"]\n  P2 --> O2[\"brief.md\\ntask lifecycle CLI\\nmodule-step\\ndashboard v2\\nsearch/topology/detail\"]\n```\n\n## Non-Negotiables\n\n- v1.0 must remain a document kernel, not a control dashboard.\n- `init` scaffold must not pretend that project-specific references are already\n  configured.\n- Initial install must ask for document language or accept an explicit locale.\n  Chinese users should receive Chinese task/review/ledger/reference templates by\n  default when they choose `zh-CN`; English users should receive `en-US`.\n- Dashboard v2 and task lifecycle commands are useful, but they are post-v1.0\n  capability work unless explicitly re-approved.\n- Public release docs must not depend on private `.harness-private` state.\n\n## Current Recommendation\n\nStart with Phase 0. Do not begin feature implementation until the rebaseline\nreview has no open P0/P1/material-P2 finding.\n"},{"id":"doc-0033-execution-strategy","path":"TARGET:docs/09-PLANNING/TASKS/2026-05-19-v1-staged-release-rebaseline/execution_strategy.md","title":"Execution Strategy - v1 Staged Release Rebaseline","type":"execution-strategy","content":"# Execution Strategy - v1 Staged Release Rebaseline\n\n## Execution Mode\n\nCoordinator-led planning and review. This task is strategy and release planning,\nnot implementation. No code-writing worker is needed for the planning pass.\n\n## Work Boundaries\n\nAllowed private writes:\n\n- `PRIVATE:docs/09-PLANNING/TASKS/2026-05-19-v1-staged-release-rebaseline/`\n- `PRIVATE:docs/09-PLANNING/Private-Feature-SSoT.md`\n\nAllowed public writes:\n\n- private staged release plan and roadmap under this task directory\n\nOut of scope:\n\n- Editing CLI code.\n- Editing dashboard templates.\n- Rewriting existing PF-002 or PF-003 history.\n- Claiming v1.0 release readiness.\n\n## Review Model\n\nThis task requires adversarial review before implementation begins.\n\nReviewer lenses:\n\n| Reviewer | Lens | Question |\n| --- | --- | --- |\n| product-architecture | release boundary | Are the stages separated by user value and risk? |\n| execution-governance | sequencing | Can implementation start without hidden blockers? |\n| dashboard-ux | visibility layer | Does Phase 2 preserve the user's dashboard intent without breaking v1.0? |\n| checker-safety | contracts | Are checker/init/status scopes enforceable? |\n\n## Evidence Depth\n\n| Area | Evidence |\n| --- | --- |\n| Plan consistency | Compare private task plan, public release plan, SKILL/README drift, current CLI capability names |\n| Release boundary | Explicit non-goals per phase |\n| Dashboard scope | Phase 1 vs Phase 2 separation |\n| Safety | No private leakage or automatic global table writes promised |\n\n## Handoff\n\nNo worker handoff is expected. If implementation starts later and workers are\nused, each worker must receive a dedicated write scope and commit-backed handoff.\n"},{"id":"doc-0034-findings","path":"TARGET:docs/09-PLANNING/TASKS/2026-05-19-v1-staged-release-rebaseline/findings.md","title":"Findings - v1 Staged Release Rebaseline","type":"markdown-table","content":"# Findings - v1 Staged Release Rebaseline\n\n## Findings Table\n\n| ID | Severity | Finding | Evidence | Status |\n| --- | --- | --- | --- | --- |\n| F-001 | P1 | Current v1.0 scope mixes kernel release and Dashboard v2/task lifecycle capability work | PF-002 and PF-003/PF-004 scope comparison | mitigated-by-staged-plan |\n| F-002 | P1 | Capability names drift between strategy docs and implementation | Public capability pack plan vs `scripts/lib/harness-core.mjs` definitions | mitigated-by-canonical-taxonomy |\n| F-003 | P1 | Scaffold/Configure split is violated if `init` mechanically copies full reference templates | `plannedInitFiles()` copied all `templates/reference` files | mitigated-by-scaffold-boundary |\n| F-004 | P1 | Public onboarding still points at 12 phases after the six-phase decision | `SKILL.md` and README guidance | mitigated-by-six-phase-guidance |\n| F-005 | P2 | v1.0 main task still uses legacy roadmap fallback instead of standalone strategy/roadmap files | private harness check warning | closed-by-pf002-contract-files |\n| F-006 | P2 | Release-critical strategy can be hidden in unpublished `docs/plans` paths | package `files` excludes `docs/plans` | mitigated-by-docs-release-plan |\n| F-007 | P2 | Dashboard v2 plan is meaningful but not safe inside v1.0 release gate | Dashboard v2 task includes write commands and schema v2 | mitigated-by-phase2-boundary |\n| F-008 | P1 | Single-language English templates would make installed harness painful for Chinese users | User-facing generated task/review/ledger/reference files are long-lived operating surfaces | mitigated-by-locale-aware-init |\n"},{"id":"doc-0035-progress","path":"TARGET:docs/09-PLANNING/TASKS/2026-05-19-v1-staged-release-rebaseline/progress.md","title":"Progress - v1 Staged Release Rebaseline","type":"task-progress","content":"# Progress - v1 Staged Release Rebaseline\n\n- Status: done\n- Owner: coordinator\n- Last updated: 2026-05-19\n\n## Updates\n\n| Date | Status | Summary | Evidence |\n| --- | --- | --- | --- |\n| 2026-05-19 | planned | Created staged release rebaseline plan and adversarial review. | `task_plan.md`, `review.md` |\n| 2026-05-19 | review | Closed Phase 0 P1 blockers enough to start Phase 1: canonical capability names, locale-aware init, scaffold/reference boundary, six-phase guidance, PF-002 standalone contracts, and Dashboard v2 phase boundary. | `scripts/lib/harness-core.mjs`, `scripts/harness.mjs`, `SKILL.md`, `README.md` |\n| 2026-05-19 | done | Rebaseline updated after user feedback: docs-release stays public-facing only; roadmap/staged plan remain private operating state. | `docs-release/README.md`, `Private-Feature-SSoT.md` |\n"},{"id":"doc-0036-review","path":"TARGET:docs/09-PLANNING/TASKS/2026-05-19-v1-staged-release-rebaseline/review.md","title":"Review - v1 Staged Release Rebaseline","type":"task-review","content":"# Review - v1 Staged Release Rebaseline\n\n## Reviewer Identity\n\n| Reviewer | Type | Scope |\n| --- | --- | --- |\n| coordinator | adversarial-review | staged release boundary and implementation readiness |\n| product-architecture | simulated adversarial-review | user value, release packaging, capability boundaries |\n| execution-governance | simulated adversarial-review | sequencing, checker gates, public/private drift |\n| dashboard-ux | simulated adversarial-review | whether Dashboard v2 should block v1.0 |\n| checker-safety | simulated adversarial-review | init/check/status enforceability |\n| localization-ux | simulated adversarial-review | zh-CN/en-US scaffold and user-facing template experience |\n\n## Confidence Challenge\n\nStrongest reason this plan might still be wrong:\n\nThe split may delay the dashboard improvements the user actually cares about.\nIf Phase 1 ships with a weak dashboard, the project may look \"technically\nreleased\" but still fail the user's real usability expectation.\n\nMitigation:\n\nPhase 1 must not market the dashboard as the final human visibility layer. It is\nonly a minimal read-only status artifact. Phase 2 is explicitly committed as the\nvisibility layer, with `brief.md`, task lifecycle CLI, search, topology, and UX\nsmoke tests. The release wording must say \"v1.0 kernel\" rather than \"complete\ndashboard experience.\"\n\n## Evidence Checked\n\n| Evidence ID | Type | Path | Summary |\n| --- | --- | --- | --- |\n| E-001 | private-plan | PRIVATE:docs/09-PLANNING/TASKS/2026-05-17-v1.0-document-kernel-release/task_plan.md | PF-002 scope and acceptance criteria |\n| E-002 | private-plan | PRIVATE:docs/09-PLANNING/TASKS/2026-05-19-dashboard-v2-visibility-layer/task_plan.md | Dashboard v2/task lifecycle scope |\n| E-003 | private-plan | PRIVATE:docs/09-PLANNING/TASKS/2026-05-19-v1-staged-release-rebaseline/visual_roadmap.md | Private roadmap, capability packs, dashboard JSON contract |\n| E-004 | code | PUBLIC:scripts/lib/harness-core.mjs | Capability definitions and scaffold behavior |\n| E-005 | public-doc | PUBLIC:SKILL.md | Current 12-phase SOP drift |\n| E-006 | public-doc | PUBLIC:README.md | Public CLI and install guidance |\n| E-007 | command | PUBLIC:npm test | Current harness tests pass before rebaseline implementation |\n| E-008 | command | PUBLIC:npm run smoke:dashboard | Current dashboard smoke passes before rebaseline implementation |\n| E-009 | user-feedback | EXTERNAL:conversation | User requested Chinese/English template selection during init |\n| E-010 | code | PUBLIC:scripts/lib/harness-core.mjs | Capability aliases, locale-aware init, scaffold boundary |\n| E-011 | public-template | PUBLIC:templates/locales/zh-CN/planning/task_plan.md | First zh-CN localized scaffold template |\n| E-012 | private-plan | PRIVATE:docs/09-PLANNING/TASKS/2026-05-17-v1.0-document-kernel-release/execution_strategy.md | PF-002 standalone execution strategy |\n| E-013 | private-plan | PRIVATE:docs/09-PLANNING/TASKS/2026-05-17-v1.0-document-kernel-release/visual_roadmap.md | PF-002 standalone visual roadmap |\n\n## Findings\n\n| ID | Severity | Finding | Evidence
